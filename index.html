<script>window.BANK = [{"id": "m001", "topic": "BI & DWH", "text": "Select the sentences describing a characteristic of a Data Warehouse:", "options": [{"key": "A", "text": "Solves the inconsistencies"}, {"key": "B", "text": "Non volatile"}, {"key": "C", "text": "Includes the time dimension"}, {"key": "D", "text": "Constantly updated as soon as the base data are updated"}, {"key": "E", "text": "Includes all the base data in their native format"}], "correct": ["A", "B", "C"], "note": "", "source": "banco 2026", "hint": "il DWH è la fototeca storica dell'azienda: pulita (inconsistenze risolte), con la data su ogni foto (time dimension), e le foto non si ritoccano (non volatile). MAI:…"}, {"id": "m002", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Expectation Maximisation"}, {"key": "B", "text": "Decision Tree"}, {"key": "C", "text": "K-means"}, {"key": "D", "text": "Dbscan"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🔍 La linea è sempre supervisionato vs non supervisionato: trova l'intruso rispetto a quella."}, {"id": "m003", "topic": "Classificazione & ML", "text": "Which of the following is a base hypothesis for a bayesian classifier?", "options": [{"key": "A", "text": "The attributes must be statistically independent inside each class"}, {"key": "B", "text": "The attributes must have negative correlation"}, {"key": "C", "text": "The attributes must be statistically independent"}, {"key": "D", "text": "The attributes must have zero correlation"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "⚠️ L'esca C (\"statisticamente indipendenti\" e basta) è quasi identica: la differenza è \"inside each class\" (indipendenza condizionata alla classe). Mnemonica: \"Bayes…"}, {"id": "m004", "topic": "Preprocessing & dati", "text": "In data preparation which is the effect of normalisation?", "options": [{"key": "A", "text": "Map all the numeric attributes to the same range, without altering the distribution, in order to avoid that attributes with large ranges have more influence"}, {"key": "B", "text": "Map all the numeric attributes subtracting the respective mean and dividing by variance"}, {"key": "C", "text": "Map all the numeric attributes to the same range and to have a Gaussian distribution"}, {"key": "D", "text": "Map all the numeric attributes in order to have a Gaussian distribution"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Trappola ricorrente: ogni opzione-esca contiene \"Gaussian distribution\" — la normalizzazione NON rende niente gaussiano. Regola: se l'opzione promette una gaussiana, è…"}, {"id": "m005", "topic": "BI & DWH", "text": "Check the features of Data Lakes in comparison with Data Warehouses:", "options": [{"key": "A", "text": "Can run on less expensive HW/SW"}, {"key": "B", "text": "Do not enforce data quality"}, {"key": "C", "text": "More complex management"}, {"key": "D", "text": "Completely defined use cases"}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "il lago è economico e ci butti dentro tutto com'è. Le esche sbagliate dicono il contrario dei luoghi comuni: la gestione NON è più complessa per definizione, e i casi…"}, {"id": "m006", "topic": "Classificazione & ML", "text": "What are the hyperparameters of a Neural Network?", "options": [{"key": "A", "text": "Hidden layers structure, Output layer structure, Activation function, Number of epochs"}, {"key": "B", "text": "Network structure, Learning rate, Backpropagation algorithm, Number of epochs"}, {"key": "C", "text": "Input layers structure, Learning rate, Activation function, Number of epochs"}, {"key": "D", "text": "Hidden layers structure, Learning rate, Activation function, Number of epochs"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "\"HLAN\" (suona come \"WLAN con l'H\"). Esche costruite bene: contengono \"Output/Input layer structure\" (vincolati dal problema, non iperparametri) o \"Backpropagation…"}, {"id": "m007", "topic": "Preprocessing & dati", "text": "Which operations are in the correct sequence?", "options": [{"key": "A", "text": "Extraction, Cleansing, Transformation, Loading"}, {"key": "B", "text": "Extraction, Transformation, Cleansing, Loading"}, {"key": "C", "text": "Loading, Cleansing, Extraction, Transformation"}, {"key": "D", "text": "Transformation, Extraction, Cleansing, Loading"}, {"key": "E", "text": "Loading, Transformation, Cleansing, Extraction"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Extraction · Cleansing · Transformation · Loading»"}, {"id": "m008", "topic": "Clustering", "text": "With reference to the total sum of squared errors (SSE) and separation (SSB) of a clustering scheme, which of the statements below is true?", "options": [{"key": "A", "text": "They are two ways to measure the same thing"}, {"key": "B", "text": "They are strictly correlated, if, changing the clustering scheme, one increases, then the other does the same"}, {"key": "C", "text": "It is possible to optimise them (i.e. minimise SSE and maximise SSB) separately"}, {"key": "D", "text": "They are strictly correlated, if, changing the clustering scheme, one increases, then the other decreases"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "SSE+SSB = costante (varianza totale dei dati). Vasi comunicanti: comprimi la coesione, sale la separazione. Per questo NON si ottimizzano separatamente (esca C)."}, {"id": "m009", "topic": "Regressione", "text": "When is polynomial regression appropriate?", "options": [{"key": "A", "text": "When the relationship between the predicting variable and the target cannot be approximated as linear"}, {"key": "B", "text": "When the target values are not linearly separable"}, {"key": "C", "text": "When there is more than one predicting attribute"}, {"key": "D", "text": "When it is necessary to project the data into a dimensional space"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «relationship · between · predicting · variable»"}, {"id": "m010", "topic": "Clustering", "text": "Which of the following is not a strength point of Dbscan with respect to K-means?", "options": [{"key": "A", "text": "The robustness with respect to outliers"}, {"key": "B", "text": "The effectiveness, even in presence of noise"}, {"key": "C", "text": "The effectiveness even if there are clusters with non-convex shape"}, {"key": "D", "text": "The efficiency even in large datasets"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Ricollega all'ancora: il veloce è K-Means; DBSCAN è il fine ma lento. I punti di forza veri di DBSCAN: outlier, rumore, forme non convesse."}, {"id": "m011", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Recall?", "options": [{"key": "A", "text": "TP/(TP+FN)"}, {"key": "B", "text": "TN/(TN+FP)"}, {"key": "C", "text": "TP/(TP+FP)"}, {"key": "D", "text": "(TP+TN)/(TP+FP+TN+FN)"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4."}, {"id": "m012", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the meaning of \"Schema on read\"?", "options": [{"key": "A", "text": "Write the raw data in the database, then at reading time shape then according to the reader's needs"}, {"key": "B", "text": "Create a schema for data after reading them from the database"}, {"key": "C", "text": "Read the schema of the data before each data read"}, {"key": "D", "text": "Change the schema of the data before each read"}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto)."}, {"id": "m013", "topic": "Regressione", "text": "What is the coefficient of determination R2?", "options": [{"key": "A", "text": "Provide an index of goodness for a linear regression model"}, {"key": "B", "text": "Measure the amount of error in a linear regression model"}, {"key": "C", "text": "Measure the amount of error in a regression model"}, {"key": "D", "text": "An index of goodness for a classification model"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Provide · index · goodness · linear»"}, {"id": "m014", "topic": "Clustering", "text": "Which of the statements below is true about K-Means?", "options": [{"key": "A", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters"}, {"key": "B", "text": "K-means always stop to a configuration which gives the minimum distortion for the chosen value of the number of clusters"}, {"key": "C", "text": "K-means works well also with datasets having a very large number of attributes"}, {"key": "D", "text": "K-means finds the number of clusters which give the minimum distortion"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🤖 KMeans veloce ma pigro: efficiente, sensibile ai centri iniziali, si siede sul primo minimo locale. 'Always' è sempre falso."}, {"id": "m015", "topic": "BI & DWH", "text": "Check the main objectives pursued when choosing a Data Lake architecture:", "options": [{"key": "A", "text": "Store the data directly from the sources, as they are"}, {"key": "B", "text": "The data must be accurately structured, in order to provide fast answers to complex queries"}, {"key": "C", "text": "The storage must be scalable and cheap, at the expenses of latency"}, {"key": "D", "text": "Ensure high quality of data through an accurate cleaning and transformation step"}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "Stessa logica del 5: grezzo + economico. Le esche (\"accurately structured\", \"high quality through cleaning\") descrivono il DWH."}, {"id": "m016", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for High dimensional spaces?", "options": [{"key": "A", "text": "Euclidean distance"}, {"key": "B", "text": "Cosine distance"}, {"key": "C", "text": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no)."}, {"id": "m017", "topic": "Classificazione & ML", "text": "When training a neural network, what is the learning rate?", "options": [{"key": "A", "text": "The speed of convergence to a stable solution during the learning process"}, {"key": "B", "text": "The ratio between the size of the hidden layer and the input layer of the network"}, {"key": "C", "text": "The slope of the activation function in a specific node"}, {"key": "D", "text": "A multiplying factor of the correction to be applied to the connection weights"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "⚠️ Esca A fortissima: \"velocità di convergenza\" — è l'effetto, non la definizione. La definizione è il moltiplicatore della correzione."}, {"id": "m018", "topic": "Clustering", "text": "What does K-means try to minimise?", "options": [{"key": "A", "text": "The distortion, that is the sum of the squared distances of each point with respect to the points of the other clusters"}, {"key": "B", "text": "The distortion, that is the sum of the squared distances of each point with respect to its centroid"}, {"key": "C", "text": "The separation, that is the sum of the squared distances of each point with respect to its centroid"}, {"key": "D", "text": "The separation, that is the sum of the squared distances of each cluster centroid with respect to the global centroid of the dataset"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Esche: \"dagli altri cluster\" (no), \"separation\" (quella è SSB, ed è da massimizzare)."}, {"id": "m019", "topic": "Preprocessing & dati", "text": "Which is the effect of the curse of dimensionality?", "options": [{"key": "A", "text": "When the number of dimensions increases the results tend to be prone to overfitting"}, {"key": "B", "text": "When the number of dimensions increases the euclidean distance becomes less effective to discriminate between points"}, {"key": "C", "text": "When the number of dimensions increases the computing power becomes too high"}, {"key": "D", "text": "When the number of dimensions increases the classifiers cannot be correctly tuned"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "in 1000 dimensioni tutti i punti finiscono \"circa equidistanti\" — la distanza perde significato. Non è (solo) questione di potenza di calcolo (esca C)."}, {"id": "m020", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Vectors of terms representing documents?", "options": [{"key": "A", "text": "Euclidean distance"}, {"key": "B", "text": "Cosine distance"}, {"key": "C", "text": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no)."}, {"id": "m021", "topic": "Association Rules", "text": "Which formula computes the Conviction of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence."}, {"id": "m022", "topic": "Preprocessing & dati", "text": "In a dataset with D attributes, how many subsets of attributes should be considered for feature selection according to an exhaustive search?", "options": [{"key": "A", "text": "O(2^D)"}, {"key": "B", "text": "O(D!)"}, {"key": "C", "text": "O(D)"}, {"key": "D", "text": "O(D^2)"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "ogni feature o c'è o non c'è → 2·2·2... D volte = 2^D (stesso conto degli itemset)."}, {"id": "m023", "topic": "Classificazione & ML", "text": "What is the cross validation?", "options": [{"key": "A", "text": "A technique to obtain a good estimation of the performance of a classifier when it will be used with data different from the training set"}, {"key": "B", "text": "A technique to obtain a good estimation of the performance of a classifier with the training set"}, {"key": "C", "text": "A technique to improve the quality of a classifier"}, {"key": "D", "text": "A technique to improve the speed of a classifier"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Parole chiave: \"estimation\" + \"different from the training set\". Non migliora il classificatore (esche C/D): lo misura."}, {"id": "m024", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when numeric attributes have very diverse ranges of values?", "options": [{"key": "A", "text": "Rescaling"}, {"key": "B", "text": "Non linear transformations"}, {"key": "C", "text": "Aggregation"}, {"key": "D", "text": "OneHot Encoding"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "40. Distribuzione skewed (coda lunga) → ? → ✅ B Non linear transformations (il log!)."}, {"id": "m025", "topic": "Regressione", "text": "What is the difference between classification and regression?", "options": [{"key": "A", "text": "Classification has a categorical target, while regression has a numeric target"}, {"key": "B", "text": "Classification is a supervised activity, while regression in unsupervised"}, {"key": "C", "text": "Classification can make errors, while regression is always exact"}, {"key": "D", "text": "Classification can have a numeric or categorical target, while regression has always a categorical target"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Classification · categorical · target · while»"}, {"id": "m026", "topic": "Classificazione & ML", "text": "In a decision tree, the number of objects in a node...", "options": [{"key": "A", "text": "... is smaller than the number of objects in its ancestor"}, {"key": "B", "text": "is not related to the number of objects in its ancestor"}, {"key": "C", "text": "... is smaller than or equal to the number of objects in its ancestor"}, {"key": "D", "text": "... is bigger than the number of objects in its ancestor"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "ogni split DIVIDE: un figlio non può avere tutti gli oggetti del padre (altrimenti lo split era inutile). Quindi strettamente minore, non \"minore o uguale\" (esca C —…"}, {"id": "m027", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the purpose of the \"Schema on write\" strategy?", "options": [{"key": "A", "text": "Optimisation for specific types of queries"}, {"key": "B", "text": "Clean design of the data structure"}, {"key": "C", "text": "Avoid preprocessing of data before writing"}, {"key": "D", "text": "Flexibility and efficiency for any kind of query"}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto)."}, {"id": "m028", "topic": "Classificazione & ML", "text": "Why do we prune a decision tree?", "options": [{"key": "A", "text": "To eliminate parts of the tree where the decisions could be influenced by random effects"}, {"key": "B", "text": "To eliminate rows of the dataset which could be influenced by random effects"}, {"key": "C", "text": "To eliminate parts of the tree where the decision could generate underfitting"}, {"key": "D", "text": "To eliminate attributes which could be influenced by random effects"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "rami piccoli = poche osservazioni = decisioni rumorose → tagliali (è l'anti-overfitting degli alberi)."}, {"id": "m029", "topic": "Classificazione & ML", "text": "What is the main purpose of smoothing in Bayesian classification?", "options": [{"key": "A", "text": "Classifying an object containing attribute values which are missing from some classes in the training set"}, {"key": "B", "text": "Dealing with missing values"}, {"key": "C", "text": "Reduce the variability of the data"}, {"key": "D", "text": "Classifying an object containing attribute values which are missing from some classes in the test set"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "senza smoothing, un valore mai visto in una classe dà probabilità zero che azzera tutto il prodotto. ⚠️ L'esca D dice \"test set\" — no: il problema nasce dai buchi nel…"}, {"id": "m030", "topic": "Preprocessing & dati", "text": "Which of the following types of data allows the use of the euclidean distance?", "options": [{"key": "A", "text": "Points in a vector space"}, {"key": "B", "text": "Ordered data"}, {"key": "C", "text": "Transactional data"}, {"key": "D", "text": "Document representations"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no)."}, {"id": "m031", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the meaning of \"Schema on write\"?", "options": [{"key": "A", "text": "Create a schema for data after writing into the database"}, {"key": "B", "text": "Create a schema for data while writing into the database"}, {"key": "C", "text": "Change the schema of the data after each write"}, {"key": "D", "text": "Create a schema for data before writing into the database"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto)."}, {"id": "m032", "topic": "Classificazione & ML", "text": "A Decision Tree is...", "options": [{"key": "A", "text": "A tree-structured plan of tests on single attributes to forecast the cluster"}, {"key": "B", "text": "A tree-structured plan of tests on single attributes to forecast the target"}, {"key": "C", "text": "A tree-structured plan of tests on single attributes to obtain the maximum purity of a node"}, {"key": "D", "text": "A tree-structured plan of tests on multiple attributes to forecast the target"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Le esche cambiano una parola: \"cluster\" (no, è supervisionato), \"multiple attributes\" (no, un attributo per nodo), \"maximum purity\" (è il mezzo, non il fine)."}, {"id": "m033", "topic": "Preprocessing & dati", "text": "In order to reduce the dimensionality of a dataset, which is the advantage of Multi Dimensional Scaling (MDS) with respect to PCA?", "options": [{"key": "A", "text": "MDS requires less computational power"}, {"key": "B", "text": "MDS can be used also with categorical data, provided that the matrix of the distance is available, while PCA is limited to vector spaces"}, {"key": "C", "text": "MDS can be used with categorical data after a transformation in a vector space"}, {"key": "D", "text": "MDS can work on any kind of data, while PCA is limited to categorical data"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "MDS = \"Mi Dai le Distanze?\" — a MDS bastano le distanze, non servono coordinate."}, {"id": "m034", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when a nominal attribute needs to be used as predicting (sklearn)?", "options": [{"key": "A", "text": "Rescaling"}, {"key": "B", "text": "Non linear transformations"}, {"key": "C", "text": "Aggregation"}, {"key": "D", "text": "OneHot Encoding"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "72-71. Categorico con troppi valori distinti → ? → ✅ C Aggregation (raggruppi i valori)."}, {"id": "m035", "topic": "Preprocessing & dati", "text": "Which of the following statements is true?", "options": [{"key": "A", "text": "The data which are similar to the majority are never noise"}, {"key": "B", "text": "The noise always generate outliers"}, {"key": "C", "text": "Outliers can be due to noise"}, {"key": "D", "text": "The noise can generate outliers"}], "correct": ["C", "D"], "note": "", "source": "banco 2026", "hint": "le opzioni con \"always/never\" sono quasi sempre false; quelle con \"can\" quasi sempre vere. Qui funziona alla perfezione."}, {"id": "m036", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Drill-Across\"?", "options": [{"key": "A", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}, {"key": "B", "text": "Creates a link between concepts in interrelated cubes, in order to compare them"}, {"key": "C", "text": "Reduces data aggregation and adds a detail level to a hierarchy"}, {"key": "D", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi."}, {"id": "m037", "topic": "Clustering", "text": "What is the first step in agglomerative clustering?", "options": [{"key": "A", "text": "Cutting the Dendrogram"}, {"key": "B", "text": "Pairwise Cluster Similarity Calculation"}, {"key": "C", "text": "Initialization: Start with each data point as a singleton cluster"}, {"key": "D", "text": "Cluster Assignment"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "62-61. Come si decide il numero di cluster → ✅ B (tagliando il dendrogramma a una certa altezza)."}, {"id": "m038", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Extraction step?", "options": [{"key": "A", "text": "Elimination of duplicates"}, {"key": "B", "text": "Snapshot of the operational data"}, {"key": "C", "text": "Association of a timestamp to the operational data"}, {"key": "D", "text": "Usage of dictionaries to solve inconsistencies"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab."}, {"id": "m039", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the confidence of the rule B -> E?", "options": [{"key": "A", "text": "100%"}, {"key": "B", "text": "50%"}, {"key": "C", "text": "33%"}, {"key": "D", "text": "20%"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%)."}, {"id": "m040", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when an attribute has a very skewed distribution (long tail)?", "options": [{"key": "A", "text": "Rescaling"}, {"key": "B", "text": "Non linear transformations"}, {"key": "C", "text": "Aggregation"}, {"key": "D", "text": "OneHot Encoding"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «linear · transformations»"}, {"id": "m041", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the confidence of the rule A,C -> B?", "options": [{"key": "A", "text": "50%"}, {"key": "B", "text": "40%"}, {"key": "C", "text": "20%"}, {"key": "D", "text": "100%"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%)."}, {"id": "m042", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Slice & Dice\"?", "options": [{"key": "A", "text": "Creates a link between concepts in interrelated cubes, in order to compare them"}, {"key": "B", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}, {"key": "C", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy"}, {"key": "D", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi."}, {"id": "m043", "topic": "BI & DWH", "text": "What is the ranking for the following technologies, based on the increasing level of abstraction? Technologies: - OLAP analysis on Data Mart - Data Mining on operational databases - SQL queries on operational databases; Order: from left (it generates the most specific information) to right (it has a higher level of knowledge).", "options": [{"key": "A", "text": "Data Mining, OLAP analysis, SQL queries"}, {"key": "B", "text": "SQL queries, OLAP analysis, Data Mining"}, {"key": "C", "text": "SQL queries, Data Mining, OLAP analysis"}, {"key": "D", "text": "OLAP analysis, SQL queries, Data Mining"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "SQL ti dà il dato puntuale (specifico), OLAP l'aggregato, il Data Mining la conoscenza (pattern). Dal fatto al sapere: \"Sali Ogni Dettaglio\" (SQL, OLAP, DM)."}, {"id": "m044", "topic": "Preprocessing & dati", "text": "Which is the main reason for the MinMax scaling (rescaling) of attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions"}, {"key": "B", "text": "Map all the nominal attributes to the same range"}, {"key": "C", "text": "Remove abnormal values"}, {"key": "D", "text": "Map all the numeric attributes to the same range, in order to prevent attributes with higher range from having prevalent influence"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «numeric · attributes · same · range»"}, {"id": "m045", "topic": "Association Rules", "text": "What is the meaning of the statement \"the support is anti-monotone\"?", "options": [{"key": "A", "text": "The support of an itemset never exceeds the support if its subsets"}, {"key": "B", "text": "The support of an itemset is always smaller than the support of its supersets"}, {"key": "C", "text": "The support of an itemsets never exceeds the support if its supersets"}, {"key": "D", "text": "The support of an itemset is always smaller than the support of its subsets"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "aggiungere item può solo restringere le transazioni che li contengono tutti. ⚠️ Le 4 opzioni sono permutazioni di subset/superset e never-exceeds/always-smaller: la…"}, {"id": "m046", "topic": "Association Rules", "text": "How does pruning work when generating frequent itemsets?", "options": [{"key": "A", "text": "If an itemset is not frequent, then none of its supersets can be frequent, therefore the frequencies of the supersets are not evaluated"}, {"key": "B", "text": "If an itemset is frequent, then none of its supersets can be frequent, therefore the frequencies of the supersets are not evaluated"}, {"key": "C", "text": "If an itemset is not frequent, then none of its subsets can be frequent, therefore the frequencies of the subsets are not evaluated"}, {"key": "D", "text": "If an itemset is frequent, then none of its subsets can be frequent, therefore the frequencies of the subsets are not evaluated"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "È l'anti-monotonicità usata al contrario: il ramo morto non rifiorisce."}, {"id": "m047", "topic": "Association Rules", "text": "Which formula computes the Confidence of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence."}, {"id": "m048", "topic": "Preprocessing & dati", "text": "Given the two binary vectors below, which is their similarity according to the Simple Matching Coefficient? 1000101101 1011101010", "options": [{"key": "A", "text": "0.1"}, {"key": "B", "text": "0.3"}, {"key": "C", "text": "0.5"}, {"key": "D", "text": "0.2"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Metodo: SMC = posizioni uguali / totale. Confronta cifra per cifra: 5 match su 10 → 0.5."}, {"id": "m049", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the operations below performs aggregation?", "options": [{"key": "A", "text": "Combination of two attributes in order to obtatn a more general attribute with smaller variability"}, {"key": "B", "text": "Reduction of the number of distinct values of an attribute in order to reduce its variability"}, {"key": "C", "text": "Reduction of the number of rows of the dataset by applying a grouping on one or more attributes and computing the measures as the results of aggregation functions"}, {"key": "D", "text": "Combination of two or more datasets in order to obtatn more Information"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso."}, {"id": "m050", "topic": "Clustering", "text": "After fitting DBSCAN with the default parameter values the results are: 0 clusters, 100% of noise points. Which will be your next trial?", "options": [{"key": "A", "text": "Reduce the minimum number of objects in the neighborhood"}, {"key": "B", "text": "Reduce the minimum number of objects in the neighborhood and the radius of the neighborhood"}, {"key": "C", "text": "Increase the radius of the neighborhood"}, {"key": "D", "text": "Decrease the radius of the neighborhood"}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "Ragionamento fisico: nessuna zona risulta \"densa\" → o abbassi l'asticella della densità (meno punti richiesti) o allarghi il cerchio in cui conti i punti. Entrambe le…"}, {"id": "m051", "topic": "Clustering", "text": "Which of the following clustering methods is not based on distances between objects?", "options": [{"key": "A", "text": "Hierarchical Agglomerative"}, {"key": "B", "text": "DBSCAN"}, {"key": "C", "text": "K-Means"}, {"key": "D", "text": "Expectation Maximization"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "EM ragiona per probabilità (likelihood), non per metri. Gli altri tre (KMeans, DBSCAN, gerarchico) vivono di distanze."}, {"id": "m052", "topic": "Association Rules", "text": "Which of the statements below best describes the strategy of Apriori in finding the frequent itemsets?", "options": [{"key": "A", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are considered only at the end"}, {"key": "B", "text": "Evaluation of the confidence of the itemsets in an order such that uninteresting parts of the search space are pruned"}, {"key": "C", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible"}, {"key": "D", "text": "Evaluation of the support of the itemsets in an order such that the interesting parts of the search space are pruned"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Parole chiave: \"support\" (non confidence!) + \"pruned as soon as possible\"."}, {"id": "m053", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Silhouette Index"}, {"key": "B", "text": "Misclassification Error"}, {"key": "C", "text": "Entropy"}, {"key": "D", "text": "Gini Index"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "2. Chi è il diverso? (EM, Decision Tree, K-means, DBSCAN) → ✅ B Decision Tree (supervisionato tra clusterer)."}, {"id": "m054", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Transformation step?", "options": [{"key": "A", "text": "Usage of dictionaries to solve inconsistencies"}, {"key": "B", "text": "Snapshot of the operational data"}, {"key": "C", "text": "Denormalisation"}, {"key": "D", "text": "Calculation of derived data"}], "correct": ["C", "D"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab."}, {"id": "m055", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Vector space with real values?", "options": [{"key": "A", "text": "Euclidean distance"}, {"key": "B", "text": "Cosine distance"}, {"key": "C", "text": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "il DWH risponde a domande analitiche/aggregate (massimi, totali per dimensione, relazioni). Le esche sono query operative puntuali (\"stock del prodotto X nel magazzino…"}, {"id": "m056", "topic": "BI & DWH", "text": "Which of the following are typical data warehouse queries?", "options": [{"key": "A", "text": "Which products maximize the profit?"}, {"key": "B", "text": "Which is the stock of product \"XXX\" in the \"YYY\" warehouse?"}, {"key": "C", "text": "What is the total revenue of yesterday in shop \"BO03\"?"}, {"key": "D", "text": "What is the total revenue per product category and state?"}, {"key": "E", "text": "What is the relationship between profits gained by products \"WWW\" and \"ZZZ\"?"}], "correct": ["A", "D", "E"], "note": "", "source": "banco 2026", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake)."}, {"id": "m057", "topic": "Classificazione & ML", "text": "When developing a classifier, which of the following is a symptom of overfitting?", "options": [{"key": "A", "text": "The error rate in the test set is much smaller than the error rate in the training set"}, {"key": "B", "text": "The precision is much greater than the recall"}, {"key": "C", "text": "The error rate in the test set is more than 30%"}, {"key": "D", "text": "The error rate in the test set is much greater than the error rate in the training set"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Già nostro pane quotidiano (01b §3.2). L'esca A è l'inverso (test molto migliore del train — semmai un colpo di fortuna o un leak)."}, {"id": "m058", "topic": "Association Rules", "text": "Which formula computes the Leverage of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence."}, {"id": "m059", "topic": "BI & DWH", "text": "In which part of the CRISP methodology we perform the test design activity?", "options": [{"key": "A", "text": "Data Understanding"}, {"key": "B", "text": "Evaluation"}, {"key": "C", "text": "Business Understanding"}, {"key": "D", "text": "Modeling"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Controintuitiva (verrebbe da dire Evaluation!): il disegno del test si fa mentre si modella, la valutazione dopo. Mnemonica: \"prepari l'esame quando studi (modeling),…"}, {"id": "m060", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Pivot\"?", "options": [{"key": "A", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy"}, {"key": "B", "text": "Reduces data aggregation and adds a detail level to a hierarchy"}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them"}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi."}, {"id": "m061", "topic": "Preprocessing & dati", "text": "Which is the main reason for the standardization of numeric attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions"}, {"key": "B", "text": "Map all the numeric attributes to a new range such that the mean is zero and the variance is one"}, {"key": "C", "text": "Map all the nominal attributes to the same range"}, {"key": "D", "text": "Remove non-standard values"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «numeric · attributes · range · such»"}, {"id": "m062", "topic": "Clustering", "text": "How is the number of clusters determined in agglomerative clustering?", "options": [{"key": "A", "text": "By assigning each data point to a cluster based on the final structure"}, {"key": "B", "text": "By cutting the dendrogram at a certain height"}, {"key": "C", "text": "By merging the closest clusters"}, {"key": "D", "text": "By computing the pairwise similarity"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🏆 Torneo: si parte singoli, si fondono i più vicini (serve distanza tra SET=linkage), tabellone=dendrogramma, k=dove lo tagli."}, {"id": "m063", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Cleansing step?", "options": [{"key": "A", "text": "Elimination of duplicates"}, {"key": "B", "text": "Association of a timestamp to the operational data"}, {"key": "C", "text": "Usage of dictionaries to solve inconsistencies"}, {"key": "D", "text": "Snapshot of the operational data"}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab."}, {"id": "m064", "topic": "Clustering", "text": "Which of the statements below is true about K-Means?", "options": [{"key": "A", "text": "K-mean always stops to a configuration which gives the minimum distortion for the chosen value of the number of clusters"}, {"key": "B", "text": "K-means is very sensitive to the initial assignment of the centers"}, {"key": "C", "text": "K-means is quite efficient even for large datasets"}, {"key": "D", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters"}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026", "hint": "🤖 KMeans veloce ma pigro: efficiente, sensibile ai centri iniziali, si siede sul primo minimo locale. 'Always' è sempre falso."}, {"id": "m065", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of K-Means?", "options": [{"key": "A", "text": "Presence of values with high frequency"}, {"key": "B", "text": "Presence of outliers"}, {"key": "C", "text": "All the variables have the same distribution of values"}, {"key": "D", "text": "All the variables have the same range of values"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "i centroidi sono medie, e le medie si fanno trascinare dagli outlier."}, {"id": "m066", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Precision?", "options": [{"key": "A", "text": "TP/(TP+FP)"}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)"}, {"key": "C", "text": "TN/(TN+FP)"}, {"key": "D", "text": "TP/(TP+FN)"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4."}, {"id": "m067", "topic": "Preprocessing & dati", "text": "Which of the following is not an objective of feature selection?", "options": [{"key": "A", "text": "Select the features with higher range, which have more influence on the computation"}, {"key": "B", "text": "Reduce time and memory complexity of the mining algorithms"}, {"key": "C", "text": "Reduce the effect of noise"}, {"key": "D", "text": "Avoid the curse of dimensionality"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "il range non c'entra nulla con l'importanza (anzi, è il motivo per cui si scala!). Gli obiettivi veri: meno tempo/memoria, meno rumore, meno curse of dimensionality."}, {"id": "m068", "topic": "Association Rules", "text": "Which formula computes the Lift of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence."}, {"id": "m069", "topic": "Clustering", "text": "What measure is maximised by the Expectation Masimisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood the distributions, defined by the parameters found, given the data available"}, {"key": "B", "text": "The likelihood of an example"}, {"key": "C", "text": "The support of a class"}, {"key": "D", "text": "The likelihood of an attribute, given the class label"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «likelihood · distributions · defined · parameters»"}, {"id": "m070", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the operations below performs aggregation?", "options": [{"key": "A", "text": "Combination of two attributes in order to obtain a more general attribute with smaller variability"}, {"key": "B", "text": "Reduction of the number of distinct values of an attribute in order to reduce its variability"}, {"key": "C", "text": "Reduction of the number of rows of the dataset by applying a grouping on one or more attributes and computing the measures as the results of aggregation functions"}, {"key": "D", "text": "Combination of two or more datasets in order to obtain more Information"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso."}, {"id": "m071", "topic": "BI & DWH", "text": "What is Data Ingestion?", "options": [{"key": "A", "text": "A process that copies data from sources to a repository, taking care of possible differences in speed between the generation and the storing process"}, {"key": "B", "text": "A process that copies data from sources to a repository, ensuring high data quality"}, {"key": "C", "text": "A process that copies data from sources to a repository, making the transformation required by the users"}, {"key": "D", "text": "A process that copies data from sources to a Data Warehouse guaranteeing the correctness of data with respect to the schema"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "*ingestione = boccone*: il problema è non strozzarsi quando il cibo arriva troppo in fretta (velocità!), non la qualità del cibo (esche: quality, transformation,…"}, {"id": "m072", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when a categorical attribute has a too large number of distinct values?", "options": [{"key": "A", "text": "Rescaling"}, {"key": "B", "text": "Non linear transformations"}, {"key": "C", "text": "Aggregation"}, {"key": "D", "text": "OneHot Encoding"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Aggregation»"}, {"id": "m073", "topic": "Clustering", "text": "Which of the statements below about Hierarchical Agglomerative Clustering is true?", "options": [{"key": "A", "text": "Requires the definition of Inertia of clusters"}, {"key": "B", "text": "Requires the definition of distance between sets of objects"}, {"key": "C", "text": "Is very efficient also with large datasets"}, {"key": "D", "text": "Is based on a well founded statistical model"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "se due attributi sono dipendenti (correlati), ne togli uno → la feature selection rimuove la ridondanza che viola l'ipotesi."}, {"id": "m074", "topic": "Classificazione & ML", "text": "Which of the following preprocessing activities is useful to build a Naive Bayes classifier if the independence hypothesis is violated?", "options": [{"key": "A", "text": "Discretisation"}, {"key": "B", "text": "Normalisation"}, {"key": "C", "text": "Standardisation"}, {"key": "D", "text": "Feature selection"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "gli attributi forti l'albero li usa SUBITO (in alto). Chi gioca solo nei bassifondi conta poco. (Esca A \"irrilevante\" è troppo assoluta — poco ≠ niente.)"}, {"id": "m075", "topic": "Classificazione & ML", "text": "In a decision tree, an attribute which is used only in nodes near the leaves...", "options": [{"key": "A", "text": "... is irrelevant with respect to the target"}, {"key": "B", "text": "guarantees high increment of purity"}, {"key": "C", "text": "... gives little insight with respect to the target"}, {"key": "D", "text": "... has a high correlation with respect to the target"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «gives · little · insight · respect»"}, {"id": "m076", "topic": "Preprocessing & dati", "text": "Which of the following is not a property of a metric distance function?", "options": [{"key": "A", "text": "Symmetry"}, {"key": "B", "text": "Positive definiteness"}, {"key": "C", "text": "Triangle inequality"}, {"key": "D", "text": "Boundedness"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "le proprietà vere sono Simmetria, Positività, Triangolo (\"SPT come SPeedTest\"). La limitatezza non è richiesta: la distanza può crescere all'infinito."}, {"id": "m077", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Boolean data?", "options": [{"key": "A", "text": "Euclidean distance"}, {"key": "B", "text": "Cosine distance"}, {"key": "C", "text": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no)."}, {"id": "m078", "topic": "Regressione", "text": "How can we measure the quality of a trained regression model?", "options": [{"key": "A", "text": "With a formula elaborating the difference between the forecast values and the true ones"}, {"key": "B", "text": "With a confusion matrix"}, {"key": "C", "text": "Counting the number of values correctly forecast"}, {"key": "D", "text": "With precision, recall and accuracy"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Esche: confusion matrix / precision-recall / conteggio dei corretti — tutte cose da classificazione. Regola: \"la regressione si giudica a distanza, la classificazione a…"}, {"id": "m079", "topic": "Association Rules", "text": "Which of the following statements regarding the discovery of association rules is true?", "options": [{"key": "A", "text": "The confidence of a rule can be computed starting from the supports of the itemsets"}, {"key": "B", "text": "The support of an itemset is anti-monotonic with respect to the composition of the itemset"}, {"key": "C", "text": "The support of a rule can be computed given the confidence of the rule"}, {"key": "D", "text": "The confidence of an itemset is anti-monotonic with respect to the composition of the itemset"}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "False: \"il support si ricava dalla confidence\" (verso sbagliato) e \"la confidence è anti-monotona\" (non lo è!). Memo: \"il SUPPORT è la materia prima\" — da lui derivi…"}, {"id": "m080", "topic": "Clustering", "text": "Which of the statements below is true regarding DBSCAN?", "options": [{"key": "A", "text": "Increasing the radius of the neighbourhood can decrease the number of noise points"}, {"key": "B", "text": "DBSCAN always stops to a configuration which gives the optimal number of clusters"}, {"key": "C", "text": "Sometimes DBSCAN stops to a configuration which does not include any cluster"}, {"key": "D", "text": "DBscan can give good performance when clusters have concavities"}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026", "hint": "Falsa sempre: \"DBSCAN always stops to the optimal number of clusters\" (di nuovo la regola dell'always)."}, {"id": "m081", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Drill-Down\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy"}, {"key": "B", "text": "Creates a link between concepts in interrelated cubes, to compare them"}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}, {"key": "D", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy"}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi."}, {"id": "m082", "topic": "Clustering", "text": "What is the purpose of updating the similarity matrix in agglomerative clustering?", "options": [{"key": "A", "text": "To calculate the pairwise similarity or distance between all clusters"}, {"key": "B", "text": "To reflect the changes after merging clusters"}, {"key": "C", "text": "To assign each data point to a cluster based on the final structure obtained from the dendrogram"}, {"key": "D", "text": "To determine the distance or similarity between clusters"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "73-72. Verità sull'agglomerative → ✅ B (richiede la definizione di distanza tra insiemi di oggetti — i linkage!)."}, {"id": "m083", "topic": "Classificazione & ML", "text": "The Information Gain is used to...", "options": [{"key": "A", "text": "Select the attribute which maximises, for a given training set, the ability to predict the class value"}, {"key": "B", "text": "Select the attribute which maximises, for a given test set, the ability to predict the class value"}, {"key": "C", "text": "Select the attribute which maximises, for a given training set, the ability to predict all the other attribute values"}, {"key": "D", "text": "Select the class with maximum probability"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Select · attribute · maximises · given»"}, {"id": "m084", "topic": "Classificazione & ML", "text": "In which mining activity can the Information Gain be useful?", "options": [{"key": "A", "text": "Discovery of association rules"}, {"key": "B", "text": "Classification"}, {"key": "C", "text": "Clustering"}, {"key": "D", "text": "Discretization"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "89-88. Alternativa all'Information Gain → ✅ B Gini Index."}, {"id": "m085", "topic": "Preprocessing & dati", "text": "Given the two binary vectors below, which is their similarity according to the Jaccard Coefficient? 1000101101 1011101010", "options": [{"key": "A", "text": "0.1"}, {"key": "B", "text": "0.2"}, {"key": "C", "text": "0.5"}, {"key": "D", "text": "0.375"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Metodo: Jaccard ignora le coppie 0-0: conta M11/(M11+M01+M10) = 3/8 = 0.375."}, {"id": "m086", "topic": "Clustering", "text": "What is the single linkage?", "options": [{"key": "A", "text": "A method to compute the distance between two objects, it can be used in hierarchical clustering"}, {"key": "B", "text": "A method to compute the distance between two sets of items, it can be used in hierarchical clustering"}, {"key": "C", "text": "A method to compute the distance between two classes, it can be used in decision trees"}, {"key": "D", "text": "A method to compute the separation of the objects inside a cluster"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Esca A: \"tra due oggetti\" — no, tra due set. Il linkage esiste proprio perché i cluster sono insiemi."}, {"id": "m087", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Expectation Maximisation"}, {"key": "B", "text": "Apriori"}, {"key": "C", "text": "K-means"}, {"key": "D", "text": "Decision Tree"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "96-95. Chi è il diverso? (DBSCAN, SVM, Neural Network, Decision Tree) → ✅ A DBSCAN (unico NON supervisionato tra classificatori)."}, {"id": "m088", "topic": "Clustering", "text": "Which of the following is a strength of the clustering algorithm DBSCAN?", "options": [{"key": "A", "text": "Requires to set the number of clusters as a parameter"}, {"key": "B", "text": "Ability to find cluster with concavities"}, {"key": "C", "text": "Ability to separate outliers from regular data"}, {"key": "D", "text": "Very fast by computation"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🟢 DBSCAN fine ma lento: outlier ok, concavità ok, densità DIVERSE ko. Tutto noise? ↓min_samples o ↑raggio."}, {"id": "m089", "topic": "Classificazione & ML", "text": "Which of the following measure can be used as an alternative to the Information Gain?", "options": [{"key": "A", "text": "Sihlouette Index"}, {"key": "B", "text": "Gini Index"}, {"key": "C", "text": "Rand Index"}, {"key": "D", "text": "Jaccard Index"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Gini · Index»"}, {"id": "m090", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Accuracy?", "options": [{"key": "A", "text": "TN/(TN+FP)"}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)"}, {"key": "C", "text": "TP/(TP+FN)"}, {"key": "D", "text": "TP/(TP+FP)"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4."}, {"id": "m091", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of DBSCAN?", "options": [{"key": "A", "text": "Clusters have concavities"}, {"key": "B", "text": "All the variables are the same range of values"}, {"key": "C", "text": "Presence of outliers"}, {"key": "D", "text": "Presence of clusters with different densities"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "eps è UNO solo per tutti — se un cluster è denso e uno rado, nessun eps va bene per entrambi. (Le concavità sono il suo punto di forza, esca A.)"}, {"id": "m092", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the support of the rule A,C -> B?", "options": [{"key": "A", "text": "100%"}, {"key": "B", "text": "20%"}, {"key": "C", "text": "40%"}, {"key": "D", "text": "50%"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%)."}, {"id": "m093", "topic": "BI & DWH", "text": "Associate the various Data Warehouse Architectures to the respective advantages: 1. Single Layer 2. Two Layers 3. Three Layers a. The workloads for analysis and daily operations are separated b. An intermediate level of consolidated data is available c. The occupation of space is minimised", "options": [{"key": "A", "text": "1-a, 2-b, 3-c"}, {"key": "B", "text": "1-c, 2-a, 3-b"}, {"key": "C", "text": "1-b, 2-c, 3-a"}, {"key": "D", "text": "1-c, 2-b, 3-a"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Mnemonica a scala: 1 piano = poco spazio (1→c: occupazione minimizzata); 2 piani = lavori separati (2→a: analisi e operazioni quotidiane separate); 3 piani = c'è il…"}, {"id": "m094", "topic": "Classificazione & ML", "text": "In a Neural Network, what is the backpropagation?", "options": [{"key": "A", "text": "The technique used to adjust the node weights according to the difference between the desired output and the output generated"}, {"key": "B", "text": "The technique used to adjust the weights limiting the probability of overfitting"}, {"key": "C", "text": "The technique used to adjust the output according to the difference between the desired weights and the actual weights"}, {"key": "D", "text": "The technique used to adjust the connection weights according to the difference between the desired output and the output generated by the network"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Esca A quasi identica: dice \"node weights\" invece di \"connection weights\" — i pesi stanno sulle connessioni, non sui nodi. \"I fili hanno il peso, non i pallini.\""}, {"id": "m095", "topic": "Preprocessing & dati", "text": "In feature selection, what is the Principal Component Analysis (PCA)?", "options": [{"key": "A", "text": "A mathematical technique used to transform non numeric attributes into numeric attributes"}, {"key": "B", "text": "A mathematical technique used to transform a set of numeric attributes into a smaller set of numeric attributes which capture most of the variability in data"}, {"key": "C", "text": "A heuristic technique used to find a subset of the attributes which produces the same classifier"}, {"key": "D", "text": "A mathematical technique used to find the principal attributes which determine the classification process"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Parole chiave da cercare nell'opzione giusta: \"smaller set\" + \"variability\". Esca: \"find the principal attributes\" — la PCA crea attributi nuovi (combinazioni), non…"}, {"id": "m096", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Dbscan"}, {"key": "B", "text": "SVM"}, {"key": "C", "text": "Neural Network"}, {"key": "D", "text": "Decision Tree"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🔍 La linea è sempre supervisionato vs non supervisionato: trova l'intruso rispetto a quella."}, {"id": "m097", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the purpose of the \"Schema on read\" strategy?", "options": [{"key": "A", "text": "Avoid preprocessing of data before writing"}, {"key": "B", "text": "Optimisation for various types of queries"}, {"key": "C", "text": "Possibility to extract data in various shapes"}, {"key": "D", "text": "Flexibility for any kind of query"}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto)."}, {"id": "m098", "topic": "Clustering", "text": "What measure is maximised by the Expectation Maximisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood of a class label, given the attributes of the example"}, {"key": "B", "text": "The likelihood of an attribute, given the class lab"}, {"key": "C", "text": "The likelihood of an example"}, {"key": "D", "text": "The support of a class"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎲 EM: probabilità, non distanze (l'unico non distance-based). Se c'è l'opzione 'distributions…parameters' è quella; sennò 'class label given attributes'."}, {"id": "m099", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following is not an objective of the aggregation of attributes?", "options": [{"key": "A", "text": "Reduce the variability of data"}, {"key": "B", "text": "Obtain a less detailed scale"}, {"key": "C", "text": "Reduce the number of attributes or objects"}, {"key": "D", "text": "Obtain a more detailed description of data"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso."}, {"id": "m100", "topic": "BI & DWH", "text": "Which of the activities below is part of \"Business Understanding\" in the CRISP methodology?", "options": [{"key": "A", "text": "Which data are available?"}, {"key": "B", "text": "Which machine learning functions are necessary for my problem?"}, {"key": "C", "text": "Which data must be collected with a specific campaign?"}, {"key": "D", "text": "Which are the resources available (manpower, hardware, software, ...)"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Le esche su \"quali dati\" appartengono a Data Understanding. Memo: \"Business = budget\" (risorse, vincoli, obiettivi aziendali)."}, {"id": "m101", "topic": "Preprocessing & dati", "text": "Which of the following situations could suggest the use of MinMax scaling?", "options": [{"key": "A", "text": "There are numeric attributes with very diverse value ranges"}, {"key": "B", "text": "There are attributes with very skewed data distributions"}, {"key": "C", "text": "There are attributes with a very large number of missing values"}, {"key": "D", "text": "There is a numeric attribute with values spread in a very large range"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Specchio della domanda 1. Le esche sono i punti di forza del DBMS: query key-based e aggiornamenti efficienti."}, {"id": "m102", "topic": "BI & DWH", "text": "Which of the following sentences describes an advantage of a Data Warehouse with respect to a standard DBMS?", "options": [{"key": "A", "text": "Allows efficient execution of key-based queries"}, {"key": "B", "text": "Manages efficiently data updates"}, {"key": "C", "text": "Has tools for helping to solve inconsistencies"}, {"key": "D", "text": "Allows analysis along the time dimension"}, {"key": "E", "text": "Allows efficient execution of multi-dimensional queries"}], "correct": ["C", "D", "E"], "note": "", "source": "banco 2026", "hint": "Esca B (\"tutti della stessa classe\"): non serve purezza perfetta per essere foglia — si decide a maggioranza."}, {"id": "m103", "topic": "Classificazione & ML", "text": "In a Decision Tree for classification, what is a leaf node?", "options": [{"key": "A", "text": "A node which assigns a class value to the objects passing the tests on the path from the root to the node itself"}, {"key": "B", "text": "A node where all the objects belong to the same class"}, {"key": "C", "text": "A node which allows classification without errors"}, {"key": "D", "text": "A node which assigns a class value only by majority of examples"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «node · assigns · class · value»"}, {"id": "m104", "topic": "Preprocessing & dati", "text": "Which is the purpose of discretisation?", "options": [{"key": "A", "text": "Increase the number of distinct values in an attribute"}, {"key": "B", "text": "Reduce the number of distinct values in an attribute, in order to increase the efficiency"}, {"key": "C", "text": "Reduce the number of distinct values in an attribute, in order to put in evidence possible patterns and regularities"}, {"key": "D", "text": "Reduce the range of values of a numeric attribute"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "⚠️ Trappola fine: l'esca B dice \"per aumentare l'efficienza\" — plausibile ma non è lo scopo didattico; il fine è vedere i pattern. \"Discretizzi per VEDERE, non per…"}, {"id": "m105", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Roll-Up\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy"}, {"key": "B", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}, {"key": "C", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them"}, {"key": "E", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy"}], "correct": ["E"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi."}, {"id": "m106", "topic": "Classificazione & ML", "text": "What is the Gini index?", "options": [{"key": "A", "text": "A measure of the entropy of a dataset"}, {"key": "B", "text": "An accuracy measure of a dataset alternative to the Information Gain"}, {"key": "C", "text": "An impurity measure of a dataset alternative to the Information Gain and to the Misclassification Index"}, {"key": "D", "text": "An impurity measure of a dataset alternative to overfitting and underfitting"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Tris collegato: Gini-Entropy-Misclassification sono i 3 fratelli dell'impurità in classificazione (la Silhouette è dell'altra famiglia, clustering — è per questo che…"}, {"id": "m107", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following are the objectives of the aggregation of attributes?", "options": [{"key": "A", "text": "Obtain a more detailed description of data"}, {"key": "B", "text": "Obtain a less detailed scale"}, {"key": "C", "text": "Reduce the variability of data"}, {"key": "D", "text": "Reduce the number of attributes or distinct values"}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso."}, {"id": "a001", "topic": "Classificazione & ML", "text": "Given the following definitions: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Which of the formulas below computes the precision of a binary classifier?", "options": [{"key": "A", "text": "TP / (TP + FP)"}, {"key": "B", "text": "(TP + TN) / (TP + FP + TN + FN)"}, {"key": "C", "text": "TN / (TN + FP)"}, {"key": "D", "text": "TP / (TP + FN)"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4."}, {"id": "a002", "topic": "Preprocessing & dati", "text": "Which of the statements below is true?", "options": [{"key": "A", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters"}, {"key": "B", "text": "K-means always stop to a configuration which gives the minimum distortion for the chosen value of the number of clusters"}, {"key": "C", "text": "K-means works well also with datasets having a very large number of attributes"}, {"key": "D", "text": "K-means finds the number of clusters which give the minimum distortion"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Sometimes · k-means · stops · configuration»"}, {"id": "a003", "topic": "Preprocessing & dati", "text": "Which of the statements below is false?", "options": [{"key": "A", "text": "Increasing the radius of the neighourhood can decrease the number of noise points"}, {"key": "B", "text": "DBSCAN always stops to a configuration which gives the optimal number of clusters"}, {"key": "C", "text": "Sometimes DBSCAN stops to a configuration which does not include any cluster"}, {"key": "D", "text": "DBScan can give good performance when clusters have concavities"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «DBSCAN · always · stops · configuration»"}, {"id": "a004", "topic": "Classificazione & ML", "text": "What are the hyperparameters of a Neural Network? (Possibly non exhaustive)", "options": [{"key": "A", "text": "Hidden layers structure, Output layer structure, Activation function, Number of epochs"}, {"key": "B", "text": "Network structure, Learning rate, Backpropagation algorithm, Number of epochs"}, {"key": "C", "text": "Input layers structure, Learning rate, Activation function, Number of epochs"}, {"key": "D", "text": "Hidden layers structure, Learning rate, Activation function, Number of epochs"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧠 HLAN: Hidden layers, Learning rate, Activation, N. epoche. LR=moltiplicatore della correzione · Backprop=aggiusta i pesi delle CONNESSIONI."}, {"id": "a005", "topic": "Association Rules", "text": "Consider the transactional dataset below. Which is the Confidence of the rule \"B -> E\"?  ID Items  1 A,B,C  2 A,B,D  3 B,D,E  4 C,D  5 A,C,D,E", "options": [{"key": "A", "text": "100%"}, {"key": "B", "text": "50%"}, {"key": "C", "text": "33%"}, {"key": "D", "text": "20%"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%)."}, {"id": "a006", "topic": "Association Rules", "text": "Name the following rule evaluation formula: sup(AuC) - sup(A)sup(C)", "options": [{"key": "A", "text": "Leverage"}, {"key": "B", "text": "Lift"}, {"key": "C", "text": "Confidence"}, {"key": "D", "text": "Conviction"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Leverage»"}, {"id": "a007", "topic": "Association Rules", "text": "Name the following rule evaluation formula: conf(A->C) / sup(C)", "options": [{"key": "A", "text": "Leverage"}, {"key": "B", "text": "Lift"}, {"key": "C", "text": "Confidence"}, {"key": "D", "text": "Conviction"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Lift»"}, {"id": "a008", "topic": "Association Rules", "text": "Name the following rule evaluation formula: sup(A->C) / sup(A)", "options": [{"key": "A", "text": "Leverage"}, {"key": "B", "text": "Lift"}, {"key": "
