ic": "Association Rules", "text": "What is the meaning of the statement \"the support is anti-monotone\"?", "options": [{"key": "A", "text": "The support of an itemset never exceeds the support if its subsets", "it": "Il support di un itemset non supera mai il support dei suoi subsets"}, {"key": "B", "text": "The support of an itemset is always smaller than the support of its supersets", "it": "Il support di un itemset è sempre minore del support dei suoi supersets"}, {"key": "C", "text": "The support of an itemsets never exceeds the support if its supersets", "it": "Il support di un itemset non supera mai il support dei suoi supersets"}, {"key": "D", "text": "The support of an itemset is always smaller than the support of its subsets", "it": "Il support di un itemset è sempre minore del support dei suoi subsets"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "aggiungere item può solo restringere le transazioni che li contengono tutti. ⚠️ Le 4 opzioni sono permutazioni di subset/superset e never-exceeds/always-smaller: la…", "it_q": "Qual è il significato dell'affermazione \"the support is anti-monotone\"?", "it_a": "Il support di un itemset non supera mai il support dei suoi sottoinsiemi"}, {"id": "m046", "topic": "Association Rules", "text": "How does pruning work when generating frequent itemsets?", "options": [{"key": "A", "text": "If an itemset is not frequent, then none of its supersets can be frequent, therefore the frequencies of the supersets are not evaluated", "it": "Se un itemset non è frequent, allora nessuno dei suoi supersets può essere frequent, quindi le frequenze dei supersets non vengono valutate"}, {"key": "B", "text": "If an itemset is frequent, then none of its supersets can be frequent, therefore the frequencies of the supersets are not evaluated", "it": "Se un itemset è frequent, allora nessuno dei suoi supersets può essere frequent, quindi le frequenze dei supersets non vengono valutate"}, {"key": "C", "text": "If an itemset is not frequent, then none of its subsets can be frequent, therefore the frequencies of the subsets are not evaluated", "it": "Se un itemset non è frequent, allora nessuno dei suoi subsets può essere frequent, quindi le frequenze dei subsets non vengono valutate"}, {"key": "D", "text": "If an itemset is frequent, then none of its subsets can be frequent, therefore the frequencies of the subsets are not evaluated", "it": "Se un itemset è frequent, allora nessuno dei suoi subsets può essere frequent, quindi le frequenze dei subsets non vengono valutate"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "È l'anti-monotonicità usata al contrario: il ramo morto non rifiorisce.", "it_q": "Come funziona il pruning nella generazione dei frequent itemsets?", "it_a": "Se un itemset non è frequente, allora nessuno dei suoi superset può essere frequente, quindi le frequenze dei superset non vengono valutate"}, {"id": "m047", "topic": "Association Rules", "text": "Which formula computes the Confidence of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))", "it": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence.", "it_q": "Quale formula calcola la Confidence di una regola (A -> C)?", "it_a": "sup(A -> C) / sup(A)"}, {"id": "m048", "topic": "Preprocessing & dati", "text": "Given the two binary vectors below, which is their similarity according to the Simple Matching Coefficient? 1000101101 1011101010", "options": [{"key": "A", "text": "0.1", "it": "0.1"}, {"key": "B", "text": "0.3", "it": "0.3"}, {"key": "C", "text": "0.5", "it": "0.5"}, {"key": "D", "text": "0.2", "it": "0.2"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Metodo: SMC = posizioni uguali / totale. Confronta cifra per cifra: 5 match su 10 → 0.5.", "it_q": "Dati i due vettori binari seguenti, qual è la loro similarità secondo il Simple Matching Coefficient? 1000101101 1011101010", "it_a": "0.5"}, {"id": "m049", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the operations below performs aggregation?", "options": [{"key": "A", "text": "Combination of two attributes in order to obtatn a more general attribute with smaller variability", "it": "Combinazione di due attributi al fine di ottenere un attributo più generale con minore variabilità"}, {"key": "B", "text": "Reduction of the number of distinct values of an attribute in order to reduce its variability", "it": "Riduzione del numero di valori distinti di un attributo al fine di ridurne la variabilità"}, {"key": "C", "text": "Reduction of the number of rows of the dataset by applying a grouping on one or more attributes and computing the measures as the results of aggregation functions", "it": "Riduzione del numero di righe del dataset applicando un raggruppamento su uno o più attributi e calcolando le misure come risultati di funzioni di aggregazione"}, {"key": "D", "text": "Combination of two or more datasets in order to obtatn more Information", "it": "Combinazione di due o più dataset al fine di ottenere più informazioni"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "In data preprocessing, quale delle operazioni seguenti esegue l'aggregazione?", "it_a": "Riduzione del numero di valori distinti di un attributo per ridurne la variabilità ; Riduzione del numero di righe del dataset applicando un raggruppamento su uno o più attributi e calcolando le misure come risultato di funzioni di aggregazione"}, {"id": "m050", "topic": "Clustering", "text": "After fitting DBSCAN with the default parameter values the results are: 0 clusters, 100% of noise points. Which will be your next trial?", "options": [{"key": "A", "text": "Reduce the minimum number of objects in the neighborhood", "it": "Ridurre il numero minimo di oggetti nel vicinato"}, {"key": "B", "text": "Reduce the minimum number of objects in the neighborhood and the radius of the neighborhood", "it": "Ridurre il numero minimo di oggetti nel vicinato e il raggio del vicinato"}, {"key": "C", "text": "Increase the radius of the neighborhood", "it": "Aumentare il raggio del vicinato"}, {"key": "D", "text": "Decrease the radius of the neighborhood", "it": "Diminuire il raggio del vicinato"}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "Ragionamento fisico: nessuna zona risulta \"densa\" → o abbassi l'asticella della densità (meno punti richiesti) o allarghi il cerchio in cui conti i punti. Entrambe le…", "it_q": "Dopo aver fittato DBSCAN con i valori di default dei parametri i risultati sono: 0 cluster, 100% di noise points. Quale sarà il tuo prossimo tentativo?", "it_a": "Riduci il numero minimo di oggetti nel vicinato ; Aumenta il raggio del vicinato"}, {"id": "m051", "topic": "Clustering", "text": "Which of the following clustering methods is not based on distances between objects?", "options": [{"key": "A", "text": "Hierarchical Agglomerative", "it": "Gerarchico Agglomerativo"}, {"key": "B", "text": "DBSCAN", "it": "DBSCAN"}, {"key": "C", "text": "K-Means", "it": "K-Means"}, {"key": "D", "text": "Expectation Maximization", "it": "Expectation Maximization"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "EM ragiona per probabilità (likelihood), non per metri. Gli altri tre (KMeans, DBSCAN, gerarchico) vivono di distanze.", "it_q": "Quale dei seguenti metodi di clustering non si basa sulle distanze tra gli oggetti?", "it_a": "Expectation Maximization"}, {"id": "m052", "topic": "Association Rules", "text": "Which of the statements below best describes the strategy of Apriori in finding the frequent itemsets?", "options": [{"key": "A", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are considered only at the end", "it": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca sono considerate solo alla fine"}, {"key": "B", "text": "Evaluation of the confidence of the itemsets in an order such that uninteresting parts of the search space are pruned", "it": "Valutazione della confidence degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca sono potate"}, {"key": "C", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible", "it": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca sono potate il prima possibile"}, {"key": "D", "text": "Evaluation of the support of the itemsets in an order such that the interesting parts of the search space are pruned", "it": "Valutazione del support degli itemset in un ordine tale che le parti interessanti dello spazio di ricerca sono potate"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Parole chiave: \"support\" (non confidence!) + \"pruned as soon as possible\".", "it_q": "Quale delle seguenti affermazioni descrive meglio la strategia di Apriori nel trovare i frequent itemsets?", "it_a": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca vengano pruned il prima possibile"}, {"id": "m053", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Silhouette Index", "it": "Indice di Silhouette"}, {"key": "B", "text": "Misclassification Error", "it": "Errore di misclassificazione"}, {"key": "C", "text": "Entropy", "it": "Entropia"}, {"key": "D", "text": "Gini Index", "it": "Indice di Gini"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "2. Chi è il diverso? (EM, Decision Tree, K-means, DBSCAN) → ✅ B Decision Tree (supervisionato tra clusterer).", "it_q": "Quale è diverso dagli altri?", "it_a": "Silhouette Index"}, {"id": "m054", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Transformation step?", "options": [{"key": "A", "text": "Usage of dictionaries to solve inconsistencies", "it": "Uso di dizionari per risolvere le inconsistenze"}, {"key": "B", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali"}, {"key": "C", "text": "Denormalisation", "it": "Denormalizzazione"}, {"key": "D", "text": "Calculation of derived data", "it": "Calcolo di dati derivati"}], "correct": ["C", "D"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Transformation?", "it_a": "Denormalizzazione ; Calcolo di dati derivati"}, {"id": "m055", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Vector space with real values?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Distanza euclidea"}, {"key": "B", "text": "Cosine distance", "it": "Distanza coseno"}, {"key": "C", "text": "Manhattan distance", "it": "Distanza di Manhattan"}, {"key": "D", "text": "Jaccard coefficient", "it": "Coefficiente di Jaccard"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "il DWH risponde a domande analitiche/aggregate (massimi, totali per dimensione, relazioni). Le esche sono query operative puntuali (\"stock del prodotto X nel magazzino…", "it_q": "Quale funzione di distanza è più adatta per uno spazio vettoriale con valori reali?", "it_a": "Euclidean distance"}, {"id": "m056", "topic": "BI & DWH", "text": "Which of the following are typical data warehouse queries?", "options": [{"key": "A", "text": "Which products maximize the profit?", "it": "Quali prodotti massimizzano il profitto?"}, {"key": "B", "text": "Which is the stock of product \"XXX\" in the \"YYY\" warehouse?", "it": "Qual è lo stock del prodotto \"XXX\" nel magazzino \"YYY\"?"}, {"key": "C", "text": "What is the total revenue of yesterday in shop \"BO03\"?", "it": "Qual è il ricavo totale di ieri nel negozio \"BO03\"?"}, {"key": "D", "text": "What is the total revenue per product category and state?", "it": "Qual è il ricavo totale per categoria di prodotto e stato?"}, {"key": "E", "text": "What is the relationship between profits gained by products \"WWW\" and \"ZZZ\"?", "it": "Qual è la relazione tra i profitti ottenuti dai prodotti \"WWW\" e \"ZZZ\"?"}], "correct": ["A", "D", "E"], "note": "", "source": "banco 2026", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake).", "it_q": "Quali delle seguenti sono tipiche query di data warehouse?", "it_a": "Quali prodotti massimizzano il profitto? ; Qual è il ricavo totale per categoria di prodotto e stato? ; Qual è la relazione tra i profitti ottenuti dai prodotti \"WWW\" e \"ZZZ\"?"}, {"id": "m057", "topic": "Classificazione & ML", "text": "When developing a classifier, which of the following is a symptom of overfitting?", "options": [{"key": "A", "text": "The error rate in the test set is much smaller than the error rate in the training set", "it": "Il tasso di errore nel test set è molto inferiore a quello nel training set"}, {"key": "B", "text": "The precision is much greater than the recall", "it": "La precision è molto maggiore della recall"}, {"key": "C", "text": "The error rate in the test set is more than 30%", "it": "Il tasso di errore nel test set è superiore al 30%"}, {"key": "D", "text": "The error rate in the test set is much greater than the error rate in the training set", "it": "Il tasso di errore nel test set è molto superiore a quello nel training set"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Già nostro pane quotidiano (01b §3.2). L'esca A è l'inverso (test molto migliore del train — semmai un colpo di fortuna o un leak).", "it_q": "Quando si sviluppa un classifier, quale dei seguenti è un sintomo di overfitting?", "it_a": "Il tasso di errore nel test set è molto maggiore di quello nel training set"}, {"id": "m058", "topic": "Association Rules", "text": "Which formula computes the Leverage of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))", "it": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence.", "it_q": "Quale formula calcola il Leverage di una regola (A -> C)?", "it_a": "sup(A U C) - sup(A)sup(C)"}, {"id": "m059", "topic": "BI & DWH", "text": "In which part of the CRISP methodology we perform the test design activity?", "options": [{"key": "A", "text": "Data Understanding", "it": "Comprensione dei Dati"}, {"key": "B", "text": "Evaluation", "it": "Valutazione"}, {"key": "C", "text": "Business Understanding", "it": "Comprensione del Business"}, {"key": "D", "text": "Modeling", "it": "Modellazione"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Controintuitiva (verrebbe da dire Evaluation!): il disegno del test si fa mentre si modella, la valutazione dopo. Mnemonica: \"prepari l'esame quando studi (modeling),…", "it_q": "In quale parte della metodologia CRISP si esegue l'attività di test design?", "it_a": "Modeling"}, {"id": "m060", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Pivot\"?", "options": [{"key": "A", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy", "it": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia"}, {"key": "B", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia"}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia il layout, per analizzare un gruppo di dati da un diverso punto di vista"}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them", "it": "Crea un collegamento tra concetti in cubi interrelati, per confrontarli"}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle definizioni seguenti descrive l'operazione OLAP \"Pivot\"?", "it_a": "Cambia il layout, in modo da analizzare un gruppo di dati da un punto di vista diverso"}, {"id": "m061", "topic": "Preprocessing & dati", "text": "Which is the main reason for the standardization of numeric attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions", "it": "Cambia la distribuzione degli attributi numerici per ottenere distribuzioni gaussiane"}, {"key": "B", "text": "Map all the numeric attributes to a new range such that the mean is zero and the variance is one", "it": "Mappa tutti gli attributi numerici in un nuovo intervallo in modo che la media sia zero e la varianza sia uno"}, {"key": "C", "text": "Map all the nominal attributes to the same range", "it": "Mappa tutti gli attributi nominali nello stesso intervallo"}, {"key": "D", "text": "Remove non-standard values", "it": "Rimuovi i valori non standard"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «numeric · attributes · range · such»", "it_q": "Qual è il motivo principale della standardizzazione degli attributi numerici?", "it_a": "Mappa tutti gli attributi numerici a un nuovo intervallo tale che la media sia zero e la varianza sia uno"}, {"id": "m062", "topic": "Clustering", "text": "How is the number of clusters determined in agglomerative clustering?", "options": [{"key": "A", "text": "By assigning each data point to a cluster based on the final structure", "it": "Assegnando ogni punto dati a un cluster in base alla struttura finale"}, {"key": "B", "text": "By cutting the dendrogram at a certain height", "it": "Tagliando il dendrogramma a una certa altezza"}, {"key": "C", "text": "By merging the closest clusters", "it": "Unendo i cluster più vicini"}, {"key": "D", "text": "By computing the pairwise similarity", "it": "Calcolando la similarità a coppie"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🏆 Torneo: si parte singoli, si fondono i più vicini (serve distanza tra SET=linkage), tabellone=dendrogramma, k=dove lo tagli.", "it_q": "Come si determina il numero di cluster nell'agglomerative clustering?", "it_a": "Tagliando il dendrogram a una certa altezza"}, {"id": "m063", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Cleansing step?", "options": [{"key": "A", "text": "Elimination of duplicates", "it": "Eliminazione dei duplicati"}, {"key": "B", "text": "Association of a timestamp to the operational data", "it": "Associazione di un timestamp ai dati operazionali"}, {"key": "C", "text": "Usage of dictionaries to solve inconsistencies", "it": "Uso di dizionari per risolvere le inconsistenze"}, {"key": "D", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali"}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Cleansing?", "it_a": "Eliminazione dei duplicati ; Utilizzo di dizionari per risolvere le inconsistenze"}, {"id": "m064", "topic": "Clustering", "text": "Which of the statements below is true about K-Means?", "options": [{"key": "A", "text": "K-mean always stops to a configuration which gives the minimum distortion for the chosen value of the number of clusters", "it": "K-mean si ferma sempre su una configurazione che dà la distorsione minima per il valore scelto del numero di cluster"}, {"key": "B", "text": "K-means is very sensitive to the initial assignment of the centers", "it": "K-means è molto sensibile all'assegnazione iniziale dei centri"}, {"key": "C", "text": "K-means is quite efficient even for large datasets", "it": "K-means è abbastanza efficiente anche per dataset di grandi dimensioni"}, {"key": "D", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters", "it": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster"}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026", "hint": "🤖 KMeans veloce ma pigro: efficiente, sensibile ai centri iniziali, si siede sul primo minimo locale. 'Always' è sempre falso.", "it_q": "Quale delle seguenti affermazioni è vera riguardo a K-Means?", "it_a": "K-means è molto sensibile all'assegnazione iniziale dei centri ; K-means è abbastanza efficiente anche per dataset di grandi dimensioni ; A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster"}, {"id": "m065", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of K-Means?", "options": [{"key": "A", "text": "Presence of values with high frequency", "it": "Presenza di valori con alta frequenza"}, {"key": "B", "text": "Presence of outliers", "it": "Presenza di outlier"}, {"key": "C", "text": "All the variables have the same distribution of values", "it": "Tutte le variabili hanno la stessa distribuzione di valori"}, {"key": "D", "text": "All the variables have the same range of values", "it": "Tutte le variabili hanno lo stesso intervallo di valori"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "i centroidi sono medie, e le medie si fanno trascinare dagli outlier.", "it_q": "Quale delle seguenti caratteristiche dei dati può ridurre l'efficacia di K-Means?", "it_a": "Presenza di outlier"}, {"id": "m066", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Precision?", "options": [{"key": "A", "text": "TP/(TP+FP)", "it": "TP/(TP+FP)"}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)", "it": "(TP+TN)/(TP+FP+TN+FN)"}, {"key": "C", "text": "TN/(TN+FP)", "it": "TN/(TN+FP)"}, {"key": "D", "text": "TP/(TP+FN)", "it": "TP/(TP+FN)"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le definizioni: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Quale formula calcola la Precision?", "it_a": "TP/(TP+FP)"}, {"id": "m067", "topic": "Preprocessing & dati", "text": "Which of the following is not an objective of feature selection?", "options": [{"key": "A", "text": "Select the features with higher range, which have more influence on the computation", "it": "Seleziona le feature con intervallo maggiore, che hanno più influenza sul calcolo"}, {"key": "B", "text": "Reduce time and memory complexity of the mining algorithms", "it": "Riduci la complessità temporale e di memoria degli algoritmi di mining"}, {"key": "C", "text": "Reduce the effect of noise", "it": "Riduci l'effetto del rumore"}, {"key": "D", "text": "Avoid the curse of dimensionality", "it": "Evita la maledizione della dimensionalità"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "il range non c'entra nulla con l'importanza (anzi, è il motivo per cui si scala!). Gli obiettivi veri: meno tempo/memoria, meno rumore, meno curse of dimensionality.", "it_q": "Quale dei seguenti non è un obiettivo della feature selection?", "it_a": "Seleziona le feature con range maggiore, che hanno più influenza sul calcolo"}, {"id": "m068", "topic": "Association Rules", "text": "Which formula computes the Lift of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))", "it": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence.", "it_q": "Quale formula calcola il Lift di una regola (A -> C)?", "it_a": "conf(A -> C) / sup(C)"}, {"id": "m069", "topic": "Clustering", "text": "What measure is maximised by the Expectation Masimisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood the distributions, defined by the parameters found, given the data available", "it": "La likelihood delle distribuzioni, definite dai parametri trovati, dati i dati disponibili"}, {"key": "B", "text": "The likelihood of an example", "it": "La likelihood di un esempio"}, {"key": "C", "text": "The support of a class", "it": "Il support di una classe"}, {"key": "D", "text": "The likelihood of an attribute, given the class label", "it": "La likelihood di un attributo, dato il class label"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «likelihood · distributions · defined · parameters»", "it_q": "Quale misura viene massimizzata dall'algoritmo Expectation Maximisation per il clustering?", "it_a": "La likelihood delle distribuzioni, definite dai parametri trovati, dato i dati disponibili"}, {"id": "m070", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the operations below performs aggregation?", "options": [{"key": "A", "text": "Combination of two attributes in order to obtain a more general attribute with smaller variability", "it": "Combinazione di due attributi per ottenere un attributo più generale con minore variabilità"}, {"key": "B", "text": "Reduction of the number of distinct values of an attribute in order to reduce its variability", "it": "Riduzione del numero di valori distinti di un attributo per ridurne la variabilità"}, {"key": "C", "text": "Reduction of the number of rows of the dataset by applying a grouping on one or more attributes and computing the measures as the results of aggregation functions", "it": "Riduzione del numero di righe del dataset tramite raggruppamento su uno o più attributi e calcolo delle misure come risultati di funzioni di aggregazione"}, {"key": "D", "text": "Combination of two or more datasets in order to obtain more Information", "it": "Combinazione di due o più dataset per ottenere maggiori informazioni"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "In data preprocessing, quale delle operazioni seguenti esegue l'aggregazione?", "it_a": "Riduzione del numero di valori distinti di un attributo per ridurne la variabilità ; Riduzione del numero di righe del dataset applicando un raggruppamento su uno o più attributi e calcolando le misure come risultato di funzioni di aggregazione"}, {"id": "m071", "topic": "BI & DWH", "text": "What is Data Ingestion?", "options": [{"key": "A", "text": "A process that copies data from sources to a repository, taking care of possible differences in speed between the generation and the storing process", "it": "Un processo che copia i dati dalle sorgenti a un repository, tenendo conto di possibili differenze di velocità tra generazione e memorizzazione"}, {"key": "B", "text": "A process that copies data from sources to a repository, ensuring high data quality", "it": "Un processo che copia i dati dalle sorgenti a un repository, garantendo alta qualità dei dati"}, {"key": "C", "text": "A process that copies data from sources to a repository, making the transformation required by the users", "it": "Un processo che copia i dati dalle sorgenti a un repository, effettuando le trasformazioni richieste dagli utenti"}, {"key": "D", "text": "A process that copies data from sources to a Data Warehouse guaranteeing the correctness of data with respect to the schema", "it": "Un processo che copia i dati dalle sorgenti a un Data Warehouse garantendo la correttezza dei dati rispetto allo schema"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "*ingestione = boccone*: il problema è non strozzarsi quando il cibo arriva troppo in fretta (velocità!), non la qualità del cibo (esche: quality, transformation,…", "it_q": "Che cos'è la Data Ingestion?", "it_a": "Un processo che copia i dati dalle sorgenti a un repository, gestendo le possibili differenze di velocità tra generazione e memorizzazione"}, {"id": "m072", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when a categorical attribute has a too large number of distinct values?", "options": [{"key": "A", "text": "Rescaling", "it": "Riscalamento"}, {"key": "B", "text": "Non linear transformations", "it": "Trasformazioni non lineari"}, {"key": "C", "text": "Aggregation", "it": "Aggregazione"}, {"key": "D", "text": "OneHot Encoding", "it": "OneHot Encoding"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Aggregation»", "it_q": "Quale attività di preprocessing è appropriata quando un attributo categorico ha un numero troppo elevato di valori distinti?", "it_a": "Aggregazione"}, {"id": "m073", "topic": "Clustering", "text": "Which of the statements below about Hierarchical Agglomerative Clustering is true?", "options": [{"key": "A", "text": "Requires the definition of Inertia of clusters", "it": "Richiede la definizione dell'inerzia dei cluster"}, {"key": "B", "text": "Requires the definition of distance between sets of objects", "it": "Richiede la definizione della distanza tra insiemi di oggetti"}, {"key": "C", "text": "Is very efficient also with large datasets", "it": "È molto efficiente anche con dataset di grandi dimensioni"}, {"key": "D", "text": "Is based on a well founded statistical model", "it": "Si basa su un modello statistico ben fondato"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "se due attributi sono dipendenti (correlati), ne togli uno → la feature selection rimuove la ridondanza che viola l'ipotesi.", "it_q": "Quale delle seguenti affermazioni sull'Hierarchical Agglomerative Clustering è vera?", "it_a": "Richiede la definizione di distanza tra insiemi di oggetti"}, {"id": "m074", "topic": "Classificazione & ML", "text": "Which of the following preprocessing activities is useful to build a Naive Bayes classifier if the independence hypothesis is violated?", "options": [{"key": "A", "text": "Discretisation", "it": "Discretizzazione"}, {"key": "B", "text": "Normalisation", "it": "Normalizzazione"}, {"key": "C", "text": "Standardisation", "it": "Standardizzazione"}, {"key": "D", "text": "Feature selection", "it": "Selezione delle feature"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "gli attributi forti l'albero li usa SUBITO (in alto). Chi gioca solo nei bassifondi conta poco. (Esca A \"irrilevante\" è troppo assoluta — poco ≠ niente.)", "it_q": "Quale delle seguenti attività di preprocessing è utile per costruire un Naive Bayes classifier se l'ipotesi di indipendenza è violata?", "it_a": "Feature selection"}, {"id": "m075", "topic": "Classificazione & ML", "text": "In a decision tree, an attribute which is used only in nodes near the leaves...", "options": [{"key": "A", "text": "... is irrelevant with respect to the target", "it": "... è irrilevante rispetto al target"}, {"key": "B", "text": "guarantees high increment of purity", "it": "garantisce un alto incremento di purezza"}, {"key": "C", "text": "... gives little insight with respect to the target", "it": "... fornisce poca informazione rispetto al target"}, {"key": "D", "text": "... has a high correlation with respect to the target", "it": "... ha un'alta correlazione rispetto al target"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «gives · little · insight · respect»", "it_q": "In un decision tree, un attributo che viene usato solo nei nodi vicini alle foglie...", "it_a": "... fornisce poco insight rispetto al target"}, {"id": "m076", "topic": "Preprocessing & dati", "text": "Which of the following is not a property of a metric distance function?", "options": [{"key": "A", "text": "Symmetry", "it": "Simmetria"}, {"key": "B", "text": "Positive definiteness", "it": "Definita positiva"}, {"key": "C", "text": "Triangle inequality", "it": "Disuguaglianza triangolare"}, {"key": "D", "text": "Boundedness", "it": "Limitatezza"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "le proprietà vere sono Simmetria, Positività, Triangolo (\"SPT come SPeedTest\"). La limitatezza non è richiesta: la distanza può crescere all'infinito.", "it_q": "Quale dei seguenti non è una proprietà di una funzione di distanza metrica?", "it_a": "Boundedness"}, {"id": "m077", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Boolean data?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Distanza euclidea"}, {"key": "B", "text": "Cosine distance", "it": "Distanza coseno"}, {"key": "C", "text": "Manhattan distance", "it": "Distanza di Manhattan"}, {"key": "D", "text": "Jaccard coefficient", "it": "Coefficiente di Jaccard"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Quale funzione di distanza è più adatta per dati booleani?", "it_a": "Coefficiente di Jaccard"}, {"id": "m078", "topic": "Regressione", "text": "How can we measure the quality of a trained regression model?", "options": [{"key": "A", "text": "With a formula elaborating the difference between the forecast values and the true ones", "it": "Con una formula che calcola la differenza tra i valori previsti e quelli reali"}, {"key": "B", "text": "With a confusion matrix", "it": "Con una matrice di confusione"}, {"key": "C", "text": "Counting the number of values correctly forecast", "it": "Contando il numero di valori previsti correttamente"}, {"key": "D", "text": "With precision, recall and accuracy", "it": "Con precisione, recall e accuratezza"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Esche: confusion matrix / precision-recall / conteggio dei corretti — tutte cose da classificazione. Regola: \"la regressione si giudica a distanza, la classificazione a…", "it_q": "Come si può misurare la qualità di un modello di regressione addestrato?", "it_a": "Con una formula che elabora la differenza tra i valori previsti e quelli reali"}, {"id": "m079", "topic": "Association Rules", "text": "Which of the following statements regarding the discovery of association rules is true?", "options": [{"key": "A", "text": "The confidence of a rule can be computed starting from the supports of the itemsets", "it": "La confidence di una regola può essere calcolata a partire dai support degli itemset"}, {"key": "B", "text": "The support of an itemset is anti-monotonic with respect to the composition of the itemset", "it": "Il support di un itemset è anti-monotono rispetto alla composizione dell'itemset"}, {"key": "C", "text": "The support of a rule can be computed given the confidence of the rule", "it": "Il support di una regola può essere calcolato data la confidence della regola"}, {"key": "D", "text": "The confidence of an itemset is anti-monotonic with respect to the composition of the itemset", "it": "La confidence di un itemset è anti-monotona rispetto alla composizione dell'itemset"}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "False: \"il support si ricava dalla confidence\" (verso sbagliato) e \"la confidence è anti-monotona\" (non lo è!). Memo: \"il SUPPORT è la materia prima\" — da lui derivi…", "it_q": "Quale delle seguenti affermazioni riguardanti la scoperta di regole di associazione è vera?", "it_a": "La confidence di una regola può essere calcolata a partire dai support degli itemset ; Il support di un itemset è anti-monotono rispetto alla composizione dell'itemset"}, {"id": "m080", "topic": "Clustering", "text": "Which of the statements below is true regarding DBSCAN?", "options": [{"key": "A", "text": "Increasing the radius of the neighbourhood can decrease the number of noise points", "it": "Aumentando il raggio del vicinato si può diminuire il numero di punti di rumore"}, {"key": "B", "text": "DBSCAN always stops to a configuration which gives the optimal number of clusters", "it": "DBSCAN si ferma sempre a una configurazione che fornisce il numero ottimale di cluster"}, {"key": "C", "text": "Sometimes DBSCAN stops to a configuration which does not include any cluster", "it": "A volte DBSCAN si ferma a una configurazione che non include alcun cluster"}, {"key": "D", "text": "DBscan can give good performance when clusters have concavities", "it": "DBSCAN può dare buone prestazioni quando i cluster hanno concavità"}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026", "hint": "Falsa sempre: \"DBSCAN always stops to the optimal number of clusters\" (di nuovo la regola dell'always).", "it_q": "Quale delle seguenti affermazioni è vera riguardo a DBSCAN?", "it_a": "Aumentare il raggio del vicinato può diminuire il numero di punti di rumore ; A volte DBSCAN si ferma su una configurazione che non include alcun cluster ; DBSCAN può dare buone performance quando i cluster hanno concavità"}, {"id": "m081", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Drill-Down\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia"}, {"key": "B", "text": "Creates a link between concepts in interrelated cubes, to compare them", "it": "Crea un collegamento tra concetti in cubi correlati, per confrontarli"}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia la disposizione, per analizzare un gruppo di dati da un punto di vista diverso"}, {"key": "D", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy", "it": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia"}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle seguenti definizioni descrive l'operazione OLAP \"Drill-Down\"?", "it_a": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia"}, {"id": "m082", "topic": "Clustering", "text": "What is the purpose of updating the similarity matrix in agglomerative clustering?", "options": [{"key": "A", "text": "To calculate the pairwise similarity or distance between all clusters", "it": "Per calcolare la similarità o distanza a coppie tra tutti i cluster"}, {"key": "B", "text": "To reflect the changes after merging clusters", "it": "Per riflettere i cambiamenti dopo l'unione dei cluster"}, {"key": "C", "text": "To assign each data point to a cluster based on the final structure obtained from the dendrogram", "it": "Per assegnare ogni punto dati a un cluster in base alla struttura finale ottenuta dal dendrogramma"}, {"key": "D", "text": "To determine the distance or similarity between clusters", "it": "Per determinare la distanza o similarità tra i cluster"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "73-72. Verità sull'agglomerative → ✅ B (richiede la definizione di distanza tra insiemi di oggetti — i linkage!).", "it_q": "Qual è lo scopo dell'aggiornamento della matrice di similarità nel clustering agglomerativo?", "it_a": "Per riflettere i cambiamenti dopo l'unione dei cluster"}, {"id": "m083", "topic": "Classificazione & ML", "text": "The Information Gain is used to...", "options": [{"key": "A", "text": "Select the attribute which maximises, for a given training set, the ability to predict the class value", "it": "Seleziona l'attributo che massimizza, per un dato training set, la capacità di predire il valore della classe"}, {"key": "B", "text": "Select the attribute which maximises, for a given test set, the ability to predict the class value", "it": "Seleziona l'attributo che massimizza, per un dato test set, la capacità di predire il valore della classe"}, {"key": "C", "text": "Select the attribute which maximises, for a given training set, the ability to predict all the other attribute values", "it": "Seleziona l'attributo che massimizza, per un dato training set, la capacità di predire tutti gli altri valori degli attributi"}, {"key": "D", "text": "Select the class with maximum probability", "it": "Seleziona la classe con probabilità massima"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Select · attribute · maximises · given»", "it_q": "L'Information Gain è usato per...", "it_a": "Selezionare l'attributo che massimizza, per un dato training set, la capacità di predire il valore della classe"}, {"id": "m084", "topic": "Classificazione & ML", "text": "In which mining activity can the Information Gain be useful?", "options": [{"key": "A", "text": "Discovery of association rules", "it": "Scoperta di regole di associazione"}, {"key": "B", "text": "Classification", "it": "Classificazione"}, {"key": "C", "text": "Clustering", "it": "Clustering"}, {"key": "D", "text": "Discretization", "it": "Discretizzazione"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "89-88. Alternativa all'Information Gain → ✅ B Gini Index.", "it_q": "In quale attività di mining può essere utile l'Information Gain?", "it_a": "Classificazione"}, {"id": "m085", "topic": "Preprocessing & dati", "text": "Given the two binary vectors below, which is their similarity according to the Jaccard Coefficient? 1000101101 1011101010", "options": [{"key": "A", "text": "0.1", "it": "0.1"}, {"key": "B", "text": "0.2", "it": "0.2"}, {"key": "C", "text": "0.5", "it": "0.5"}, {"key": "D", "text": "0.375", "it": "0.375"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Metodo: Jaccard ignora le coppie 0-0: conta M11/(M11+M01+M10) = 3/8 = 0.375.", "it_q": "Date le due seguenti sequenze binarie, qual è la loro similarità secondo il Jaccard Coefficient? 1000101101 1011101010", "it_a": "0.375"}, {"id": "m086", "topic": "Clustering", "text": "What is the single linkage?", "options": [{"key": "A", "text": "A method to compute the distance between two objects, it can be used in hierarchical clustering", "it": "Un metodo per calcolare la distanza tra due oggetti, può essere usato nel clustering gerarchico"}, {"key": "B", "text": "A method to compute the distance between two sets of items, it can be used in hierarchical clustering", "it": "Un metodo per calcolare la distanza tra due insiemi di item, può essere usato nel clustering gerarchico"}, {"key": "C", "text": "A method to compute the distance between two classes, it can be used in decision trees", "it": "Un metodo per calcolare la distanza tra due classi, può essere usato in decision tree"}, {"key": "D", "text": "A method to compute the separation of the objects inside a cluster", "it": "Un metodo per calcolare la separazione degli oggetti all'interno di un cluster"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Esca A: \"tra due oggetti\" — no, tra due set. Il linkage esiste proprio perché i cluster sono insiemi.", "it_q": "Cos'è il single linkage?", "it_a": "Un metodo per calcolare la distanza tra due insiemi di item, può essere usato nel clustering gerarchico"}, {"id": "m087", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Expectation Maximisation", "it": "Expectation Maximisation"}, {"key": "B", "text": "Apriori", "it": "Apriori"}, {"key": "C", "text": "K-means", "it": "K-means"}, {"key": "D", "text": "Decision Tree", "it": "Decision Tree"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "96-95. Chi è il diverso? (DBSCAN, SVM, Neural Network, Decision Tree) → ✅ A DBSCAN (unico NON supervisionato tra classificatori).", "it_q": "Quale è diverso dagli altri?", "it_a": "Decision Tree"}, {"id": "m088", "topic": "Clustering", "text": "Which of the following is a strength of the clustering algorithm DBSCAN?", "options": [{"key": "A", "text": "Requires to set the number of clusters as a parameter", "it": "Richiede di impostare il numero di cluster come parametro"}, {"key": "B", "text": "Ability to find cluster with concavities", "it": "Capacità di trovare cluster con concavità"}, {"key": "C", "text": "Ability to separate outliers from regular data", "it": "Capacità di separare gli outlier dai dati regolari"}, {"key": "D", "text": "Very fast by computation", "it": "Molto veloce dal punto di vista computazionale"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🟢 DBSCAN fine ma lento: outlier ok, concavità ok, densità DIVERSE ko. Tutto noise? ↓min_samples o ↑raggio.", "it_q": "Quale delle seguenti è un punto di forza dell'algoritmo di clustering DBSCAN?", "it_a": "Capacità di trovare cluster con concavità ; Capacità di separare gli outlier dai dati regolari"}, {"id": "m089", "topic": "Classificazione & ML", "text": "Which of the following measure can be used as an alternative to the Information Gain?", "options": [{"key": "A", "text": "Sihlouette Index", "it": "Indice di Silhouette"}, {"key": "B", "text": "Gini Index", "it": "Indice di Gini"}, {"key": "C", "text": "Rand Index", "it": "Indice di Rand"}, {"key": "D", "text": "Jaccard Index", "it": "Indice di Jaccard"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Gini · Index»", "it_q": "Quale delle seguenti misure può essere usata come alternativa all'Information Gain?", "it_a": "Indice di Gini"}, {"id": "m090", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Accuracy?", "options": [{"key": "A", "text": "TN/(TN+FP)", "it": "TN/(TN+FP)"}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)", "it": "(TP+TN)/(TP+FP+TN+FN)"}, {"key": "C", "text": "TP/(TP+FN)", "it": "TP/(TP+FN)"}, {"key": "D", "text": "TP/(TP+FP)", "it": "TP/(TP+FP)"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le definizioni: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Quale formula calcola l'Accuracy?", "it_a": "(TP+TN)/(TP+FP+TN+FN)"}, {"id": "m091", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of DBSCAN?", "options": [{"key": "A", "text": "Clusters have concavities", "it": "I cluster hanno concavità"}, {"key": "B", "text": "All the variables are the same range of values", "it": "Tutte le variabili hanno lo stesso range di valori"}, {"key": "C", "text": "Presence of outliers", "it": "Presenza di outlier"}, {"key": "D", "text": "Presence of clusters with different densities", "it": "Presenza di cluster con densità diverse"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "eps è UNO solo per tutti — se un cluster è denso e uno rado, nessun eps va bene per entrambi. (Le concavità sono il suo punto di forza, esca A.)", "it_q": "Quale delle seguenti caratteristiche dei dati può ridurre l'efficacia di DBSCAN?", "it_a": "Presenza di cluster con densità diverse"}, {"id": "m092", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the support of the rule A,C -> B?", "options": [{"key": "A", "text": "100%", "it": "100%"}, {"key": "B", "text": "20%", "it": "20%"}, {"key": "C", "text": "40%", "it": "40%"}, {"key": "D", "text": "50%", "it": "50%"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Qual è il support della regola A,C -> B?", "it_a": "20%"}, {"id": "m093", "topic": "BI & DWH", "text": "Associate the various Data Warehouse Architectures to the respective advantages: 1. Single Layer 2. Two Layers 3. Three Layers a. The workloads for analysis and daily operations are separated b. An intermediate level of consolidated data is available c. The occupation of space is minimised", "options": [{"key": "A", "text": "1-a, 2-b, 3-c", "it": "1-a, 2-b, 3-c"}, {"key": "B", "text": "1-c, 2-a, 3-b", "it": "1-c, 2-a, 3-b"}, {"key": "C", "text": "1-b, 2-c, 3-a", "it": "1-b, 2-c, 3-a"}, {"key": "D", "text": "1-c, 2-b, 3-a", "it": "1-c, 2-b, 3-a"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Mnemonica a scala: 1 piano = poco spazio (1→c: occupazione minimizzata); 2 piani = lavori separati (2→a: analisi e operazioni quotidiane separate); 3 piani = c'è il…", "it_q": "Associa le varie architetture di Data Warehouse ai rispettivi vantaggi: 1. Single Layer 2. Two Layers 3. Three Layers a. I carichi di lavoro per analisi e operazioni quotidiane sono separati b. È disponibile un livello intermedio di dati consolidati c. L'occupazione di spazio è minimizzata", "it_a": "1-c, 2-a, 3-b"}, {"id": "m094", "topic": "Classificazione & ML", "text": "In a Neural Network, what is the backpropagation?", "options": [{"key": "A", "text": "The technique used to adjust the node weights according to the difference between the desired output and the output generated", "it": "La tecnica usata per regolare i pesi dei nodi in base alla differenza tra l'output desiderato e quello generato"}, {"key": "B", "text": "The technique used to adjust the weights limiting the probability of overfitting", "it": "La tecnica usata per regolare i pesi limitando la probabilità di overfitting"}, {"key": "C", "text": "The technique used to adjust the output according to the difference between the desired weights and the actual weights", "it": "La tecnica usata per regolare l'output in base alla differenza tra i pesi desiderati e quelli reali"}, {"key": "D", "text": "The technique used to adjust the connection weights according to the difference between the desired output and the output generated by the network", "it": "La tecnica usata per regolare i pesi delle connessioni in base alla differenza tra l'output desiderato e quello generato dalla rete"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Esca A quasi identica: dice \"node weights\" invece di \"connection weights\" — i pesi stanno sulle connessioni, non sui nodi. \"I fili hanno il peso, non i pallini.\"", "it_q": "In una Neural Network, cos'è la backpropagation?", "it_a": "La tecnica usata per regolare i pesi delle connessioni in base alla differenza tra l'output desiderato e l'output generato dalla rete"}, {"id": "m095", "topic": "Preprocessing & dati", "text": "In feature selection, what is the Principal Component Analysis (PCA)?", "options": [{"key": "A", "text": "A mathematical technique used to transform non numeric attributes into numeric attributes", "it": "Una tecnica matematica usata per trasformare attributi non numerici in attributi numerici"}, {"key": "B", "text": "A mathematical technique used to transform a set of numeric attributes into a smaller set of numeric attributes which capture most of the variability in data", "it": "Una tecnica matematica usata per trasformare un insieme di attributi numerici in un insieme più piccolo di attributi numerici che catturano la maggior parte della variabilità nei dati"}, {"key": "C", "text": "A heuristic technique used to find a subset of the attributes which produces the same classifier", "it": "Una tecnica euristica usata per trovare un sottoinsieme degli attributi che produce lo stesso classificatore"}, {"key": "D", "text": "A mathematical technique used to find the principal attributes which determine the classification process", "it": "Una tecnica matematica usata per trovare gli attributi principali che determinano il processo di classificazione"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Parole chiave da cercare nell'opzione giusta: \"smaller set\" + \"variability\". Esca: \"find the principal attributes\" — la PCA crea attributi nuovi (combinazioni), non…", "it_q": "Nella feature selection, cos'è la Principal Component Analysis (PCA)?", "it_a": "Una tecnica matematica usata per trasformare un insieme di attributi numerici in un insieme più piccolo di attributi numerici che catturano la maggior parte della variabilità nei dati"}, {"id": "m096", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Dbscan", "it": "DBSCAN"}, {"key": "B", "text": "SVM", "it": "SVM"}, {"key": "C", "text": "Neural Network", "it": "Rete neurale"}, {"key": "D", "text": "Decision Tree", "it": "Decision Tree"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🔍 La linea è sempre supervisionato vs non supervisionato: trova l'intruso rispetto a quella.", "it_q": "Quale è diverso dagli altri?", "it_a": "DBSCAN"}, {"id": "m097", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the purpose of the \"Schema on read\" strategy?", "options": [{"key": "A", "text": "Avoid preprocessing of data before writing", "it": "Evita il preprocessing dei dati prima della scrittura"}, {"key": "B", "text": "Optimisation for various types of queries", "it": "Ottimizzazione per vari tipi di query"}, {"key": "C", "text": "Possibility to extract data in various shapes", "it": "Possibilità di estrarre i dati in varie forme"}, {"key": "D", "text": "Flexibility for any kind of query", "it": "Flessibilità per qualsiasi tipo di query"}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto).", "it_q": "Parlando dell'idea generale di database, qual è lo scopo della strategia \"Schema on read\"?", "it_a": "Evitare il preprocessing dei dati prima della scrittura ; Possibilità di estrarre i dati in varie forme ; Flessibilità per qualsiasi tipo di query"}, {"id": "m098", "topic": "Clustering", "text": "What measure is maximised by the Expectation Maximisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood of a class label, given the attributes of the example", "it": "La probabilità di un'etichetta di classe, dati gli attributi dell'esempio"}, {"key": "B", "text": "The likelihood of an attribute, given the class lab", "it": "La verosimiglianza di un attributo, data la label della classe"}, {"key": "C", "text": "The likelihood of an example", "it": "La probabilità di un esempio"}, {"key": "D", "text": "The support of a class", "it": "Il support di una classe"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎲 EM: probabilità, non distanze (l'unico non distance-based). Se c'è l'opzione 'distributions…parameters' è quella; sennò 'class label given attributes'.", "it_q": "Quale misura viene massimizzata dall'algoritmo Expectation Maximisation per il clustering?", "it_a": "La likelihood di un'etichetta di classe, dati gli attributi dell'esempio"}, {"id": "m099", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following is not an objective of the aggregation of attributes?", "options": [{"key": "A", "text": "Reduce the variability of data", "it": "Ridurre la variabilità dei dati"}, {"key": "B", "text": "Obtain a less detailed scale", "it": "Ottenere una scala meno dettagliata"}, {"key": "C", "text": "Reduce the number of attributes or objects", "it": "Ridurre il numero di attributi o oggetti"}, {"key": "D", "text": "Obtain a more detailed description of data", "it": "Ottenere una descrizione più dettagliata dei dati"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "Nel data preprocessing, quale dei seguenti non è un obiettivo dell'aggregazione degli attributi?", "it_a": "Ottenere una descrizione più dettagliata dei dati"}, {"id": "m100", "topic": "BI & DWH", "text": "Which of the activities below is part of \"Business Understanding\" in the CRISP methodology?", "options": [{"key": "A", "text": "Which data are available?", "it": "Quali dati sono disponibili?"}, {"key": "B", "text": "Which machine learning functions are necessary for my problem?", "it": "Quali funzioni di machine learning sono necessarie per il mio problema?"}, {"key": "C", "text": "Which data must be collected with a specific campaign?", "it": "Quali dati devono essere raccolti con una specifica campagna?"}, {"key": "D", "text": "Which are the resources available (manpower, hardware, software, ...)", "it": "Quali sono le risorse disponibili (personale, hardware, software, ...)"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Le esche su \"quali dati\" appartengono a Data Understanding. Memo: \"Business = budget\" (risorse, vincoli, obiettivi aziendali).", "it_q": "Quale delle seguenti attività fa parte di \"Business Understanding\" nella metodologia CRISP?", "it_a": "Quali sono le risorse disponibili (manpower, hardware, software, ...)"}, {"id": "m101", "topic": "Preprocessing & dati", "text": "Which of the following situations could suggest the use of MinMax scaling?", "options": [{"key": "A", "text": "There are numeric attributes with very diverse value ranges", "it": "Ci sono attributi numerici con range di valori molto diversi"}, {"key": "B", "text": "There are attributes with very skewed data distributions", "it": "Ci sono attributi con distribuzioni dei dati molto asimmetriche"}, {"key": "C", "text": "There are attributes with a very large number of missing values", "it": "Ci sono attributi con un numero molto elevato di valori mancanti"}, {"key": "D", "text": "There is a numeric attribute with values spread in a very large range", "it": "C'è un attributo numerico con valori distribuiti in un range molto ampio"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Specchio della domanda 1. Le esche sono i punti di forza del DBMS: query key-based e aggiornamenti efficienti.", "it_q": "Quale delle seguenti situazioni potrebbe suggerire l'uso di MinMax scaling?", "it_a": "Ci sono attributi numerici con range di valori molto diversi"}, {"id": "m102", "topic": "BI & DWH", "text": "Which of the following sentences describes an advantage of a Data Warehouse with respect to a standard DBMS?", "options": [{"key": "A", "text": "Allows efficient execution of key-based queries", "it": "Permette l'esecuzione efficiente di query basate su chiave"}, {"key": "B", "text": "Manages efficiently data updates", "it": "Gestisce efficientemente gli aggiornamenti dei dati"}, {"key": "C", "text": "Has tools for helping to solve inconsistencies", "it": "Ha strumenti per aiutare a risolvere le inconsistenze"}, {"key": "D", "text": "Allows analysis along the time dimension", "it": "Permette l'analisi lungo la dimensione temporale"}, {"key": "E", "text": "Allows efficient execution of multi-dimensional queries", "it": "Permette l'esecuzione efficiente di query multidimensionali"}], "correct": ["C", "D", "E"], "note": "", "source": "banco 2026", "hint": "Esca B (\"tutti della stessa classe\"): non serve purezza perfetta per essere foglia — si decide a maggioranza.", "it_q": "Quale delle seguenti frasi descrive un vantaggio di un Data Warehouse rispetto a un DBMS standard?", "it_a": "Ha strumenti per aiutare a risolvere le inconsistenze ; Permette l'analisi lungo la dimensione temporale ; Permette l'esecuzione efficiente di query multi-dimensionali"}, {"id": "m103", "topic": "Classificazione & ML", "text": "In a Decision Tree for classification, what is a leaf node?", "options": [{"key": "A", "text": "A node which assigns a class value to the objects passing the tests on the path from the root to the node itself", "it": "Nodo che assegna un valore di classe agli oggetti che superano i test sul percorso dalla radice al nodo"}, {"key": "B", "text": "A node where all the objects belong to the same class", "it": "Nodo in cui tutti gli oggetti appartengono alla stessa classe"}, {"key": "C", "text": "A node which allows classification without errors", "it": "Nodo che permette la classificazione senza errori"}, {"key": "D", "text": "A node which assigns a class value only by majority of examples", "it": "Nodo che assegna un valore di classe solo per maggioranza degli esempi"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «node · assigns · class · value»", "it_q": "In un Decision Tree per la classificazione, cos'è un leaf node?", "it_a": "Un nodo che assegna un valore di classe agli oggetti che passano i test sul percorso dalla radice al nodo stesso"}, {"id": "m104", "topic": "Preprocessing & dati", "text": "Which is the purpose of discretisation?", "options": [{"key": "A", "text": "Increase the number of distinct values in an attribute", "it": "Aumenta il numero di valori distinti in un attributo"}, {"key": "B", "text": "Reduce the number of distinct values in an attribute, in order to increase the efficiency", "it": "Riduce il numero di valori distinti in un attributo per aumentare l'efficienza"}, {"key": "C", "text": "Reduce the number of distinct values in an attribute, in order to put in evidence possible patterns and regularities", "it": "Riduce il numero di valori distinti in un attributo per evidenziare pattern e regolarità"}, {"key": "D", "text": "Reduce the range of values of a numeric attribute", "it": "Riduce l'intervallo di valori di un attributo numerico"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "⚠️ Trappola fine: l'esca B dice \"per aumentare l'efficienza\" — plausibile ma non è lo scopo didattico; il fine è vedere i pattern. \"Discretizzi per VEDERE, non per…", "it_q": "Qual è lo scopo della discretizzazione?", "it_a": "Ridurre il numero di valori distinti in un attributo, per mettere in evidenza possibili pattern e regolarità"}, {"id": "m105", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Roll-Up\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia"}, {"key": "B", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia il layout per analizzare un gruppo di dati da un punto di vista diverso"}, {"key": "C", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver fissato una dimensione a un valore specifico"}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them", "it": "Crea un link tra concetti in cubi correlati per confrontarli"}, {"key": "E", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy", "it": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia"}], "correct": ["E"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle seguenti definizioni descrive l'operazione OLAP \"Roll-Up\"?", "it_a": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia"}, {"id": "m106", "topic": "Classificazione & ML", "text": "What is the Gini index?", "options": [{"key": "A", "text": "A measure of the entropy of a dataset", "it": "Una misura dell'entropia di un dataset"}, {"key": "B", "text": "An accuracy measure of a dataset alternative to the Information Gain", "it": "Una misura di accuratezza di un dataset alternativa all'Information Gain"}, {"key": "C", "text": "An impurity measure of a dataset alternative to the Information Gain and to the Misclassification Index", "it": "Una misura di impurità di un dataset alternativa all'Information Gain e al Misclassification Index"}, {"key": "D", "text": "An impurity measure of a dataset alternative to overfitting and underfitting", "it": "Una misura di impurità di un dataset alternativa a overfitting e underfitting"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Tris collegato: Gini-Entropy-Misclassification sono i 3 fratelli dell'impurità in classificazione (la Silhouette è dell'altra famiglia, clustering — è per questo che…", "it_q": "Cos'è il Gini index?", "it_a": "Una misura di impurità di un dataset alternativa all'Information Gain e all'Indice di Misclassificazione"}, {"id": "m107", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following are the objectives of the aggregation of attributes?", "options": [{"key": "A", "text": "Obtain a more detailed description of data", "it": "Ottenere una descrizione più dettagliata dei dati"}, {"key": "B", "text": "Obtain a less detailed scale", "it": "Ottenere una scala meno dettagliata"}, {"key": "C", "text": "Reduce the variability of data", "it": "Ridurre la variabilità dei dati"}, {"key": "D", "text": "Reduce the number of attributes or distinct values", "it": "Ridurre il numero di attributi o valori distinti"}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "Nel data preprocessing, quali dei seguenti sono gli obiettivi dell'aggregazione degli attributi?", "it_a": "Ottenere una scala meno dettagliata ; Ridurre la variabilità dei dati ; Ridurre il numero di attributi o di valori distinti"}, {"id": "a001", "topic": "Classificazione & ML", "text": "Given the following definitions: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Which of the formulas below computes the precision of a binary classifier?", "options": [{"key": "A", "text": "TP / (TP + FP)", "it": "TP / (TP + FP)"}, {"key": "B", "text": "(TP + TN) / (TP + FP + TN + FN)", "it": "(TP + TN) / (TP + FP + TN + FN)"}, {"key": "C", "text": "TN / (TN + FP)", "it": "TN / (TN + FP)"}, {"key": "D", "text": "TP / (TP + FN)", "it": "TP / (TP + FN)"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le seguenti definizioni: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Quale delle seguenti formule calcola la precision di un classificatore binario?", "it_a": "TP / (TP + FP)"}, {"id": "a002", "topic": "Preprocessing & dati", "text": "Which of the statements below is true?", "options": [{"key": "A", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters", "it": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il numero di cluster scelto"}, {"key": "B", "text": "K-means always stop to a configuration which gives the minimum distortion for the chosen value of the number of clusters", "it": "K-means si ferma sempre su una configurazione che dà la distorsione minima per il numero di cluster scelto"}, {"key": "C", "text": "K-means works well also with datasets having a very large number of attributes", "it": "K-means funziona bene anche con dataset con un numero molto elevato di attributi"}, {"key": "D", "text": "K-means finds the number of clusters which give the minimum distortion", "it": "K-means trova il numero di cluster che dà la distorsione minima"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Sometimes · k-means · stops · configuration»", "it_q": "Quale delle seguenti affermazioni è vera?", "it_a": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster"}, {"id": "a003", "topic": "Preprocessing & dati", "text": "Which of the statements below is false?", "options": [{"key": "A", "text": "Increasing the radius of the neighourhood can decrease the number of noise points", "it": "Aumentare il raggio del neighborhood può ridurre il numero di noise points"}, {"key": "B", "text": "DBSCAN always stops to a configuration which gives the optimal number of clusters", "it": "DBSCAN si ferma sempre su una configurazione che fornisce il numero ottimale di cluster"}, {"key": "C", "text": "Sometimes DBSCAN stops to a configuration which does not include any cluster", "it": "A volte DBSCAN si ferma su una configurazione che non include alcun cluster"}, {"key": "D", "text": "DBScan can give good performance when clusters have concavities", "it": "DBSCAN può fornire buone prestazioni quando i cluster hanno concavità"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «DBSCAN · always · stops · configuration»", "it_q": "Quale delle seguenti affermazioni è falsa?", "it_a": "DBSCAN si ferma sempre su una configurazione che dà il numero ottimale di cluster"}, {"id": "a004", "topic": "Classificazione & ML", "text": "What are the hyperparameters of a Neural Network? (Possibly non exhaustive)", "options": [{"key": "A", "text": "Hidden layers structure, Output layer structure, Activation function, Number of epochs", "it": "Struttura hidden layers, struttura output layer, activation function, numero di epoche"}, {"key": "B", "text": "Network structure, Learning rate, Backpropagation algorithm, Number of epochs", "it": "Struttura della rete, learning rate, algoritmo di backpropagation, numero di epoche"}, {"key": "C", "text": "Input layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura input layers, learning rate, activation function, numero di epoche"}, {"key": "D", "text": "Hidden layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura hidden layers, learning rate, activation function, numero di epoche"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧠 HLAN: Hidden layers, Learning rate, Activation, N. epoche. LR=moltiplicatore della correzione · Backprop=aggiusta i pesi delle CONNESSIONI.", "it_q": "Quali sono gli hyperparameters di una Neural Network? (Possibilmente non esaustivo)", "it_a": "Struttura dei layer nascosti, Learning rate, Activation function, Numero di epoche"}, {"id": "a005", "topic": "Association Rules", "text": "Consider the transactional dataset below. Which is the Confidence of the rule \"B -> E\"?  ID Items  1 A,B,C  2 A,B,D  3 B,D,E  4 C,D  5 A,C,D,E", "options": [{"key": "A", "text": "100%", "it": "100%"}, {"key": "B", "text": "50%", "it": "50%"}, {"key": "C", "text": "33%", "it": "33%"}, {"key": "D", "text": "20%", "it": "20%"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale sottostante. Qual è la Confidence della regola \"B -> E\"?  ID Items  1 A,B,C  2 A,B,D  3 B,D,E  4 C,D  5 A,C,D,E", "it_a": "33%"}, {"id": "a006", "topic": "Association Rules", "text": "Name the following rule evaluation formula: sup(AuC) - sup(A)sup(C)", "options": [{"key": "A", "text": "Leverage", "it": "Leverage"}, {"key": "B", "text": "L ": "D", "text": "Remove non-standard values", "it": "Rimuovi i valori non standard"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «numeric · attributes · range · such»", "it_q": "Qual è il motivo principale per la standardizzazione degli attributi numerici?", "it_a": "Mappa tutti gli attributi numerici in un nuovo intervallo in modo che la media sia zero e la varianza sia uno"}, {"id": "a031", "topic": "Clustering", "text": "After fitting DBSCAN with the default parameter values the results are: 0 clusters, 100% of noise points. Which will be your next trial?", "options": [{"key": "A", "text": "Reduce the minimum number of objects in the neighborhood or increase the radius of the neighborhood", "it": "Riduci il numero minimo di oggetti nel vicinato o aumenta il raggio del vicinato"}, {"key": "B", "text": "Reduce the minimum number of objects in the neighborhood and the radius of the neighborhood", "it": "Riduci il numero minimo di oggetti nel vicinato e il raggio del vicinato"}, {"key": "C", "text": "Decrease the radius of the neighborhood", "it": "Diminuisci il raggio del vicinato"}, {"key": "D", "text": "None of the others", "it": "Nessuna delle altre"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🟢 DBSCAN fine ma lento: outlier ok, concavità ok, densità DIVERSE ko. Tutto noise? ↓min_samples o ↑raggio.", "it_q": "Dopo aver eseguito DBSCAN con i parametri di default i risultati sono: 0 cluster, 100% di punti di rumore. Quale sarà il tuo prossimo tentativo?", "it_a": "Riduci il numero minimo di oggetti nel vicinato o aumenta il raggio del vicinato"}, {"id": "a032", "topic": "Association Rules", "text": "Which of the statements below best describes the strategy of Apriori in finding the frequent itemsets?", "options": [{"key": "A", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are co ", "it": "La confidence di un itemset è anti-monotona rispetto alla composizione dell'itemset"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «support · itemset · anti-monotonic · respect»", "it_q": "Quale delle seguenti affermazioni riguardanti la scoperta di regole di associazione è vera?", "it_a": "Il support di un itemset è anti-monotonico rispetto alla composizione dell'itemset"}, {"id": "a037", "topic": "Preprocessing & dati", "text": "Which is the effect of the Curse of Dimensionality", "options": [{"key": "A", "text": "When the number of dimensions increases the results tend to be prone to overfitting", "it": "Quando il numero di dimensioni aumenta i risultati tendono a essere soggetti a overfitting"}, {"key": "B", "text": "When the number of dimensions increases the euclidean distance becomes less effective to discriminate between points in the space", "it": "Quando il numero di dimensioni aumenta la distanza euclidea diventa meno efficace per discriminare tra i punti nello spazio"}, {"key": "C", "text": "When the number of dimensions increases the computing power necessary to compute the distances becomes too high", "it": "Quando il numero di dimensioni aumenta la potenza di calcolo necessaria per calcolare le distanze diventa troppo elevata"}, {"key": "D", "text": "When the number of dimensions increases the classifiers cannot be correctly tuned", "it": "Quando il numero di dimensioni aumenta i classificatori non possono essere sintonizzati correttamente"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «number · dimensions · increases · euclidean»", "it_q": "Qual è l'effetto della Curse of Dimensionality", "it_a": "Quando il numero di dimensioni aumenta la distanza euclidea diventa meno efficace nel discriminare tra i punti nello spazio"}, {"id": "a039", "topic": "Classificazione & ML", "text": "In a Neural Network, what is the Ba
