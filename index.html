<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111827">
<title>DM Quiz v2 — ripasso con ripetizione spaziata</title>
<style>
/* DM Quiz v2 — design system base (card UI, dark, 3 breakpoints) */
:root {
  --bg: #0f1623;
  --card: #1a2333;
  --card2: #212d42;
  --text: #e8edf6;
  --muted: #93a0b4;
  --accent: #6c7bff;
  --accent2: #8b5cf6;
  --green: #22c55e;
  --green-bg: rgba(34, 197, 94, 0.14);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.14);
  --border: #2c3a52;
  --radius: 14px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
}
#app { max-width: 640px; margin: 0 auto; padding: 0 14px 40px; }

.header {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 12px 2px;
  background: linear-gradient(180deg, var(--bg) 85%, transparent);
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.header .hstats { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
.progressbar { height: 4px; background: var(--card2); border-radius: 2px;
  overflow: hidden; margin: -8px 0 14px; }
.progressbar > div { height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.3s; }

.home { display: flex; flex-direction: column; gap: 16px; padding-top: 8vh;
  text-align: center; }
.home h1 { margin: 0; font-size: 1.9rem; letter-spacing: 0.5px;
  background: linear-gradient(90deg, #e8edf6, #b8c2ff, #e8edf6);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% 100%;
  animation: gradientMove 6s ease-in-out infinite; }
.home .sub { color: var(--muted); margin-top: -8px; }
.stats { color: var(--muted); font-size: 0.95rem; }
.stats b { color: var(--text); }

.boxchart { display: flex; gap: 8px; justify-content: center; align-items: flex-end;
  height: 64px; margin: 4px 0; }
.boxchart .bar { width: 44px; background: var(--card2); border-radius: 6px 6px 0 0;
  position: relative; min-height: 4px; }
.boxchart .bar > i { position: absolute; bottom: -20px; left: 0; right: 0;
  font-style: normal; font-size: 0.7rem; color: var(--muted); }
.boxchart .bar.b1 { background: #3b82f6; }
.boxchart .bar.b2 { background: #8b5cf6; }
.boxchart .bar.b3 { background: var(--green); }

.btn {
  display: block; width: 100%;
  background: var(--card); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 15px 18px; font-size: 1rem; font-weight: 500;
  cursor: pointer; transition: transform 0.12s, background 0.15s, border-color 0.15s;
  user-select: none;
}
.btn:active { transform: scale(0.985); }
.btn-primary {
  display: block; width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; font-weight: 700; font-size: 1.1rem; color: #fff;
  box-shadow: 0 10px 28px rgba(108, 123, 255, 0.32), 0 4px 10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-secondary { background: transparent; color: var(--muted); }
.btn-icon { width: 44px; height: 44px; padding: 0; display: flex;
  align-items: center; justify-content: center; font-size: 1.15rem;
  border-radius: 12px; flex: none; }

.qcard { background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.04);
  animation: fadeIn 0.18s ease forwards; }
.topic { display: inline-block; font-size: 0.72rem; text-transform: uppercase;
  letter-spacing: 1px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  padding: 3px 10px; border-radius: 999px; margin-bottom: 10px; }
.qtext { font-size: 1.12rem; line-height: 1.55; margin: 0; }
.multinote { color: var(--accent); font-size: 0.85rem; margin-top: 8px; }

.option {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: var(--card); color: var(--text);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 13px 14px; margin-bottom: 10px; font-size: 0.98rem; line-height: 1.45;
  cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s;
  animation: fadeIn 0.18s ease forwards;
}
.option:active { transform: scale(0.99); }
.option .letter {
  flex: none; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--card2); color: var(--muted); font-weight: 700; font-size: 0.85rem;
}
.option.selected { border-color: var(--accent); background: rgba(108, 123, 255, 0.10); }
.option.selected .letter { background: var(--accent); color: #fff; }
.option.correct { border-color: var(--green); background: var(--green-bg); }
.option.correct .letter { background: var(--green); color: #fff; }
.option.wrong { border-color: var(--red); background: var(--red-bg); }
.option.wrong .letter { background: var(--red); color: #fff; }

.option:nth-child(1) { animation-delay: 0.02s; }
.option:nth-child(2) { animation-delay: 0.05s; }
.option:nth-child(3) { animation-delay: 0.08s; }
.option:nth-child(4) { animation-delay: 0.11s; }
.option:nth-child(5) { animation-delay: 0.14s; }

.verdict { font-size: 1.25rem; font-weight: 700; margin: 12px 0 4px; }
.verdict.ok { color: var(--green); }
.verdict.ko { color: var(--red); }
.note { color: var(--muted); font-size: 0.9rem; font-style: italic; margin: 6px 0 10px; }

.grade-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-top: 12px; }
.grade-row .btn { padding: 10px 6px; font-size: 0.92rem; }
.grade-row .btn small { display: block; color: var(--muted); font-weight: 400;
  font-size: 0.72rem; margin-top: 2px; }
.grade-row .btn.g-again { border-color: var(--red); }
.grade-row .btn.g-easy { border-color: var(--green); }
.kbd-hint { color: var(--muted); font-size: 0.75rem; text-align: center;
  margin-top: 10px; display: none; }
kbd { background: var(--card2); border: 1px solid var(--border); border-radius: 4px;
  padding: 0 5px; font-size: 0.75rem; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--card2); color: var(--text); border: 1px solid var(--border);
  padding: 10px 18px; border-radius: 999px; font-size: 0.9rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 50; }
.toast.show { opacity: 1; }

.settings { display: flex; flex-direction: column; gap: 14px; }
.settings h2 { margin: 6px 0 0; }
.settings .field { display: flex; align-items: center; justify-content: space-between;
  gap: 12px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; }
.settings .field label { font-size: 0.95rem; }
.settings .field small { display: block; color: var(--muted); }
.settings input[type="number"] { width: 86px; background: var(--card2);
  color: var(--text); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; font-size: 1rem; text-align: center; }
.settings .danger { border-color: rgba(239, 68, 68, 0.5); color: var(--red); }

select { background: var(--card); color: var(--text); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 12px; font-size: 0.95rem; max-width: 100%; }
.footer { color: var(--muted); font-size: 0.75rem; text-align: center; margin-top: 30px; }

.btn:focus-visible, .option:focus-visible, select:focus-visible, .settings input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: none; }
}
@keyframes gradientMove {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* tablet */
@media (min-width: 480px) {
  body { font-size: 17px; }
  .home { padding-top: 12vh; }
}
/* desktop */
@media (min-width: 900px) {
  #app { max-width: 720px; }
  .kbd-hint { display: block; }
  .option:hover { border-color: var(--accent); background: #25344f; }
  .btn:hover { border-color: var(--accent); }
  .btn-primary:hover { filter: brightness(1.08); }
}
/* small phones */
@media (max-width: 380px) {
  .grade-row { grid-template-columns: repeat(2, 1fr); }
}

/* ===== iOS/Safari hardening & breathing room ===== */
.btn, .option, select, .settings input[type="number"] {
  -webkit-appearance: none; appearance: none;
}
.btn, .option { min-height: 48px; }
input, select, textarea { font-size: 16px; }   /* stop iOS focus zoom */

/* spacing fallback that does not rely on flex gap */
.home > * + * { margin-top: 14px; }
.settings > * + * { margin-top: 12px; }
.header { padding-top: max(12px, env(safe-area-inset-top)); }
#app { padding-left: max(14px, env(safe-area-inset-left));
       padding-right: max(14px, env(safe-area-inset-right)); }

/* boxchart: visible tracks, labels with room of their own */
.boxchart { height: 72px; margin: 10px 0 30px; }
.boxchart .bar { width: 52px; background: var(--card2); }
.boxchart .bar > i { bottom: -22px; }

/* a bit more air between blocks */
.qcard { margin-bottom: 18px; }
.option { margin-bottom: 12px; }
.grade-row { margin-top: 16px; gap: 10px; }
.home { gap: 14px; }

/* ===== button classes must be self-sufficient (UI uses them standalone) ===== */
.btn-primary, .btn-secondary {
  display: block; width: 100%; min-height: 48px;
  padding: 14px 18px; border-radius: var(--radius);
  font-size: 1.05rem; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  transition: transform 0.12s, filter 0.15s;
}
.btn-secondary { background: transparent; color: var(--muted);
  border: 1px solid var(--border); }
.btn-primary:active, .btn-secondary:active { transform: scale(0.985); }

.hintbox { background: rgba(245, 158, 11, 0.10); border: 1px solid rgba(245, 158, 11, 0.45);
  border-left: 4px solid #f59e0b; border-radius: 10px; padding: 10px 12px;
  font-size: 0.88rem; line-height: 1.45; color: #fbd38d; margin: 10px 0 12px; }
.hintbox b { color: #f59e0b; }
.hintbox small { color: var(--muted); }

/* ===== v3.4: learning-phase translations ===== */
.qtrans { color: var(--muted); font-style: italic; font-size: 0.92rem;
  margin-top: 6px; line-height: 1.45; }
.option .opt-texts { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.option .opt-tr { color: var(--muted); font-style: italic; font-size: 0.82rem;
  line-height: 1.35; }

/* ===== v3.5: surface cue + per-option why ===== */
.hintbox .cue-row { font-weight: 600; color: #fde68a; margin-bottom: 6px; }
.option .opt-why { font-size: 0.8rem; font-style: normal; line-height: 1.35;
  margin-top: 2px; }
.option .opt-why.w-ok { color: var(--green); }
.option .opt-why.w-no { color: #f87171; }
</style>
</head>

no: K-means è clustering non supervisionato."}, {"key": "D", "text": "Dbscan", "it": "Dbscan", "why": "no: DBSCAN è clustering non supervisionato."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🔍 La linea è sempre supervisionato vs non supervisionato: trova l'intruso rispetto a quella.", "it_q": "Quale è diverso dagli altri?", "it_a": "Albero decisionale", "cue": "🔮 Cerca «decision», «tree»: compare SOLO nella giusta."}, {"id": "m003", "topic": "Classificazione & ML", "text": "Which of the following is a base hypothesis for a bayesian classifier?", "options": [{"key": "A", "text": "The attributes must be statistically independent inside each class", "it": "Gli attributi devono essere statisticamente indipendenti all'interno di ogni classe", "why": "sì: Naive Bayes assume indipendenza condizionata alla classe."}, {"key": "B", "text": "The attributes must have negative correlation", "it": "Gli attributi devono avere correlazione negativa", "why": "no: correlazione negativa non è ipotesi bayesiana."}, {"key": "C", "text": "The attributes must be statistically independent", "it": "Gli attributi devono essere statisticamente indipendenti", "why": "no: manca condizionamento alla classe."}, {"key": "D", "text": "The attributes must have zero correlation", "it": "Gli attributi devono avere correlazione zero", "why": "no: correlazione zero non basta né definisce Naive Bayes."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "⚠️ L'esca C (\"statisticamente indipendenti\" e basta) è quasi identica: la differenza è \"inside each class\" (indipendenza condizionata alla classe). Mnemonica: \"Bayes giudica classe per classe — anche l'indipendenza vale classe per classe.\"", "it_q": "Quale delle seguenti è un'ipotesi di base per un classificatore bayesiano?", "it_a": "Gli attributi devono essere statisticamente indipendenti all'interno di ogni classe", "cue": "🔮 Cerca «inside», «class»: compare SOLO nella giusta."}, {"id": "m004", "topic": "Preprocessing & dati", "text": "In data preparation which is the effect of normalisation?", "options": [{"key": "A", "text": "Map all the numeric attributes to the same range, without altering the distribution, in order to avoid that attributes with large ranges have more influence", "it": "Mappa tutti gli attributi numerici nello stesso intervallo, senza alterare la distribuzione, per evitare che attributi con intervalli ampi abbiano maggiore influenza", "why": "sì: riscalamento uniforme senza cambiare distribuzione."}, {"key": "B", "text": "Map all the numeric attributes subtracting the respective mean and dividing by variance", "it": "Mappa tutti gli attributi numerici sottraendo la rispettiva media e dividendo per la varianza", "why": "no: descrive standardizzazione, non normalizzazione min-max."}, {"key": "C", "text": "Map all the numeric attributes to the same range and to have a Gaussian distribution", "it": "Mappa tutti gli attributi numerici nello stesso intervallo e per avere una distribuzione Gaussiana", "why": "no: normalizzare non rende gaussiana la distribuzione."}, {"key": "D", "text": "Map all the numeric attributes in order to have a Gaussian distribution", "it": "Mappa tutti gli attributi numerici in modo da avere una distribuzione Gaussiana", "why": "no: Gaussianità richiede trasformazioni, non normalizzazione."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Trappola ricorrente: ogni opzione-esca contiene \"Gaussian distribution\" — la normalizzazione NON rende niente gaussiano. Regola: se l'opzione promette una gaussiana, è sbagliata (vale anche per le domande 44 e 61).", "it_q": "Nella preparazione dei dati qual è l'effetto della normalizzazione?", "it_a": "Mappa tutti gli attributi numerici nello stesso intervallo, senza alterare la distribuzione, per evitare che gli attributi con intervalli grandi abbiano più influenza", "cue": "🔮 Cerca «influence», «altering»: compare SOLO nella giusta."}, {"id": "m005", "topic": "BI & DWH", "text": "Check the features of Data Lakes in comparison with Data Warehouses:", "options": [{"key": "A", "text": "Can run on less expensive HW/SW", "it": "Può essere eseguito su HW/SW meno costosi", "why": "sì: data lake usa storage scalabile ed economico."}, {"key": "B", "text": "Do not enforce data quality", "it": "Non garantiscono la qualità dei dati", "why": "sì: conserva dati grezzi senza imporre qualità."}, {"key": "C", "text": "More complex management", "it": "Gestione più complessa", "why": "no: gestione non necessariamente più complessa per definizione."}, {"key": "D", "text": "Completely defined use cases", "it": "Casi d'uso completamente definiti", "why": "no: casi d'uso spesso esplorativi, non completamente definiti."}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "il lago è economico e ci butti dentro tutto com'è. Le esche sbagliate dicono il contrario dei luoghi comuni: la gestione NON è più complessa per definizione, e i casi d'uso NON sono completamente definiti (è proprio il bello del lake).", "it_q": "Verifica le caratteristiche dei Data Lake rispetto ai Data Warehouse:", "it_a": "Possono funzionare su HW/SW meno costosi ; Non garantiscono la qualità dei dati", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 2"}, {"id": "m006", "topic": "Classificazione & ML", "text": "What are the hyperparameters of a Neural Network?", "options": [{"key": "A", "text": "Hidden layers structure, Output layer structure, Activation function, Number of epochs", "it": "Struttura dei layer nascosti, Struttura del layer di output, Funzione di attivazione, Numero di epoche", "why": "no: output layer dipende dal problema."}, {"key": "B", "text": "Network structure, Learning rate, Backpropagation algorithm, Number of epochs", "it": "Struttura della rete, Learning rate, Algoritmo di backpropagation, Numero di epoche", "why": "no: backpropagation è algoritmo, non iperparametro."}, {"key": "C", "text": "Input layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura dei layer di input, Learning rate, Funzione di attivazione, Numero di epoche", "why": "no: input layer dipende dagli attributi."}, {"key": "D", "text": "Hidden layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura dei layer nascosti, Learning rate, Funzione di attivazione, Numero di epoche", "why": "sì: HLAN: hidden, learning rate, activation, epochs."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "\"HLAN\" (suona come \"WLAN con l'H\"). Esche costruite bene: contengono \"Output/Input layer structure\" (vincolati dal problema, non iperparametri) o \"Backpropagation algorithm\" (è l'algoritmo, non un iperparametro).", "it_q": "Quali sono gli iperparametri di una Neural Network?", "it_a": "Struttura dei layer nascosti, Learning rate, Funzione di attivazione, Numero di epoche", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione."}, {"id": "m007", "topic": "Preprocessing & dati", "text": "Which operations are in the correct sequence?", "options": [{"key": "A", "text": "Extraction, Cleansing, Transformation, Loading", "it": "Estrazione, Pulizia, Trasformazione, Caricamento", "why": "sì: sequenza ETL corretta: estrai, pulisci, trasforma, carica."}, {"key": "B", "text": "Extraction, Transformation, Cleansing, Loading", "it": "Estrazione, Trasformazione, Pulizia, Caricamento", "why": "no: cleansing precede transformation."}, {"key": "C", "text": "Loading, Cleansing, Extraction, Transformation", "it": "Caricamento, Pulizia, Estrazione, Trasformazione", "why": "no: loading non è il primo passo."}, {"key": "D", "text": "Transformation, Extraction, Cleansing, Loading", "it": "Trasformazione, Estrazione, Pulizia, Caricamento", "why": "no: transformation non precede extraction."}, {"key": "E", "text": "Loading, Transformation, Cleansing, Extraction", "it": "Caricamento, Trasformazione, Pulizia, Estrazione", "why": "no: ordine completamente invertito rispetto a ETL."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Extraction · Cleansing · Transformation · Loading»", "it_q": "Quali operazioni sono nella sequenza corretta?", "it_a": "Estrazione, Pulizia, Trasformazione, Caricamento", "cue": "🔮 L'unica che INIZIA con «Extraction, Cleansing…» e FINISCE con «…Transformation, Loading»."}, {"id": "m008", "topic": "Clustering", "text": "With reference to the total sum of squared errors (SSE) and separation (SSB) of a clustering scheme, which of the statements below is true?", "options": [{"key": "A", "text": "They are two ways to measure the same thing", "it": "Sono due modi per misurare la stessa cosa", "why": "no: SSE e SSB misurano coesione e separazione diverse."}, {"key": "B", "text": "They are strictly correlated, if, changing the clustering scheme, one increases, then the other does the same", "it": "Sono strettamente correlati, se, cambiando lo schema di clustering, uno aumenta, allora aumenta anche l'altro", "why": "no: se una cresce, l'altra diminuisce."}, {"key": "C", "text": "It is possible to optimise them (i.e. minimise SSE and maximise SSB) separately", "it": "È possibile ottimizzarli (es. minimizzare SSE e massimizzare SSB) separatamente", "why": "no: SSE e SSB non si ottimizzano separatamente."}, {"key": "D", "text": "They are strictly correlated, if, changing the clustering scheme, one increases, then the other decreases", "it": "Sono strettamente correlati, se, cambiando lo schema di clustering, uno aumenta, allora l'altro diminuisce", "why": "sì: varianza totale costante: SSE sale, SSB scende."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "SSE+SSB = costante (varianza totale dei dati). Vasi comunicanti: comprimi la coesione, sale la separazione. Per questo NON si ottimizzano separatamente (esca C).", "it_q": "Con riferimento alla somma totale degli errori quadratici (SSE) e alla separazione (SSB) di uno schema di clustering, quale delle seguenti affermazioni è vera?", "it_a": "Sono strettamente correlati, se, cambiando lo schema di clustering, uno aumenta, allora l'altro diminuisce", "cue": "🔮 Cerca «decreases»: compare SOLO nella giusta."}, {"id": "m009", "topic": "Regressione", "text": "When is polynomial regression appropriate?", "options": [{"key": "A", "text": "When the relationship between the predicting variable and the target cannot be approximated as linear", "it": "Quando la relazione tra la variabile predittiva e il target non può essere approssimata come lineare", "why": "sì: relazione predittore-target non approssimabile linearmente."}, {"key": "B", "text": "When the target values are not linearly separable", "it": "Quando i valori del target non sono linearmente separabili", "why": "no: separabilità riguarda classificazione, non regressione polinomiale."}, {"key": "C", "text": "When there is more than one predicting attribute", "it": "Quando c'è più di un attributo predittivo", "why": "no: più predittori indica regressione multipla."}, {"key": "D", "text": "When it is necessary to project the data into a dimensional space", "it": "Quando è necessario proiettare i dati in uno spazio dimensionale", "why": "no: proiezione dimensionale non definisce regressione polinomiale."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «relationship · between · predicting · variable»", "it_q": "Quando è appropriata la regressione polinomiale?", "it_a": "Quando la relazione tra la variabile predittiva e il target non può essere approssimata come lineare", "cue": "🔮 Cerca «relationship», «approximated»: compare SOLO nella giusta."}, {"id": "m010", "topic": "Clustering", "text": "Which of the following is not a strength point of Dbscan with respect to K-means?", "options": [{"key": "A", "text": "The robustness with respect to outliers", "it": "La robustezza rispetto agli outlier", "why": "no: robustezza agli outlier è forza di DBSCAN."}, {"key": "B", "text": "The effectiveness, even in presence of noise", "it": "L'efficacia, anche in presenza di rumore", "why": "no: efficacia col rumore è forza di DBSCAN."}, {"key": "C", "text": "The effectiveness even if there are clusters with non-convex shape", "it": "L'efficacia anche se ci sono cluster con forma non convessa", "why": "no: forme non convesse sono forza di DBSCAN."}, {"key": "D", "text": "The efficiency even in large datasets", "it": "L'efficienza anche in dataset di grandi dimensioni", "why": "sì: efficienza su grandi dataset è forza di K-means."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Ricollega all'ancora: il veloce è K-Means; DBSCAN è il fine ma lento. I punti di forza veri di DBSCAN: outlier, rumore, forme non convesse.", "it_q": "Quale dei seguenti non è un punto di forza di Dbscan rispetto a K-means?", "it_a": "L'efficienza anche su dataset di grandi dimensioni", "cue": "🔮 Cerca «efficiency», «datasets»: compare SOLO nella giusta."}, {"id": "m011", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Recall?", "options": [{"key": "A", "text": "TP/(TP+FN)", "it": "TP/(TP+FN)", "why": "sì: recall = TP diviso positivi reali."}, {"key": "B", "text": "TN/(TN+FP)", "it": "TN/(TN+FP)", "why": "no: misura specificità, non recall."}, {"key": "C", "text": "TP/(TP+FP)", "it": "TP/(TP+FP)", "why": "no: formula della precision, non recall."}, {"key": "D", "text": "(TP+TN)/(TP+FP+TN+FN)", "it": "(TP+TN)/(TP+FP+TN+FN)", "why": "no: formula dell'accuracy complessiva."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le definizioni: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Quale formula calcola la Recall?", "it_a": "TP/(TP+FN)", "cue": "🔮 L'unica che INIZIA con «TP/(TP+FN…»."}, {"id": "m012", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the meaning of \"Schema on read\"?", "options": [{"key": "A", "text": "Write the raw data in the database, then at reading time shape then according to the reader's needs", "it": "Scrivere i dati grezzi nel database, poi al momento della lettura modellarli secondo le esigenze del lettore", "why": "sì: dati raw, schema applicato alla lettura."}, {"key": "B", "text": "Create a schema for data after reading them from the database", "it": "Creare uno schema per i dati dopo averli letti dal database", "why": "sì: schema costruito dopo accesso ai dati."}, {"key": "C", "text": "Read the schema of the data before each data read", "it": "Leggere lo schema dei dati prima di ogni lettura dei dati", "why": "no: non significa leggere metadati prima."}, {"key": "D", "text": "Change the schema of the data before each read", "it": "Cambiare lo schema dei dati prima di ogni lettura", "why": "no: non cambia schema prima di ogni lettura."}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto).", "it_q": "Parlando del concetto generale di database, qual è il significato di \"Schema on read\"?", "it_a": "Scrivere i dati grezzi nel database, poi al momento della lettura modellarli secondo le esigenze del lettore ; Creare uno schema per i dati dopo averli letti dal database", "cue": "🔮 Cerca «database», «reading»: compare SOLO nella/e giusta/e. · giuste: 2"}, {"id": "m013", "topic": "Regressione", "text": "What is the coefficient of determination R2?", "options": [{"key": "A", "text": "Provide an index of goodness for a linear regression model", "it": "Fornisce un indice di bontà per un modello di regressione lineare", "why": "sì: R2 misura bontà del modello lineare."}, {"key": "B", "text": "Measure the amount of error in a linear regression model", "it": "Misura la quantità di errore in un modello di regressione lineare", "why": "no: non è quantità diretta di errore."}, {"key": "C", "text": "Measure the amount of error in a regression model", "it": "Misura la quantità di errore in un modello di regressione", "why": "no: non misura errore generico di regressione."}, {"key": "D", "text": "An index of goodness for a classification model", "it": "Un indice di bontà per un modello di classificazione", "why": "no: riguarda regressione, non classificazione."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Provide · index · goodness · linear»", "it_q": "Cos'è il coefficiente di determinazione R2?", "it_a": "Fornisce un indice di bontà per un modello di regressione lineare", "cue": "🔮 Cerca «provide»: compare SOLO nella giusta."}, {"id": "m014", "topic": "Clustering", "text": "Which of the statements below is true about K-Means?", "options": [{"key": "A", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters", "it": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster", "why": "sì: K-means può fermarsi in minimo locale."}, {"key": "B", "text": "K-means always stop to a configuration which gives the minimum distortion for the chosen value of the number of clusters", "it": "K-means si ferma sempre su una configurazione che dà la distorsione minima per il valore scelto del numero di cluster", "why": "no: “always” falso, non garantisce minimo globale."}, {"key": "C", "text": "K-means works well also with datasets having a very large number of attributes", "it": "K-means funziona bene anche con dataset che hanno un numero molto grande di attributi", "why": "no: alte dimensioni riducono efficacia delle distanze."}, {"key": "D", "text": "K-means finds the number of clusters which give the minimum distortion", "it": "K-means trova il numero di cluster che dà la distorsione minima", "why": "no: k va scelto, non trovato automaticamente."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🤖 KMeans veloce ma pigro: efficiente, sensibile ai centri iniziali, si siede sul primo minimo locale. 'Always' è sempre falso.", "it_q": "Quale delle seguenti affermazioni è vera riguardo a K-Means?", "it_a": "A volte k-means si ferma su una configurazione che non fornisce la distorsione minima per il valore scelto del numero di cluster", "cue": "🔮 Cerca «sometimes», «stops»: compare SOLO nella giusta."}, {"id": "m015", "topic": "BI & DWH", "text": "Check the main objectives pursued when choosing a Data Lake architecture:", "options": [{"key": "A", "text": "Store the data directly from the sources, as they are", "it": "Memorizzare i dati direttamente dalle fonti, così come sono", "why": "sì: data lake conserva sorgenti così come sono."}, {"key": "B", "text": "The data must be accurately structured, in order to provide fast answers to complex queries", "it": "I dati devono essere strutturati accuratamente, per fornire risposte rapide a query complesse", "why": "no: struttura accurata descrive data warehouse."}, {"key": "C", "text": "The storage must be scalable and cheap, at the expenses of latency", "it": "Lo storage deve essere scalabile ed economico, a scapito della latenza", "why": "sì: storage economico e scalabile, latenza sacrificabile."}, {"key": "D", "text": "Ensure high quality of data through an accurate cleaning and transformation step", "it": "Garantire un'alta qualità dei dati attraverso un'accurata fase di pulizia e trasformazione", "why": "no: cleaning accurato è obiettivo del DWH."}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "Stessa logica del 5: grezzo + economico. Le esche (\"accurately structured\", \"high quality through cleaning\") descrivono il DWH.", "it_q": "Verifica i principali obiettivi perseguiti quando si sceglie un'architettura Data Lake:", "it_a": "Memorizzare i dati direttamente dalle fonti, così come sono ; Lo storage deve essere scalabile ed economico, a scapito della latenza", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 2"}, {"id": "m016", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for High dimensional spaces?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance", "why": "no: euclidea degrada in alta dimensionalità."}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance", "why": "no: cosine è tipica per documenti vettoriali."}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance", "why": "sì: Manhattan più adatta in spazi ad alta dimensione."}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient", "why": "no: Jaccard serve per dati booleani/insiemi."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Quale funzione di distanza è più adatta per spazi ad alta dimensionalità?", "it_a": "Distanza di Manhattan", "cue": "🔮 Cerca «manhattan»: compare SOLO nella giusta."}, {"id": "m017", "topic": "Classificazione & ML", "text": "When training a neural network, what is the learning rate?", "options": [{"key": "A", "text": "The speed of convergence to a stable solution during the learning process", "it": "La velocità di convergenza a una soluzione stabile durante il processo di apprendimento", "why": "no: velocità di convergenza è effetto, non definizione."}, {"key": "B", "text": "The ratio between the size of the hidden layer and the input layer of the network", "it": "Il rapporto tra la dimensione del layer nascosto e del layer di input della rete", "why": "no: rapporto layer non definisce learning rate."}, {"key": "C", "text": "The slope of the activation function in a specific node", "it": "La pendenza della funzione di attivazione in un nodo specifico", "why": "no: pendenza attivazione non è learning rate."}, {"key": "D", "text": "A multiplying factor of the correction to be applied to the connection weights", "it": "Un fattore moltiplicativo della correzione da applicare ai pesi delle connessioni", "why": "sì: moltiplica correzione applicata ai pesi."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "⚠️ Esca A fortissima: \"velocità di convergenza\" — è l'effetto, non la definizione. La definizione è il moltiplicatore della correzione.", "it_q": "Durante l'addestramento di una Neural Network, cos'è il learning rate?", "it_a": "Un fattore moltiplicativo della correzione da applicare ai pesi delle connessioni", "cue": "🔮 Cerca «multiplying», «correction»: compare SOLO nella giusta."}, {"id": "m018", "topic": "Clustering", "text": "What does K-means try to minimise?", "options": [{"key": "A", "text": "The distortion, that is the sum of the squared distances of each point with respect to the points of the other clusters", "it": "La distorsione, cioè la somma delle distanze al quadrato di ogni punto rispetto ai punti degli altri cluster", "why": "no: non minimizza distanze verso altri cluster."}, {"key": "B", "text": "The distortion, that is the sum of the squared distances of each point with respect to its centroid", "it": "La distorsione, cioè la somma delle distanze al quadrato di ogni punto rispetto al suo centroide", "why": "sì: minimizza SSE rispetto al centroide assegnato."}, {"key": "C", "text": "The separation, that is the sum of the squared distances of each point with respect to its centroid", "it": "La separazione, cioè la somma delle distanze al quadrato di ogni punto rispetto al suo centroide", "why": "no: quella è distorsione, non separazione."}, {"key": "D", "text": "The separation, that is the sum of the squared distances of each cluster centroid with respect to the global centroid of the dataset", "it": "La separazione, cioè la somma delle distanze al quadrato di ogni centroide di cluster rispetto al centroide globale del dataset", "why": "no: SSB misura separazione, da massimizzare."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Esche: \"dagli altri cluster\" (no), \"separation\" (quella è SSB, ed è da massimizzare).", "it_q": "Cosa cerca di minimizzare K-means?", "it_a": "La distorsione, ovvero la somma delle distanze al quadrato di ciascun punto rispetto al suo centroide", "cue": "🔮 Doppietta: l'unica che INIZIA con «The distortion…» E FINISCE con «…centroid» (le altre al massimo una delle due)."}, {"id": "m019", "topic": "Preprocessing & dati", "text": "Which is the effect of the curse of dimensionality?", "options": [{"key": "A", "text": "When the number of dimensions increases the results tend to be prone to overfitting", "it": "Quando il numero di dimensioni aumenta i risultati tendono a essere soggetti a overfitting", "why": "no: overfitting possibile, ma non effetto chiave."}, {"key": "B", "text": "When the number of dimensions increases the euclidean distance becomes less effective to discriminate between points", "it": "Quando il numero di dimensioni aumenta la euclidean distance diventa meno efficace per discriminare tra i punti", "why": "sì: distanze euclidee diventano poco discriminanti."}, {"key": "C", "text": "When the number of dimensions increases the computing power becomes too high", "it": "Quando il numero di dimensioni aumenta la potenza di calcolo diventa troppo elevata", "why": "no: problema principale non è solo potenza computazionale."}, {"key": "D", "text": "When the number of dimensions increases the classifiers cannot be correctly tuned", "it": "Quando il numero di dimensioni aumenta i classificatori non possono essere tarati correttamente", "why": "no: tuning classificatori non definisce curse dimensionality."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "in 1000 dimensioni tutti i punti finiscono \"circa equidistanti\" — la distanza perde significato. Non è (solo) questione di potenza di calcolo (esca C).", "it_q": "Qual è l'effetto della curse of dimensionality?", "it_a": "Quando il numero di dimensioni aumenta la distanza euclidea diventa meno efficace per discriminare tra i punti", "cue": "🔮 Cerca «discriminate», «effective»: compare SOLO nella giusta."}, {"id": "m020", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Vectors of terms representing documents?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance", "why": "no: euclidea poco adatta a vettori testuali sparsi."}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance", "why": "sì: cosine confronta orientamento dei vettori documento."}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance", "why": "no: Manhattan è per alta dimensionalità generica."}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient", "why": "no: Jaccard è per insiemi booleani."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Quale funzione di distanza è più adatta per vettori di termini che rappresentano documenti?", "it_a": "Distanza coseno", "cue": "🔮 Cerca «cosine»: compare SOLO nella giusta."}, {"id": "m021", "topic": "Association Rules", "text": "Which formula computes the Conviction of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)", "why": "no: formula della leverage."}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)", "why": "no: formula della lift."}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)", "why": "no: formula della confi ess computational power", "it": "MDS richiede meno potenza computazionale", "why": "no: MDS non è necessariamente meno costoso."}, {"key": "B", "text": "MDS can be used also with categorical data, provided that the matrix of the distance is available, while PCA is limited to vector spaces", "it": "MDS può essere usato anche con dati categorici, a condizione che la matrice delle distanze sia disponibile, mentre PCA è limitata agli spazi vettoriali", "why": "sì: MDS usa matrice distanze, anche dati categorici."}, {"key": "C", "text": "MDS can be used with categorical data after a transformation in a vector space", "it": "MDS può essere usato con dati categorici dopo una trasformazione in uno spazio vettoriale", "why": "no: vantaggio è evitare spazio vettoriale esplicito."}, {"key": "D", "text": "MDS can work on any kind of data, while PCA is limited to categorical data", "it": "MDS può funzionare su qualsiasi tipo di dati, mentre PCA è limitata ai dati categorici", "why": "no: PCA richiede vettori numerici, non categorici."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "MDS = \"Mi Dai le Distanze?\" — a MDS bastano le distanze, non servono coordinate.", "it_q": "Per ridurre la dimensionalità di un dataset, qual è il vantaggio di Multi Dimensional Scaling (MDS) rispetto a PCA?", "it_a": "MDS può essere usato anche con dati categorici, a condizione che la matrice delle distanze sia disponibile, mentre PCA è limitata agli spazi vettoriali", "cue": "🔮 Cerca «available», «distance»: compare SOLO nella giusta."}, {"id": "m034", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when a nominal attribute needs to be used as predicting (sklearn)?", "options": [{"key": "A", "text": "Rescaling", "it": "Riscalamento", "why": "no: rescaling serve per numerici."}, {"key": "B", "text": "Non linear transformations", "it": "Trasformazioni non lineari", "why": "no: trasformazioni non lineari non codificano nominali."}, {"key": "C", duces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico", "why": "no: descrive slice, fissando una dimensione."}, {"key": "B", "text": "Creates a link between concepts in interrelated cubes, in order to compare them", "it": "Crea un collegamento tra concetti in cubi interrelati, al fine di confrontarli", "why": "sì: drill-across collega cubi interrelati."}, {"key": "C", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia", "why": "no: descrive drill-down, maggiore dettaglio."}, {"key": "D", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia il layout, al fine di analizzare un gruppo di dati da un punto di vista diverso", "why": "no: descrive pivot, cambio layout."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle definizioni seguenti descrive l'operazione OLAP \"Drill-Across\"?", "it_a": "Crea un collegamento tra concetti in cubi interrelati, al fine di confrontarli", "cue": "🔮 Cerca «interrelated», «concepts»: compare SOLO nella giusta."}, {"id": "m037", "topic": "Clustering", "text": "What is the first step in agglomerative clustering?", "options": [{"key": "A", "text": "Cutting the Dendrogram", "it": "Taglio del Dendrogram", "why": "no: taglio dendrogramma avviene dopo costruzione."}, {"key": "B", "text": "Pairwise Cluster Similarity Calculation", "it": "Calcolo della similarità pairwise tra cluster", "why": "no: similarità calcolata dopo inizializzazione."}, {"key": "C", "text": "Initialization: Start with each data point as a singleton cluster", "it": "Inizializzazione: iniziare con ogni punto dati come singleton cluster", "why": "sì: ogni punto parte come cluster singleton."}, {"key": "D", "text": "Cluster Assignment", "it": "Assegnazione ai cluster", "why": "no: cluster assignment è tipico di K-means."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "62-61. Come si decide il numero di cluster → ✅ B (tagliando il dendrogramma a una certa altezza).", "it_q": "Qual è il primo passo nel clustering agglomerativo?", "it_a": "Inizializzazione: Iniziare con ogni punto dati come cluster singleton", "cue": "🔮 Cerca «initialization», «singleton»: compare SOLO nella giusta."}, {"id": "m038", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Extraction step?", "options": [{"key": "A", "text": "Elimination of duplicates", "it": "Eliminazione dei duplicati", "why": "no: eliminazione duplicati appartiene al cleansing."}, {"key": "B", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali", "why": "sì: extraction acquisisce snapshot dei dati operazionali."}, {"key": "C", "text": "Association of a timestamp to the operational data", "it": "Associazione di un timestamp ai dati operazionali", "why": "sì: extraction associa timestamp ai dati estratti."}, {"key": "D", "text": "Usage of dictionaries to solve inconsistencies", "it": "Utilizzo di dizionari per risolvere le inconsistenze", "why": "no: dizionari risolvono inconsistenze nel cleansing."}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Estrazione?", "it_a": "Snapshot dei dati operativi ; Associazione di un timestamp ai dati operativi", "cue": "🔮 Cerca «operational»: compare SOLO nella/e giusta/e. · giuste: 2"}, {"id": "m039", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the confidence of the rule B -> E?", "options": [{"key": "A", "text": "100%", "it": "100%", "why": "no: confidenza B→E = transazioni BE / B = 1/3."}, {"key": "B", "text": "50%", "it": "50%", "why": "no: 50% sarebbe 1/2, qui B compare tre volte."}, {"key": "C", "text": "33%", "it": "33%", "why": "sì: B ed E insieme una volta su tre B."}, {"key": "D", "text": "20%", "it": "20%", "why": "no: 20% è supporto, non confidenza B→E."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Qual è la confidence della regola B -> E?", "it_a": "33%", "cue": "🔮 L'unica che FINISCE con «…33%»."}, {"id": "m040", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when an attribute has a very skewed distribution (long tail)?", "options": [{"key": "A", "text": "Rescaling", "it": "Riscalamento", "why": "no: rescaling cambia scala, non corregge code lunghe."}, {"key": "B", "text": "Non linear transformations", "it": "Trasformazioni non lineari", "why": "sì: trasformazioni non lineari comprimono distribuzioni molto asimmetriche."}, {"key": "C", "text": "Aggregation", "it": "Aggregazione", "why": "no: aggregazione riduce dettaglio, non normalizza la coda."}, {"key": "D", "text": "OneHot Encoding", "it": "OneHot Encoding", "why": "no: OneHot serve categorie, non distribuzioni numeriche skewed."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «linear · transformations»", "it_q": "Quale attività di preprocessing è appropriata quando un attributo ha una distribuzione molto skewed (long tail)?", "it_a": "Trasformazioni non lineari", "cue": "🔮 Cerca «transformations», «linear»: compare SOLO nella giusta."}, {"id": "m041", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the confidence of the rule A,C -> B?", "options": [{"key": "A", "text": "50%", "it": "50%", "why": "sì: AC compare due volte, ACB una: confidenza 1/2."}, {"key": "B", "text": "40%", "it": "40%", "why": "no: 40% è supporto relativo, non confidenza AC→B."}, {"key": "C", "text": "20%", "it": "20%", "why": "no: 20% è supporto ACB, non confidenza."}, {"key": "D", "text": "100%", "it": "100%", "why": "no: non tutte le transazioni AC contengono B."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Qual è la confidence della regola A,C -> B?", "it_a": "50%", "cue": "🔮 L'unica che FINISCE con «…50%»."}, {"id": "m042", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Slice & Dice\"?", "options": [{"key": "A", "text": "Creates a link between concepts in interrelated cubes, in order to compare them", "it": "Crea un collegamento tra concetti in cubi interrelati, al fine di confrontarli", "why": "no: questo è Drill-Across tra cubi correlati."}, {"key": "B", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico", "why": "sì: fissa una dimensione e riduce il cubo."}, {"key": "C", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy", "it": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia", "why": "no: questo è Roll-Up, aumenta aggregazione gerarchica."}, {"key": "D", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia il layout, al fine di analizzare un gruppo di dati da un punto di vista diverso", "why": "no: questo è Pivot, cambia layout di analisi."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle definizioni seguenti descrive l'operazione OLAP \"Slice & Dice\"?", "it_a": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico", "cue": "🔮 Cerca «dimensions», «specific»: compare SOLO nella giusta."}, {"id": "m043", "topic": "BI & DWH", "text": "What is the ranking for the following technologies, based on the increasing level of abstraction? Technologies: - OLAP analysis on Data Mart - Data Mining on operational databases - SQL queries on operational databases; Order: from left (it generates the most specific information) to right (it has a higher level of knowledge).", "options": [{"key": "A", "text": "Data Mining, OLAP analysis, SQL queries", "it": "Data Mining, analisi OLAP, query SQL", "why": "no: Data Mining è più astratto, non più specifico."}, {"key": "B", "text": "SQL queries, OLAP analysis, Data Mining", "it": "query SQL, analisi OLAP, Data Mining", "why": "sì: SQL puntuale, OLAP aggregato, Data Mining conoscenza."}, {"key": "C", "text": "SQL queries, Data Mining, OLAP analysis", "it": "query SQL, Data Mining, analisi OLAP", "why": "no: Data Mining supera OLAP come astrazione."}, {"key": "D", "text": "OLAP analysis, SQL queries, Data Mining", "it": "analisi OLAP, query SQL, Data Mining", "why": "no: OLAP non è più specifico di SQL."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "SQL ti dà il dato puntuale (specifico), OLAP l'aggregato, il Data Mining la conoscenza (pattern). Dal fatto al sapere: \"Sali Ogni Dettaglio\" (SQL, OLAP, DM).", "it_q": "Qual è l'ordinamento delle seguenti tecnologie, in base al livello di astrazione crescente? Tecnologie: - Analisi OLAP su Data Mart - Data Mining su database operazionali - Query SQL su database operazionali; Ordine: da sinistra (genera l'informazione più specifica) a destra (ha un livello di conoscenza più alto).", "it_a": "SQL queries, OLAP analysis, Data Mining", "cue": "🔮 L'unica che INIZIA con «SQL queries, OLAP…» e FINISCE con «…analysis, Data Mining»."}, {"id": "m044", "topic": "Preprocessing & dati", "text": "Which is the main reason for the MinMax scaling (rescaling) of attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions", "it": "Cambiare la distribuzione degli attributi numerici, al fine di ottenere distribuzioni gaussiane", "why": "no: gaussianizzare richiede trasformazioni, non MinMax scaling."}, {"key": "B", "text": "Map all the nominal attributes to the same range", "it": "Mappare tutti gli attributi nominali allo stesso range", "why": "no: MinMax riguarda attributi numerici, non nominali."}, {"key": "C", "text": "Remove abnormal values", "it": "Rimuovere i valori anomali", "why": "no: outlier si trattano separatamente, non con rescaling."}, {"key": "D", "text": "Map all the numeric attributes to the same range, in order to prevent attributes with higher range from having prevalent influence", "it": "Mappare tutti gli attributi numerici allo stesso range, al fine di impedire che attributi con range maggiore abbiano influenza prevalente", "why": "sì: porta numerici nello stesso range, evitando dominanze."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «numeric · attributes · same · range»", "it_q": "Qual è il motivo principale del MinMax scaling (rescaling) degli attributi?", "it_a": "Mappa tutti gli attributi numerici sullo stesso intervallo, per evitare che attributi con range maggiore abbiano influenza prevalente", "cue": "🔮 Cerca «prevalent», «influence»: compare SOLO nella giusta."}, {"id": "m045", "topic": "Association Rules", "text": "What is the meaning of the statement \"the support is anti-monotone\"?", "options": [{"key": "A", "text": "The support of an itemset never exceeds the support if its subsets", "it": "Il support di un itemset non supera mai il support dei suoi subsets", "why": "sì: un itemset non supera il supporto dei sottoinsiemi."}, {"key": "B", "text": "The support of an itemset is always smaller than the support of its supersets", "it": "Il support di un itemset è sempre minore del support dei suoi supersets", "why": "no: i supersets hanno supporto minore o uguale, non maggiore."}, {"key": "C", "text": "The support of an itemsets never exceeds the support if its supersets", "it": "Il support di un itemset non supera mai il support dei suoi supersets", "why": "no: confronto invertito: contano i sottoinsiemi, non supersets."}, {"key": "D", "text": "The support of an itemset is always smaller than the support of its subsets", "it": "Il support di un itemset è sempre minore del support dei suoi subsets", "why": "no: serve “mai supera”, non “sempre minore”."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "aggiungere item può solo restringere le transazioni che li contengono tutti. ⚠️ Le 4 opzioni sono permutazioni di subset/superset e never-exceeds/always-smaller: la giusta dice \"never exceeds\" (≤, non <) + \"subsets\". Mnemonica: \"il figlio non supera il padre\" (l'itemset più grande = figlio; i suoi sottoinsiemi = genitori).", "it_q": "Qual è il significato dell'affermazione \"the support is anti-monotone\"?", "it_a": "Il support di un itemset non supera mai il support dei suoi sottoinsiemi", "cue": "🔮 L'unica che FINISCE con «…if its subsets»."}, {"id": "m046", "topic": "Association Rules", "text": "How does pruning work when generating frequent itemsets?", "options": [{"key": "A", "text": "If an itemset is not frequent, then none of its supersets can be frequent, therefore the frequencies of the supersets are not evaluated", "it": "Se un itemset non è frequent, allora nessuno dei suoi supersets può essere frequent, quindi le frequenze dei supersets non vengono valutate", "why": "sì: se infrequente, tutti i supersets sono infrequenti."}, {"key": "B", "text": "If an itemset is frequent, then none of its supersets can be frequent, therefore the frequencies of the supersets are not evaluated", "it": "Se un itemset è frequent, allora nessuno dei suoi supersets può essere frequent, quindi le frequenze dei supersets non vengono valutate", "why": "no: un frequente può avere supersets frequenti o no."}, {"key": "C", "text": "If an itemset is not frequent, then none of its subsets can be frequent, therefore the frequencies of the subsets are not evaluated", "it": "Se un itemset non è frequent, allora nessuno dei suoi subsets può essere frequent, quindi le frequenze dei subsets non vengono valutate", "why": "no: i sottoinsiemi di infrequente possono essere frequenti."}, {"key": "D", "text": "If an itemset is frequent, then none of its subsets can be frequent, therefore the frequencies of the subsets are not evaluated", "it": "Se un itemset è frequent, allora nessuno dei suoi subsets può essere frequent, quindi le frequenze dei subsets non vengono valutate", "why": "no: i sottoinsiemi di frequente sono sicuramente frequenti."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "È l'anti-monotonicità usata al contrario: il ramo morto non rifiorisce.", "it_q": "Come funziona il pruning nella generazione dei frequent itemsets?", "it_a": "Se un itemset non è frequente, allora nessuno dei suoi superset può essere frequente, quindi le frequenze dei superset non vengono valutate", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione."}, {"id": "m047", "topic": "Association Rules", "text": "Which formula computes the Confidence of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)", "why": "no: supporto congiunto meno prodotto supporti è Leverage."}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)", "why": "no: confidenza divisa supporto conseguente è Lift."}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)", "why": "sì: confidenza = supporto regola diviso supporto antecedente."}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))", "it": "(1 - sup(C)) / (1 - conf(A -> C))", "why": "no: rapporto con complementi calcola Conviction."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence.", "it_q": "Quale formula calcola la Confidence di una regola (A -> C)?", "it_a": "sup(A -> C) / sup(A)", "cue": "🔮 L'unica che INIZIA con «sup(A -…» e FINISCE con «…sup(A)»."}, {"id": "m048", "topic": "Preprocessing & dati", "text": "Given the two binary vectors below, which is their similarity according to the Simple Matching Coefficient? 1000101101 1011101010", "options": [{"key": "A", "text": "0.1", "it": "0.1", "why": "no: SMC conta match uguali: sono cinque, non uno."}, {"key": "B", "text": "0.3", "it": "0.3", "why": "no: tre match su dieci non corrisponde ai vettori."}, {"key": "C", "text": "0.5", "it": "0.5", "why": "sì: cinque posizioni uguali su dieci: SMC 0.5."}, {"key": "D", "text": "0.2", "it": "0.2", "why": "no: due match su dieci è conteggio errato."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Metodo: SMC = posizioni uguali / totale. Confronta cifra per cifra: 5 match su 10 → 0.5.", "it_q": "Dati i due vettori binari seguenti, qual è la loro similarità secondo il Simple Matching Coefficient? 1000101101 1011101010", "it_a": "0.5", "cue": "🔮 L'unica che INIZIA con «0.5…»."}, {"id": "m049", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the operations below performs aggregation?", "options": [{"key": "A", "text": "Combination of two attributes in order to obtatn a more general attribute with smaller variability", "it": "Combinazione di due attributi al fine di ottenere un attributo più generale con minore variabilità", "why": "no: combina attributi, più generalizzazione che aggregazione righe."}, {"key": "B", "text": "Reduction of the number of distinct values of an attribute in order to reduce its variability", "it": "Riduzione del numero di valori distinti di un attributo al fine di ridurne la variabilità", "why": "sì: riduce valori distinti, quindi aggrega categorie."}, {"key": "C", "text": "Reduction of the number of rows of the dataset by applying a grouping on one or more attributes and computing the measures as the results of aggregation functions", "it": "Riduzione del numero di righe del dataset applicando un raggruppamento su uno o più attributi e calcolando le misure come risultati di funzioni di aggregazione", "why": "sì: grouping e funzioni riassuntive aggregano righe."}, {"key": "D", "text": "Combination of two or more datasets in order to obtatn more Information", "it": "Combinazione di due o più dataset al fine di ottenere più informazioni", "why": "no: integrazione dataset, non aggregazione."}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "In data preprocessing, quale delle operazioni seguenti esegue l'aggregazione?", "it_a": "Riduzione del numero di valori distinti di un attributo per ridurne la variabilità ; Riduzione del numero di righe del dataset applicando un raggruppamento su uno o più attributi e calcolando le misure come risultato di funzioni di aggregazione", "cue": "🔮 Cerca «reduction», «number»: compare SOLO nella/e giusta/e. · giuste: 2"}, {"id": "m050", "topic": "Clustering", "text": "After fitting DBSCAN with the default parameter values the results are: 0 clusters, 100% of noise points. Which will be your next trial?", "options": [{"key": "A", "text": "Reduce the minimum number of objects in the neighborhood", "it": "Ridurre il numero minimo di oggetti nel vicinato", "why": "sì: meno minPts rende più facile formare densità."}, {"key": "B", "text": "Reduce the minimum number of objects in the neighborhood and the radius of the neighborhood", "it": "Ridurre il numero minimo di oggetti nel vicinato e il raggio del vicinato", "why": "no: ridurre raggio rende densità ancora più difficile."}, {"key": "C", "text": "Increase the radius of the neighborhood", "it": "Aumentare il raggio del vicinato", "why": "sì: raggio maggiore include più vicini, meno rumore."}, {"key": "D", "text": "Decrease the radius of the neighborhood", "it": "Diminuire il raggio del vicinato", "why": "no: raggio minore aumenta rumore, non crea cluster."}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "Ragionamento fisico: nessuna zona risulta \"densa\" → o abbassi l'asticella della densità (meno punti richiesti) o allarghi il cerchio in cui conti i punti. Entrambe le manovre vanno nello stesso verso: rendere più facile essere \"denso\".", "it_q": "Dopo aver fittato DBSCAN con i valori di default dei parametri i risultati sono: 0 cluster, 100% di noise points. Quale sarà il tuo prossimo tentativo?", "it_a": "Riduci il numero minimo di oggetti nel vicinato ; Aumenta il raggio del vicinato", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 2"}, {"id": "m051", "topic": "Clustering", "text": "Which of the following clustering methods is not based on distances between objects?", "options": [{"key": "A", "text": "Hierarchical Agglomerative", "it": "Gerarchico Agglomerativo", "why": "no: gerarchico agglomerativo usa distanze tra oggetti/cluster."}, {"key": "B", "text": "DBSCAN", "it": "DBSCAN", "why": "no: DBSCAN usa distanza entro eps-neighborhood."}, {"key": "C", "text": "K-Means", "it": "K-Means", "why": "no: K-Means minimizza distanze dai centroidi."}, {"key": "D", "text": "Expectation Maximization", "it": "Expectation Maximization", "why": "sì: EM massimizza likelihood, non distanze geometriche."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "EM ragiona per probabilità (likelihood), non per metri. Gli altri tre (KMeans, DBSCAN, gerarchico) vivono di distanze.", "it_q": "Quale dei seguenti metodi di clustering non si basa sulle distanze tra gli oggetti?", "it_a": "Expectation Maximization", "cue": "🔮 Cerca «maximization», «expectation»: compare SOLO nella giusta."}, {"id": "m052", "topic": "Association Rules", "text": "Which of the statements below best describes the strategy of Apriori in finding the frequent itemsets?", "options": [{"key": "A", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are considered only at the end", "it": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca sono considerate solo alla fine", "why": "no: Apriori pota presto, non rimanda parti inutili."}, {"key": "B", "text": "Evaluation of the confidence of the itemsets in an order such that uninteresting parts of the search space are pruned", "it": "Valutazione della confidence degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca sono potate", "why": "no: gli itemset frequenti si cercano con supporto, non confidenza."}, {"key": "C", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible", "it": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca sono potate il prima possibile", "why": "sì: valuta supporti e pota presto usando anti-monotonia."}, {"key": "D", "text": "Evaluation of the support of the itemsets in an order such that the interesting parts of the search space are pruned", "it": "Valutazione del support degli itemset in un ordine tale che le parti interessanti dello spazio di ricerca sono potate", "why": "no: Apriori pota parti non interessanti, non interessanti."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Parole chiave: \"support\" (non confidence!) + \"pruned as soon as possible\".", "it_q": "Quale delle seguenti affermazioni descrive meglio la strategia di Apriori nel trovare i frequent itemsets?", "it_a": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca vengano pruned il prima possibile", "cue": "🔮 Cerca «possible», «soon»: compare SOLO nella giusta."}, {"id": "m053", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Silhouette Index", "it": "Indice di Silhouette", "why": "sì: Silhouette valuta clustering; gli altri sono supervised/tree."}, {"key": "B", "text": "Misclassification Error", "it": "Errore di misclassificazione", "why": "no: misclassification error è misura classificativa, come impurità."}, {"key": "C", "text": "Entropy", "it": "Entropia", "why": "no: entropia è impurità per classificazione/alberi."}, {"key": "D", "text": "Gini Index", "it": "Indice di Gini", "why": "no: Gini è impurità per classificazione/alberi."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "2. Chi è il diverso? (EM, Decision Tree, K-means, DBSCAN) → ✅ B Decision Tree (supervisionato tra clusterer).", "it_q": "Quale è diverso dagli altri?", "it_a": "Silhouette Index", "cue": "🔮 Cerca «silhouette»: compare SOLO nella giusta."}, {"id": "m054", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Transformation step?", "options": [{"key": "A", "text": "Usage of dictionaries to solve inconsistencies", "it": "Uso di dizionari per risolvere le inconsistenze", "why": "no: dizionari risolvono inconsistenze: cleansing."}, {"key": "B", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali", "why": "no: snapshot dei dati operazionali appartiene a extraction."}, {"key": "C", "text": "Denormalisation", "it": "Denormalizzazione", "why": "sì: denormalizzazione ristruttura schema nella transformation."}, {"key": "D", "text": "Calculation of derived data", "it": "Calcolo di dati derivati", "why": "sì: dati derivati si calcolano nella transformation."}], "correct": ["C", "D"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Transformation?", "it_a": "Denormalizzazione ; Calcolo di dati derivati", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 2"}, {"id": "m055", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Vector space with real values?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Distanza euclidea", "why": "sì: euclidea è distanza standard per vettori real-valued."}, {"key": "B", "text": "Cosine distance", "it": "Distanza coseno", "why": "no: coseno misura orientamento, più usato per testi/sparsità."}, {"key": "C", "text": "Manhattan distance", "it": "Distanza di Manhattan", "why": "no: Manhattan è valida, ma meno standard per reali generici."}, {"key": "D", "text": "Jaccard coefficient", "it": "Coefficiente di Jaccard", "why": "no: Jaccard serve insiemi/binari, non vettori reali."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "il DWH risponde a domande analitiche/aggregate (massimi, totali per dimensione, relazioni). Le esche sono query operative puntuali (\"stock del prodotto X nel magazzino Y\", \"ricavo di ieri nel negozio BO03\") → quelle sono da DBMS.", "it_q": "Quale funzione di distanza è più adatta per uno spazio vettoriale con valori reali?", "it_a": "Euclidean distance", "cue": "🔮 Cerca «euclidean»: compare SOLO nella giusta."}, {"id": "m056", "topic": "BI & DWH", "text": "Which of the following are typical data warehouse queries?", "options": [{"key": "A", "text": "Which products maximize the profit?", "it": "Quali prodotti massimizzano il profitto?", "why": "sì: massimizzare profitto è analisi aggregata decisionale."}, {"key": "B", "text": "Which is the stock of product \"XXX\" in the \"YYY\" warehouse?", "it": "Qual è lo stock del prodotto \"XXX\" nel magazzino \"YYY\"?", "why": "no: stock puntuale magazzino-prodotto è query operazionale."}, {"key": "C", "text": "What is the total revenue of yesterday in shop \"BO03\"?", "it": "Qual è il ricavo totale di ieri nel negozio \"BO03\"?", "why": "no: ricavo ieri in singolo shop è operazionale puntuale."}, {"key": "D", "text": "What is the total revenue per product category and state?", "it": "Qual è il ricavo totale per categoria di prodotto e stato?", "why": "sì: ricavi per categoria e stato sono analisi multidimensionale."}, {"key": "E", "text": "What is the relationship between profits gained by products \"WWW\" and \"ZZZ\"?", "it": "Qual è la relazione tra i profitti ottenuti dai prodotti \"WWW\" e \"ZZZ\"?", "why": "sì: relazione tra profitti prodotti è analisi storica/analitica."}], "correct": ["A", "D", "E"], "note": "", "source": "banco 2026", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake).", "it_q": "Quali delle seguenti sono tipiche query di data warehouse?", "it_a": "Quali prodotti massimizzano il profitto? ; Qual è il ricavo totale per categoria di prodotto e stato? ; Qual è la relazione tra i profitti ottenuti dai prodotti \"WWW\" e \"ZZZ\"?", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 3"}, {"id": "m057", "topic": "Classificazione & ML", "text": "When developing a classifier, which of the following is a symptom of overfitting?", "options": [{"key": "A", "text": "The error rate in the test set is much smaller than the error rate in the training set", "it": "Il tasso di errore nel test set è molto inferiore a quello nel training set", "why": "no: test molto migliore del train non indica overfitting."}, {"key": "B", "text": "The precision is much greater than the recall", "it": "La precision è molto maggiore della recall", "why": "no: precisione alta e recall bassa indica sbilanciamento soglia."}, {"key": "C", "text": "The error rate in the test set is more than 30%", "it": "Il tasso di errore nel test set è superiore al 30%", "why": "no: errore test alto da solo non prova overfitting."}, {"key": "D", "text": "The error rate in the test set is much greater than the error rate in the training set", "it": "Il tasso di errore nel test set è molto superiore a quello nel training set", "why": "sì: test molto peggiore del train segnala overfitting."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Già nostro pane quotidiano (01b §3.2). L'esca A è l'inverso (test molto migliore del train — semmai un colpo di fortuna o un leak).", "it_q": "Quando si sviluppa un classifier, quale dei seguenti è un sintomo di overfitting?", "it_a": "Il tasso di errore nel test set è molto maggiore di quello nel training set", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione."}, {"id": "m058", "topic": "Association Rules", "text": "Which formula computes the Leverage of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)", "why": "sì: Leverage = supporto congiunto meno indipendenza attesa."}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)", "why": "no: questa formula è Lift."}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)", "why": "no: questa formula è Confidence."}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))", "it": "(1 - sup(C)) / (1 - conf(A -> C))", "why": "no: questa formula è Conviction."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence.", "it_q": "Quale formula calcola il Leverage di una regola (A -> C)?", "it_a": "sup(A U C) - sup(A)sup(C)", "cue": "🔮 L'unica che INIZIA con «sup(A U…» e FINISCE con «…A)sup(C)»."}, {"id": "m059", "topic": "BI & DWH", "text": "In which part of the CRISP methodology we perform the test design activity?", "options": [{"key": "A", "text": "Data Understanding", "it": "Comprensione dei Dati", "why": "no: data understanding esplora dati, non disegna test."}, {"key": "B", "text": "Evaluation", "it": "Valutazione", "why": "no: evaluation usa il test, non lo progetta."}, {"key": "C", "text": "Business Understanding", "it": "Comprensione del Business", "why": "no: business understanding definisce obiettivi, non test design."}, {"key": "D", "text": "Modeling", "it": "Modellazione", "why": "sì: il test design si prepara nella fase Modeling."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Controintuitiva (verrebbe da dire Evaluation!): il disegno del test si fa mentre si modella, la valutazione dopo. Mnemonica: \"prepari l'esame quando studi (modeling), non quando lo dai (evaluation)\".", "it_q": "In quale parte della metodologia CRISP si esegue l'attività di test design?", "it_a": "Modeling", "cue": "🔮 Cerca «modeling»: compare SOLO nella giusta."}, {"id": "m060", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Pivot\"?", "options": [{"key": "A", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy", "it": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia", "why": "no: questo descrive Roll-Up."}, {"key": "B", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia", "why": "no: questo descrive Drill-Down."}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia il layout, per analizzare un gruppo di dati da un diverso punto di vista", "why": "sì: Pivot cambia layout e punto di vista."}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them", "it": "Crea un collegamento tra concetti in cubi interrelati, per confrontarli", "why": "no: questo descrive Drill-Across."}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico", "why": "no: questo descrive Slice & Dice."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle definizioni seguenti descrive l'operazione OLAP \"Pivot\"?", "it_a": "Cambia il layout, in modo da analizzare un gruppo di dati da un punto di vista diverso", "cue": "🔮 Cerca «different», «viewpoint»: compare SOLO nella giusta."}, {"id": "m061", "topic": "Preprocessing & dati", "text": "Which is the main reason for the standardization of numeric attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions", "it": "Cambia la distribuzione degli attributi numerici per ottenere distribuzioni gaussiane", "why": "no: standardizzazione non rende necessariamente gaussiani i dati."}, {"key": "B", "text": "Map all the numeric attributes to a new range such that the mean is zero and the variance is one", "it": "Mappa tutti gli attributi numerici in un nuovo intervallo in modo che la media sia zero e la varianza sia uno", "why": "sì: media zero e varianza uno per attributi numerici."}, {"key": "C", "text": "Map all the nominal attributes to the same range", "it": "Mappa tutti gli attributi nominali nello stesso intervallo", "why": "no: riguarda numerici, non nominali."}, {"key": "D", "text": "Remove non-standard values", "it": "Rimuovi i valori non standard", "why": "no: non rimuove valori anomali o non-standard."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «numeric · attributes · range · such»", "it_q": "Qual è il motivo principale della standardizzazione degli attributi numerici?", "it_a": "Mappa tutti gli attributi numerici a un nuovo intervallo tale che la media sia zero e la varianza sia uno", "cue": "🔮 Cerca «variance», «such»: compare SOLO nella giusta."}, {"id": "m062", "topic": "Clustering", "text": "How is the number of clusters determined in agglomerative clustering?", "options": [{"key": "A", "text": "By assigning each data point to a cluster based on the final structure", "it": "Assegnando ogni punto dati a un cluster in base alla struttura finale", "why": "no: assegnazione finale non determina k in agglomerativo."}, {"key": "B", "text": "By cutting the dendrogram at a certain height", "it": "Tagliando il dendrogramma a una certa altezza", "why": "sì: k si ottiene tagliando il dendrogramma."}, {"key": "C", "text": "By merging the closest clusters", "it": "Unendo i cluster più vicini", "why": "no: merging costruisce gerarchia, non sceglie direttamente k."}, {"key": "D", "text": "By computing the pairwise similarity", "it": "Calcolando la similarità a coppie", "why": "no: similarità serve al processo, non decide k."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "
