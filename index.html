hood and the radius of the neighborhood"}, {"key": "C", "text": "Increase the radius of the neighborhood"}, {"key": "D", "text": "Decrease the radius of the neighborhood"}], "correct": ["A", "C"], "note": "", "source": "banco 2026"}, {"id": "m051", "topic": "Clustering", "text": "Which of the following clustering methods is not based on distances between objects?", "options": [{"key": "A", "text": "Hierarchical Agglomerative"}, {"key": "B", "text": "DBSCAN"}, {"key": "C", "text": "K-Means"}, {"key": "D", "text": "Expectation Maximization"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m052", "topic": "Association Rules", "text": "Which of the statements below best describes the strategy of Apriori in finding the frequent itemsets?", "options": [{"key": "A", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are considered only at the end"}, {"key": "B", "text": "Evaluation of the confidence of the itemsets in an order such that uninteresting parts of the search space are pruned"}, {"key": "C", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible"}, {"key": "D", "text": "Evaluation of the support of the itemsets in an order such that the interesting parts of the search space are pruned"}], "correct": ["C"], "note": "", "source": "banco 2026"}, {"id": "m053", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Silhouette Index"}, {"key": "B", "text": "Misclassification Error"}, {"key": "C", "text": "Entropy"}, {"key": "D", "text": "Gini Index"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m054", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Transformation step?", "options": [{"key": "A", "text": "Usage of dictionaries to solve inconsistencies"}, {"key": "B", "text": "Snapshot of the operational data"}, {"key": "C", "text": "Denormalisation"}, {"key": "D", "text": "Calculation of derived data"}], "correct": ["C", "D"], "note": "", "source": "banco 2026"}, {"id": "m055", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Vector space with real values?", "options": [{"key": "A", "text": "Euclidean distance"}, {"key": "B", "text": "Cosine distance"}, {"key": "C", "text": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m056", "topic": "BI & DWH", "text": "Which of the following are typical data warehouse queries?", "options": [{"key": "A", "text": "Which products maximize the profit?"}, {"key": "B", "text": "Which is the stock of product \"XXX\" in the \"YYY\" warehouse?"}, {"key": "C", "text": "What is the total revenue of yesterday in shop \"BO03\"?"}, {"key": "D", "text": "What is the total revenue per product category and state?"}, {"key": "E", "text": "What is the relationship between profits gained by products \"WWW\" and \"ZZZ\"?"}], "correct": ["A", "D", "E"], "note": "", "source": "banco 2026"}, {"id": "m057", "topic": "Classificazione & ML", "text": "When developing a classifier, which of the following is a symptom of overfitting?", "options": [{"key": "A", "text": "The error rate in the test set is much smaller than the error rate in the training set"}, {"key": "B", "text": "The precision is much greater than the recall"}, {"key": "C", "text": "The error rate in the test set is more than 30%"}, {"key": "D", "text": "The error rate in the test set is much greater than the error rate in the training set"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m058", "topic": "Association Rules", "text": "Which formula computes the Leverage of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m059", "topic": "BI & DWH", "text": "In which part of the CRISP methodology we perform the test design activity?", "options": [{"key": "A", "text": "Data Understanding"}, {"key": "B", "text": "Evaluation"}, {"key": "C", "text": "Business Understanding"}, {"key": "D", "text": "Modeling"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m060", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Pivot\"?", "options": [{"key": "A", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy"}, {"key": "B", "text": "Reduces data aggregation and adds a detail level to a hierarchy"}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them"}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}], "correct": ["C"], "note": "", "source": "banco 2026"}, {"id": "m061", "topic": "Preprocessing & dati", "text": "Which is the main reason for the standardization of numeric attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions"}, {"key": "B", "text": "Map all the numeric attributes to a new range such that the mean is zero and the variance is one"}, {"key": "C", "text": "Map all the nominal attributes to the same range"}, {"key": "D", "text": "Remove non-standard values"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m062", "topic": "Clustering", "text": "How is the number of clusters determined in agglomerative clustering?", "options": [{"key": "A", "text": "By assigning each data point to a cluster based on the final structure"}, {"key": "B", "text": "By cutting the dendrogram at a certain height"}, {"key": "C", "text": "By merging the closest clusters"}, {"key": "D", "text": "By computing the pairwise similarity"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m063", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Cleansing step?", "options": [{"key": "A", "text": "Elimination of duplicates"}, {"key": "B", "text": "Association of a timestamp to the operational data"}, {"key": "C", "text": "Usage of dictionaries to solve inconsistencies"}, {"key": "D", "text": "Snapshot of the operational data"}], "correct": ["A", "C"], "note": "", "source": "banco 2026"}, {"id": "m064", "topic": "Clustering", "text": "Which of the statements below is true about K-Means?", "options": [{"key": "A", "text": "K-mean always stops to a configuration which gives the minimum distortion for the chosen value of the number of clusters"}, {"key": "B", "text": "K-means is very sensitive to the initial assignment of the centers"}, {"key": "C", "text": "K-means is quite efficient even for large datasets"}, {"key": "D", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters"}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026"}, {"id": "m065", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of K-Means?", "options": [{"key": "A", "text": "Presence of values with high frequency"}, {"key": "B", "text": "Presence of outliers"}, {"key": "C", "text": "All the variables have the same distribution of values"}, {"key": "D", "text": "All the variables have the same range of values"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m066", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Precision?", "options": [{"key": "A", "text": "TP/(TP+FP)"}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)"}, {"key": "C", "text": "TN/(TN+FP)"}, {"key": "D", "text": "TP/(TP+FN)"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m067", "topic": "Preprocessing & dati", "text": "Which of the following is not an objective of feature selection?", "options": [{"key": "A", "text": "Select the features with higher range, which have more influence on the computation"}, {"key": "B", "text": "Reduce time and memory complexity of the mining algorithms"}, {"key": "C", "text": "Reduce the effect of noise"}, {"key": "D", "text": "Avoid the curse of dimensionality"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m068", "topic": "Association Rules", "text": "Which formula computes the Lift of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m069", "topic": "Clustering", "text": "What measure is maximised by the Expectation Masimisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood the distributions, defined by the parameters found, given the data available"}, {"key": "B", "text": "The likelihood of an example"}, {"key": "C", "text": "The support of a class"}, {"key": "D", "text": "The likelihood of an attribute, given the class label"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m070", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the operations below performs aggregation?", "options": [{"key": "A", "text": "Combination of two attributes in order to obtain a more general attribute with smaller variability"}, {"key": "B", "text": "Reduction of the number of distinct values of an attribute in order to reduce its variability"}, {"key": "C", "text": "Reduction of the number of rows of the dataset by applying a grouping on one or more attributes and computing the measures as the results of aggregation functions"}, {"key": "D", "text": "Combination of two or more datasets in order to obtain more Information"}], "correct": ["B", "C"], "note": "", "source": "banco 2026"}, {"id": "m071", "topic": "BI & DWH", "text": "What is Data Ingestion?", "options": [{"key": "A", "text": "A process that copies data from sources to a repository, taking care of possible differences in speed between the generation and the storing process"}, {"key": "B", "text": "A process that copies data from sources to a repository, ensuring high data quality"}, {"key": "C", "text": "A process that copies data from sources to a repository, making the transformation required by the users"}, {"key": "D", "text": "A process that copies data from sources to a Data Warehouse guaranteeing the correctness of data with respect to the schema"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m072", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when a categorical attribute has a too large number of distinct values?", "options": [{"key": "A", "text": "Rescaling"}, {"key": "B", "text": "Non linear transformations"}, {"key": "C", "text": "Aggregation"}, {"key": "D", "text": "OneHot Encoding"}], "correct": ["C"], "note": "", "source": "banco 2026"}, {"id": "m073", "topic": "Clustering", "text": "Which of the statements below about Hierarchical Agglomerative Clustering is true?", "options": [{"key": "A", "text": "Requires the definition of Inertia of clusters"}, {"key": "B", "text": "Requires the definition of distance between sets of objects"}, {"key": "C", "text": "Is very efficient also with large datasets"}, {"key": "D", "text": "Is based on a well founded statistical model"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m074", "topic": "Classificazione & ML", "text": "Which of the following preprocessing activities is useful to build a Naive Bayes classifier if the independence hypothesis is violated?", "options": [{"key": "A", "text": "Discretisation"}, {"key": "B", "text": "Normalisation"}, {"key": "C", "text": "Standardisation"}, {"key": "D", "text": "Feature selection"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m075", "topic": "Classificazione & ML", "text": "In a decision tree, an attribute which is used only in nodes near the leaves...", "options": [{"key": "A", "text": "... is irrelevant with respect to the target"}, {"key": "B", "text": "guarantees high increment of purity"}, {"key": "C", "text": "... gives little insight with respect to the target"}, {"key": "D", "text": "... has a high correlation with respect to the target"}], "correct": ["C"], "note": "", "source": "banco 2026"}, {"id": "m076", "topic": "Preprocessing & dati", "text": "Which of the following is not a property of a metric distance function?", "options": [{"key": "A", "text": "Symmetry"}, {"key": "B", "text": "Positive definiteness"}, {"key": "C", "text": "Triangle inequality"}, {"key": "D", "text": "Boundedness"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m077", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Boolean data?", "options": [{"key": "A", "text": "Euclidean distance"}, {"key": "B", "text": "Cosine distance"}, {"key": "C", "text": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m078", "topic": "Regressione", "text": "How can we measure the quality of a trained regression model?", "options": [{"key": "A", "text": "With a formula elaborating the difference between the forecast values and the true ones"}, {"key": "B", "text": "With a confusion matrix"}, {"key": "C", "text": "Counting the number of values correctly forecast"}, {"key": "D", "text": "With precision, recall and accuracy"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m079", "topic": "Association Rules", "text": "Which of the following statements regarding the discovery of association rules is true?", "options": [{"key": "A", "text": "The confidence of a rule can be computed starting from the supports of the itemsets"}, {"key": "B", "text": "The support of an itemset is anti-monotonic with respect to the composition of the itemset"}, {"key": "C", "text": "The support of a rule can be computed given the confidence of the rule"}, {"key": "D", "text": "The confidence of an itemset is anti-monotonic with respect to the composition of the itemset"}], "correct": ["A", "B"], "note": "", "source": "banco 2026"}, {"id": "m080", "topic": "Clustering", "text": "Which of the statements below is true regarding DBSCAN?", "options": [{"key": "A", "text": "Increasing the radius of the neighbourhood can decrease the number of noise points"}, {"key": "B", "text": "DBSCAN always stops to a configuration which gives the optimal number of clusters"}, {"key": "C", "text": "Sometimes DBSCAN stops to a configuration which does not include any cluster"}, {"key": "D", "text": "DBscan can give good performance when clusters have concavities"}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026"}, {"id": "m081", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Drill-Down\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy"}, {"key": "B", "text": "Creates a link between concepts in interrelated cubes, to compare them"}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}, {"key": "D", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy"}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m082", "topic": "Clustering", "text": "What is the purpose of updating the similarity matrix in agglomerative clustering?", "options": [{"key": "A", "text": "To calculate the pairwise similarity or distance between all clusters"}, {"key": "B", "text": "To reflect the changes after merging clusters"}, {"key": "C", "text": "To assign each data point to a cluster based on the final structure obtained from the dendrogram"}, {"key": "D", "text": "To determine the distance or similarity between clusters"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m083", "topic": "Classificazione & ML", "text": "The Information Gain is used to...", "options": [{"key": "A", "text": "Select the attribute which maximises, for a given training set, the ability to predict the class value"}, {"key": "B", "text": "Select the attribute which maximises, for a given test set, the ability to predict the class value"}, {"key": "C", "text": "Select the attribute which maximises, for a given training set, the ability to predict all the other attribute values"}, {"key": "D", "text": "Select the class with maximum probability"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m084", "topic": "Classificazione & ML", "text": "In which mining activity can the Information Gain be useful?", "options": [{"key": "A", "text": "Discovery of association rules"}, {"key": "B", "text": "Classification"}, {"key": "C", "text": "Clustering"}, {"key": "D", "text": "Discretization"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m085", "topic": "Preprocessing & dati", "text": "Given the two binary vectors below, which is their similarity according to the Jaccard Coefficient? 1000101101 1011101010", "options": [{"key": "A", "text": "0.1"}, {"key": "B", "text": "0.2"}, {"key": "C", "text": "0.5"}, {"key": "D", "text": "0.375"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m086", "topic": "Clustering", "text": "What is the single linkage?", "options": [{"key": "A", "text": "A method to compute the distance between two objects, it can be used in hierarchical clustering"}, {"key": "B", "text": "A method to compute the distance between two sets of items, it can be used in hierarchical clustering"}, {"key": "C", "text": "A method to compute the distance between two classes, it can be used in decision trees"}, {"key": "D", "text": "A method to compute the separation of the objects inside a cluster"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m087", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Expectation Maximisation"}, {"key": "B", "text": "Apriori"}, {"key": "C", "text": "K-means"}, {"key": "D", "text": "Decision Tree"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m088", "topic": "Clustering", "text": "Which of the following is a strength of the clustering algorithm DBSCAN?", "options": [{"key": "A", "text": "Requires to set the number of clusters as a parameter"}, {"key": "B", "text": "Ability to find cluster with concavities"}, {"key": "C", "text": "Ability to separate outliers from regular data"}, {"key": "D", "text": "Very fast by computation"}], "correct": ["B", "C"], "note": "", "source": "banco 2026"}, {"id": "m089", "topic": "Classificazione & ML", "text": "Which of the following measure can be used as an alternative to the Information Gain?", "options": [{"key": "A", "text": "Sihlouette Index"}, {"key": "B", "text": "Gini Index"}, {"key": "C", "text": "Rand Index"}, {"key": "D", "text": "Jaccard Index"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m090", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Accuracy?", "options": [{"key": "A", "text": "TN/(TN+FP)"}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)"}, {"key": "C", "text": "TP/(TP+FN)"}, {"key": "D", "text": "TP/(TP+FP)"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m091", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of DBSCAN?", "options": [{"key": "A", "text": "Clusters have concavities"}, {"key": "B", "text": "All the variables are the same range of values"}, {"key": "C", "text": "Presence of outliers"}, {"key": "D", "text": "Presence of clusters with different densities"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m092", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the support of the rule A,C -> B?", "options": [{"key": "A", "text": "100%"}, {"key": "B", "text": "20%"}, {"key": "C", "text": "40%"}, {"key": "D", "text": "50%"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m093", "topic": "BI & DWH", "text": "Associate the various Data Warehouse Architectures to the respective advantages: 1. Single Layer 2. Two Layers 3. Three Layers a. The workloads for analysis and daily operations are separated b. An intermediate level of consolidated data is available c. The occupation of space is minimised", "options": [{"key": "A", "text": "1-a, 2-b, 3-c"}, {"key": "B", "text": "1-c, 2-a, 3-b"}, {"key": "C", "text": "1-b, 2-c, 3-a"}, {"key": "D", "text": "1-c, 2-b, 3-a"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m094", "topic": "Classificazione & ML", "text": "In a Neural Network, what is the backpropagation?", "options": [{"key": "A", "text": "The technique used to adjust the node weights according to the difference between the desired output and the output generated"}, {"key": "B", "text": "The technique used to adjust the weights limiting the probability of overfitting"}, {"key": "C", "text": "The technique used to adjust the output according to the difference between the desired weights and the actual weights"}, {"key": "D", "text": "The technique used to adjust the connection weights according to the difference between the desired output and the output generated by the network"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m095", "topic": "Preprocessing & dati", "text": "In feature selection, what is the Principal Component Analysis (PCA)?", "options": [{"key": "A", "text": "A mathematical technique used to transform non numeric attributes into numeric attributes"}, {"key": "B", "text": "A mathematical technique used to transform a set of numeric attributes into a smaller set of numeric attributes which capture most of the variability in data"}, {"key": "C", "text": "A heuristic technique used to find a subset of the attributes which produces the same classifier"}, {"key": "D", "text": "A mathematical technique used to find the principal attributes which determine the classification process"}], "correct": ["B"], "note": "", "source": "banco 2026"}, {"id": "m096", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Dbscan"}, {"key": "B", "text": "SVM"}, {"key": "C", "text": "Neural Network"}, {"key": "D", "text": "Decision Tree"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m097", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the purpose of the \"Schema on read\" strategy?", "options": [{"key": "A", "text": "Avoid preprocessing of data before writing"}, {"key": "B", "text": "Optimisation for various types of queries"}, {"key": "C", "text": "Possibility to extract data in various shapes"}, {"key": "D", "text": "Flexibility for any kind of query"}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026"}, {"id": "m098", "topic": "Clustering", "text": "What measure is maximised by the Expectation Maximisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood of a class label, given the attributes of the example"}, {"key": "B", "text": "The likelihood of an attribute, given the class lab"}, {"key": "C", "text": "The likelihood of an example"}, {"key": "D", "text": "The support of a class"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m099", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following is not an objective of the aggregation of attributes?", "options": [{"key": "A", "text": "Reduce the variability of data"}, {"key": "B", "text": "Obtain a less detailed scale"}, {"key": "C", "text": "Reduce the number of attributes or objects"}, {"key": "D", "text": "Obtain a more detailed description of data"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m100", "topic": "BI & DWH", "text": "Which of the activities below is part of \"Business Understanding\" in the CRISP methodology?", "options": [{"key": "A", "text": "Which data are available?"}, {"key": "B", "text": "Which machine learning functions are necessary for my problem?"}, {"key": "C", "text": "Which data must be collected with a specific campaign?"}, {"key": "D", "text": "Which are the resources available (manpower, hardware, software, ...)"}], "correct": ["D"], "note": "", "source": "banco 2026"}, {"id": "m101", "topic": "Preprocessing & dati", "text": "Which of the following situations could suggest the use of MinMax scaling?", "options": [{"key": "A", "text": "There are numeric attributes with very diverse value ranges"}, {"key": "B", "text": "There are attributes with very skewed data distributions"}, {"key": "C", "text": "There are attributes with a very large number of missing values"}, {"key": "D", "text": "There is a numeric attribute with values spread in a very large range"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m102", "topic": "BI & DWH", "text": "Which of the following sentences describes an advantage of a Data Warehouse with respect to a standard DBMS?", "options": [{"key": "A", "text": "Allows efficient execution of key-based queries"}, {"key": "B", "text": "Manages efficiently data updates"}, {"key": "C", "text": "Has tools for helping to solve inconsistencies"}, {"key": "D", "text": "Allows analysis along the time dimension"}, {"key": "E", "text": "Allows efficient execution of multi-dimensional queries"}], "correct": ["C", "D", "E"], "note": "", "source": "banco 2026"}, {"id": "m103", "topic": "Classificazione & ML", "text": "In a Decision Tree for classification, what is a leaf node?", "options": [{"key": "A", "text": "A node which assigns a class value to the objects passing the tests on the path from the root to the node itself"}, {"key": "B", "text": "A node where all the objects belong to the same class"}, {"key": "C", "text": "A node which allows classification without errors"}, {"key": "D", "text": "A node which assigns a class value only by majority of examples"}], "correct": ["A"], "note": "", "source": "banco 2026"}, {"id": "m104", "topic": "Preprocessing & dati", "text": "Which is the purpose of discretisation?", "options": [{"key": "A", "text": "Increase the number of distinct values in an attribute"}, {"key": "B", "text": "Reduce the number of distinct values in an attribute, in order to increase the efficiency"}, {"key": "C", "text": "Reduce the number of distinct values in an attribute, in order to put in evidence possible patterns and regularities"}, {"key": "D", "text": "Reduce the range of values of a numeric attribute"}], "correct": ["C"], "note": "", "source": "banco 2026"}, {"id": "m105", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Roll-Up\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy"}, {"key": "B", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint"}, {"key": "C", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value"}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them"}, {"key": "E", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy"}], "correct": ["E"], "note": "", "source": "banco 2026"}, {"id": "m106", "topic": "Classificazione & ML", "text": "What is the Gini index?", "options": [{"key": "A", "text": "A measure of the entropy of a dataset"}, {"key": "B", "text": "An accuracy measure of a dataset alternative to the Information Gain"}, {"key": "C", "text": "An impurity measure of a dataset alternative to the Information Gain and to the Misclassification Index"}, {"key": "D", "text": "An impurity measure of a dataset alternative to overfitting and underfitting"}], "correct": ["C"], "note": "", "source": "banco 2026"}, {"id": "m107", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following are the objectives of the aggregation of attributes?", "options": [{"key": "A", "text": "Obtain a more detailed description of data"}, {"key": "B", "text": "Obtain a less detailed scale"}, {"key": "C", "text": "Reduce the variability of data"}, {"key": "D", "text": "Reduce the number of attributes or distinct values"}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026"}, {"id": "a001", "topic": "Classificazione & ML", "text": "Given the following definitions: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Which of the formulas below computes the precision of a binary classifier?", "options": [{"key": "A", "text": "TP / (TP + FP)"}, {"key": "B", "text": "(TP + TN) / (TP + FP + TN + FN)"}, {"key": "C", "text": "TN / (TN + FP)"}, {"key": "D", "text": "TP / (TP + FN)"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a002", "topic": "Preprocessing & dati", "text": "Which of the statements below is true?", "options": [{"key": "A", "text": "Sometimes k-means stops to a configuration which does not give the minimum distor ource": "app"}, {"id": "a019", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Extraction step?", "options": [{"key": "A", "text": "Usage of dictionaries to solve inconsistencies"}, {"key": "B", "text": "Elimination of duplicates"}, {"key": "C", "text": "None of the others"}, {"key": "D", "text": "Association of a timestamp to the operational data"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a020", "topic": "BI & DWH", "text": "Talking about the general idea of database, which of the following is a purpose of \"Schema on write\" strategy?", "options": [{"key": "A", "text": "Optimization for specific types of queries"}, {"key": "B", "text": "Flexibility and efficiency for any kind of query"}, {"key": "C", "text": "Avoid preprocessing of data before writing"}, {"key": "D", "text": "None of the others"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a021", "topic": "BI & DWH", "text": "Talking about the general idea of database, which of the following is a purpose of \"Schema on write\" strategy?", "options": [{"key": "A", "text": "Flexibility and efficiency for any kind of query"}, {"key": "B", "text": "Clean design of the data structure"}, {"key": "C", "text": "Avoid preprocessing of data before writing"}, {"key": "D", "text": "None of the others"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a022", "topic": "BI & DWH", "text": "Which of the following sentences does NOT describe an advantage of a Data Warehouse with respect to a standard DBMS?", "options": [{"key": "A", "text": "Allows analysis along the time dimension"}, {"key": "B", "text": "Manages efficiently data updates"}, {"key": "C", "text": "Allows efficient execution of multi-dimensional queries"}, {"key": "D", "text": "Has tools for helping to solve inconsistencies"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a023", "topic": "BI & DWH", "text": "Which one of the following sentences does NOT describe a characteristic of a Data Warehouse?", "options": [{"key": "A", "text": "Non volatile"}, {"key": "B", "text": "Includes the time dimension"}, {"key": "C", "text": "Constantly updated as soon as the base data are updated"}, {"key": "D", "text": "Solves the inconsistencies"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a024", "topic": "BI & DWH", "text": "Which one of the following sentences does NOT describe a characteristic of a Data Warehouse?", "options": [{"key": "A", "text": "Non volatile"}, {"key": "B", "text": "Includes the time dimension"}, {"key": "C", "text": "Solves the inconsistencies"}, {"key": "D", "text": "Includes all the base data in their native format"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a025", "topic": "BI & DWH", "text": "Which of the following are NOT typical data warehouse queries?", "options": [{"key": "A", "text": "What is the total revenue of yesterday in shop \"BO03\"?"}, {"key": "B", "text": "Which products maximize the profit?"}, {"key": "C", "text": "What is the relationship between profits gained by products \"WWW\" and \"ZZZ\"?"}, {"key": "D", "text": "What is the total revenue per product category and state?"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a026", "topic": "Preprocessing & dati", "text": "Which is different from others:", "options": [{"key": "A", "text": "Expectation Maximisation"}, {"key": "B", "text": "Apriori"}, {"key": "C", "text": "K-means"}, {"key": "D", "text": "Decision Tree"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a027", "topic": "Preprocessing & dati", "text": "Which of the following statements is true?", "options": [{"key": "A", "text": "The noise always generates outliers"}, {"key": "B", "text": "The data which are similar to the majority are never noise"}, {"key": "C", "text": "The noise can generate outliers"}, {"key": "D", "text": "The noise never generates outliers"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a028", "topic": "Preprocessing & dati", "text": "In data preparation which is the effect of normalisation?", "options": [{"key": "A", "text": "Map all the numeric attributes to the same range, without altering the distribution, in order to avoid that attributes with large ranges have more influence"}, {"key": "B", "text": "Map all the numeric attributes subtracting the respective mean and dividing by variance"}, {"key": "C", "text": "Map all the numeric attributes to the same range and to have a Gaussian (or normal) distribution, in order to avoid that attributes with large ranges have more influence"}, {"key": "D", "text": "Map all the numeric attributes in order to have a Gaussian (or normal) distruibution, in order to avoid that attributes with large ranges have more influence"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a030", "topic": "Preprocessing & dati", "text": "Which is the main reason for the standardization of numeric attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions"}, {"key": "B", "text": "Map all the numeric attributes to a new range such that the mean is zero and the variance is one"}, {"key": "C", "text": "Mapp all the nominal attributes to the same range, in order to prevent the values with higher frequency from having prevailing influence"}, {"key": "D", "text": "Remove non-standard values"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a031", "topic": "Clustering", "text": "After fitting DBSCAN with the default parameter values the results are: 0 clusters, 100% of noise points. Which will be your next trial?", "options": [{"key": "A", "text": "Reduce the minimum number of objects in the neighborhood or increase the radius of the neighborhood"}, {"key": "B", "text": "Reduce the minimum number of objects in the neighborhood and the radius of the neighborhood"}, {"key": "C", "text": "Decrease the radius of the neighborhood"}, {"key": "D", "text": "None of the others"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a032", "topic": "Association Rules", "text": "Which of the statements below best describes the strategy of Apriori in finding the frequent itemsets?", "options": [{"key": "A", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are considered only at the end of the execution"}, {"key": "B", "text": "Evaluation of the confidence of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible"}, {"key": "C", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible"}, {"key": "D", "text": "Evaluation of the support of the itemsets in an order such that the interesting parts of the search space are pruned as soon as possible"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a033", "topic": "Classificazione & ML", "text": "What is the Gini Index?", "options": [{"key": "A", "text": "A measure of the Entropy of a dataset"}, {"key": "B", "text": "An accuracy measure of a dataset alternative to the Information Gain and to the Misclassification Index"}, {"key": "C", "text": "An impurity measure of a dataset alternative to the Information Gain and to the Misclassification Index"}, {"key": "D", "text": "An impurity measure of a dataset alternative to Overfitting a ": "B", "text": "Elimination of duplicates"}, {"key": "C", "text": "Snapshot of the operational data"}, {"key": "D", "text": "None of the others"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a046", "topic": "BI & DWH", "text": "Which of the following sentences does NOT describe an advantage of a Data Warehouse with respect to a standard DBMS?", "options": [{"key": "A", "text": "Allows analysis along the time dimension"}, {"key": "B", "text": "Allows efficient execution of multi-dimensional queries"}, {"key": "C", "text": "Allows efficient execution of key-based queries"}, {"key": "D", "text": "Has tools for helping to solve inconsistencies"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a047", "topic": "BI & DWH", "text": "What is the ranking for the following technologies, based on the increasing level of abstraction?  Technologies:  - OLAP analysis on Data Mart  - Data Mining on operational databases;  - SQL queries on operational databases;  Order: from left (it generates the most specific information) to right (it has a higher level of knowledge).", "options": [{"key": "A", "text": "Data Mining, OLAP analysis, SQL queries"}, {"key": "B", "text": "OLAP analysis, Data Mining, SQL queries"}, {"key": "C", "text": "SQL queries, OLAP analysis, Data Mining"}, {"key": "D", "text": "OLAP analysis, SQL queries, Data Mining"}, {"key": "E", "text": "SQL queries, Data Mining, OLAP analysis"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app"}, {"id": "a048", "topic": "BI & DWH", "text": "Which of the following are NOT typical data warehouse queries?", "options": [{"key": "A", "text": "What is the total revenue per product category and state?"}, {"key": "B", "text": "Which products maximize the profit?"}, {"key": "C", "text": "Which is the stock of product \"XXX\" in the \"YYY\" warehouse?"}, {"key": "D", "text": "What is the rel <script>
/* Leitner "cram mode" spaced-repetition engine — 3-day horizon.
   State per question id in localStorage: {box, due, seen, lapses, last}.
   Grades: again -> box 0, due now (requeued after other dues)
           hard  -> same box, due +10 min
           good  -> box +1, due +4h (box1) / +1d (box2+)
           easy  -> box +2, due +1d
   SR.next(topic) priority: due reviews (oldest due first) -> fresh (bank order) -> null. */
(function () {
  "use strict";
  var KEY = "dmquiz_sr_v1";
  var MIN = 60 * 1000, HOUR = 60 * MIN, DAY = 24 * HOUR;

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
    catch (e) { return {}; }
  }
  function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }
  function today() { return new Date().toDateString(); }

  var state = load();
  if (!state._meta) state._meta = { day: today(), done: 0 };
  if (state._meta.day !== today()) state._meta = { day: today(), done: 0 };

  function cards(topic) {
    return window.BANK.filter(function (q) {
      return !topic || topic === "All" || q.topic === topic;
    });
  }

  var SR = {
    next: function (topic) {
      var now = Date.now();
      var due = [], fresh = [];
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (!c) fresh.push(q);
        else if (c.due <= now) due.push({ q: q, due: c.due });
      });
      if (due.length) {
        due.sort(function (a, b) { return a.due - b.due; });
        return due[0].q.id;
      }
      if (fresh.length) return fresh[0].id;
      return null;
    },
    grade: function (id, grade) {
      var now = Date.now();
      var c = state[id] || { box: 0, seen: 0, lapses: 0 };
      c.seen += 1; c.last = now;
      if (grade === "again") { c.box = 0; c.lapses += 1; c.due = now; }
      else if (grade === "hard") { c.due = now + 10 * MIN; }
      else if (grade === "good") {
        c.box += 1;
        c.due = now + (c.box <= 1 ? 4 * HOUR : DAY);
      } else { // easy
        c.box += 2; c.due = now + DAY;
      }
      state[id] = c;
      state._meta.done += 1;
      save(state);
    },
    stats: function (topic) {
      var now = Date.now();
      var due = 0, fresh = 0;
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (!c) fresh += 1;
        else if (c.due <= now) due += 1;
      });
      return { due: due, fresh: fresh, done: state._meta.done,
               total: cards(topic).length };
    },
    randomTen: function (topic) {
      var pool = cards(topic).map(function (q) { return q.id; });
      for (var i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
      }
      return pool.slice(0, 10);
    },
    _reset: function () { state = { _meta: { day: today(), done: 0 } }; save(state); }
  };
  window.SR = SR;
})();

</script>
<script>
(function () {
  "use strict";

  var app = null;
  var currentQuestion = null;
  var currentOrder = [];
  var selected = {};
  var answered = false;
  var fallbackQueue = [];

  var UI = {
    topicFilter: "All",
    start: start
  };

  window.UI = UI;

  function start() {
    app = document.getElementById("app");
    if (!app) {
      return;
    }
    renderHome();
  }

  function clear(el) {
    while (el.firstChild) {
      el.removeChild(el.firstChild);
    }
  }

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) {
      node.className = className;
    }
    if (text !== undefined && text !== null) {
      node.textContent = String(text);
    }
    return node;
  }

  function button(text, className, onClick) {
    var btn = el("button", className || "btn", text);
    btn.type = "button";
    btn.addEventListener("click", onClick);
    return btn;
  }

  function getStats() {
    if (!window.SR || typeof window.SR.stats !== "function") {
      return { due: 0, fresh: 0, done: 0, total: 0 };
    }
    return window.SR.stats();
  }

  function topics() {
    var seen = {};
    var list = [];
    (window.BANK || []).forEach(function (q) {
      if (q && q.topic && !seen[q.topic]) {
        seen[q.topic] = true;
        list.push(q.topic);
      }
    });
    list.sort();
    return list;
  }

  function renderShell(content) {
    clear(app);
    app.appendChild(renderHeader());
    app.appendChild(content);
  }

  function renderHeader() {
    var header = el("div", "header");

    header.appendChild(button("🏠", "btn", function () {
      fallbackQueue = [];
      renderHome();
    }));

    var stats = getStats();
    header.appendChild(el("div", "stats", "Da ripassare: " + stats.due + " · Nuove: " + stats.fresh));

    var select = document.createElement("select");
    select.className = "btn";
    select.setAttribute("aria-label", "Filtro argomento");

    var all = document.createElement("option");
    all.value = "All";
    all.textContent = "Tutti";
    select.appendChild(all);

    topics().forEach(function (topic) {
      var option = document.createElement("option");
      option.value = topic;
      option.textContent = topic;
      select.appendChild(option);
    });

    select.value = UI.topicFilter || "All";
    select.addEventListener("change", function () {
      UI.topicFilter = select.value;
      fallbackQueue = [];
      renderHome();
    });

    header.appendChild(select);
    return header;
  }

  function renderHome() {
    currentQuestion = null;
    answered = false;
    selected = {};

    var wrap = el("div", "home");
    wrap.appendChild(el("h1", "", "DM Quiz"));

    var stats = getStats();
    wrap.appendChild(
      el(
        "div",
        "stats",
        "Da ripassare: " + stats.due + " · Nuove: " + stats.fresh + " · Fatte oggi: " + stats.done
      )
    );

    wrap.appendChild(button("Studia", "btn btn-primary", function () {
      showNext();
    }));

    renderShell(wrap);
  }

  function showEmpty() {
    var wrap = el("div", "home");
    wrap.appendChild(el("h1", "", "🎉 Niente da ripassare ora"));
    wrap.appendChild(button("Ripassa comunque 10 a caso", "btn btn-primary", function () {
      fallbackQueue = randomQuestions(10);
      showNext();
    }));
    renderShell(wrap);
  }

  function showNext() {
    var id = null;

    if (fallbackQueue.length) {
      id = fallbackQueue.shift();
    } else if (window.SR && typeof window.SR.next === "function") {
      id = window.SR.next(UI.topicFilter === "All" ? null : UI.topicFilter);
    }

    if (id === null || id === undefined) {
      showEmpty();
      return;
    }

    var q = findQuestion(id);
    if (!q) {
      renderHome();
      return;
    }

    renderQuestion(q);
  }

  function findQuestion(id) {
    var bank = window.BANK || [];
    for (var i = 0; i < bank.length; i += 1) {
      if (bank[i] && bank[i].id === id) {
        return bank[i];
      }
    }
    return null;
  }

  function randomQuestions(limit) {
    var bank = (window.BANK || []).filter(function (q) {
      return q && (UI.topicFilter === "All" || q.topic === UI.topicFilter);
    });

    var ids = shuffle(bank.slice()).slice(0, limit).map(function (q) {
      return q.id;
    });

    return ids;
  }

  function shuffle(items) {
    for (var i = items.length - 1; i > 0; i -= 1) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = items[i];
      items[i] = items[j];
      items[j] = tmp;
    }
    return items;
  }

  function renderQuestion(q) {
    currentQuestion = q;
    currentOrder = shuffle((q.options || []).slice());
    selected = {};
    answered = false;

    var wrap = el("div", "question");

    wrap.appendChild(el("div", "topic", q.topic || ""));
    wrap.appendChild(el("div", "qtext", q.text || ""));

    var isMulti = (q.correct || []).length > 1;
    if (isMulti) {
      wrap.appendChild(el("div", "note", "Seleziona TUTTE le risposte corrette"));
    }

    var optionsWrap = el("div", "options");
    currentOrder.forEach(function (opt, index) {
      optionsWrap.appendChild(renderOptionButton(q, opt, index, isMulti));
    });
    wrap.appendChild(optionsWrap);

    if (isMulti) {
      wrap.appendChild(button("Conferma", "btn btn-primary", function () {
        if (!answered) {
          submitAnswer(q);
        }
      }));
    }

    renderShell(wrap);
  }

  function renderOptionButton(q, opt, index, isMulti) {
    var letter = String.fromCharCode(65 + index);
    var btn = button(letter + ". " + (opt.text || ""), "option", function () {
      if (answered) {
        return;
      }

      if (isMulti) {
        selected[opt.key] = !selected[opt.key];
        btn.className = selected[opt.key] ? "option selected" : "option";
      } else {
        selected = {};
        selected[opt.key] = true;
        submitAnswer(q);
      }
    });

    return btn;
  }

  function submitAnswer(q) {
    answered = true;

    var correctMap = {};
    (q.correct || []).forEach(function (key) {
      correctMap[key] = true;
    });

    var selectedKeys = Object.keys(selected).filter(function (key) {
      return selected[key];
    });

    var ok =
      selectedKeys.length === (q.correct || []).length &&
      selectedKeys.every(function (key) {
        return correctMap[key];
      });

    renderAnswered(q, ok);
  }

  function renderAnswered(q, ok) {
    var wrap = el("div", "question");

    wrap.appendChild(el("div", "topic", q.topic || ""));
    wrap.appendChild(el("div", "qtext", q.text || ""));

    var correctMap = {};
    (q.correct || []).forEach(function (key) {
      correctMap[key] = true;
    });

    var optionsWrap = el("div", "options");
    currentOrder.forEach(function (opt, index) {
      var letter = String.fromCharCode(65 + index);
      var className = "option";

      if (correctMap[opt.key]) {
        className += " correct";
      } else if (selected[opt.key]) {
        className += " wrong";
      }

      var optBtn = el("button", className, letter + ". " + (opt.text || ""));
      optBtn.type = "button";
      optBtn.disabled = true;
      optionsWrap.appendChild(optBtn);
    });

    wrap.appendChild(optionsWrap);
    wrap.appendChild(el("div", "verdict", ok ? "✅ Esatto!" : "❌ Riguardala"));

    if (q.note) {
      wrap.appendChild(el("div", "note", q.note));
    }

    var grades = el("div", "grade-row");
    grades.appendChild(gradeButton(q.id, "Di nuovo", "again"));
    grades.appendChild(gradeButton(q.id, "Difficile", "hard"));
    grades.appendChild(gradeButton(q.id, "Bene", "good"));
    grades.appendChild(gradeButton(q.id, "Facile", "easy"));
    wrap.appendChild(grades);

    renderShell(wrap);
  }

  function gradeButton(id, label, grade) {
    return button(label, "btn", function () {
      if (window.SR && typeof window.SR.grade === "function") {
        window.SR.grade(id, grade);
      }
      showNextAfterGrade();
    });
  }

  function showNextAfterGrade() {
    var id = null;

    if (fallbackQueue.length) {
      id = fallbackQueue.shift();
    } else if (window.SR && typeof window.SR.next === "function") {
      id = window.SR.next(UI.topicFilter === "All" ? null : UI.topicFilter);
    }

    if (id === null || id === undefined) {
      renderHome();
      return;
    }

    var q = findQuestion(id);
    if (!q) {
      renderHome();
      return;
    }

    renderQuestion(q);
  }
})();
</script>
<script>
document.addEventListener("DOMContentLoaded", function () { window.UI.start(); });
</script>
</body>
