  function cards(topic) {
    return window.BANK.filter(function (q) {
      return !topic || topic === "All" || q.topic === topic;
    });
  }

  function fmt(ms) {
    if (ms < MIN) return "subito";
    if (ms < HOUR) return Math.round(ms / MIN) + " min";
    if (ms < DAY) return Math.round(ms / HOUR) + " ore";
    var d = Math.round(ms / DAY);
    return d === 1 ? "1 giorno" : d + " giorni";
  }

  function examTs() {
    var t = Date.parse(settings.examDate);
    return isNaN(t) ? Date.now() + 3 * DAY : t;
  }

  // exam-aware compression: with plenty of time factor=1; near the exam the
  // intervals shrink so cards keep cycling (floor 0.2 = never below 20%).
  function compression() {
    var left = examTs() - Date.now();
    if (left <= 0) return 1;                       // exam passed: normal SR
    return Math.max(0.2, Math.min(1, left / (3 * DAY)));
  }

  function intervalFor(grade, box) {
    var base;
    if (grade === "again") return 0;
    else if (grade === "hard") base = settings.hardMin * MIN;
    else if (grade === "good") base = (box + 1) <= 1 ? settings.goodFirstH * HOUR
                                                     : settings.goodNextD * DAY;
    else base = settings.easyD * DAY;              // easy
    var iv = base * compression();
    // never schedule past 2h before the exam (so it can still come back)
    var cap = examTs() - 2 * HOUR - Date.now();
    if (cap > MIN) iv = Math.min(iv, cap);
    return Math.max(MIN, iv);
  }

  function applyGrade(id, grade) {
    var now = Date.now();
    var c = state[id] || { box: 0, seen: 0, lapses: 0 };
    c.seen += 1; c.last = now;
    if (grade === "again") { c.box = 0; c.lapses += 1; c.due = now; }
    else {
      c.due = now + intervalFor(grade, c.box);
      if (grade === "good") c.box += 1;
      else if (grade === "easy") c.box += 2;
    }
    state[id] = c;
    state._meta.done += 1;
    save(state);
    return fmt(Math.max(0, c.due - now));
  }

  var SR = {
    next: function (topic) {
      var now = Date.now();
      var due = [], fresh = [];
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (!c) fresh.push(q);
        else if (c.due <= now) due.push({ q: q, due: c.due });
      });
      if (due.length) {
        due.sort(function (a, b) { return a.due - b.due; });
        return due[0].q.id;
      }
      if (fresh.length) return fresh[0].id;
      return null;
    },

    /* AUTO-GRADING. signals:
       - wrong (selected != correct, no overlap on single / none right) -> again
       - partial on multi-select (some correct, not all, no wrong picks counts
         as partial too)                                                -> hard
       - correct: response time vs expected reading+deciding time:
           expected = 2.5s + 0.35s per word (question+options), min 6s
           fast  (< 0.7 x expected) -> easy
           slow  (> 1.8 x expected) -> hard  (right but laborious)
           else                     -> good                              */
    answer: function (id, sig) {
      var correct = sig.correctSet, sel = sig.selectedSet;
      var inter = sel.filter(function (k) { return correct.indexOf(k) >= 0; });
      var wrongPicks = sel.filter(function (k) { return correct.indexOf(k) < 0; });
      var exact = inter.length === correct.length && wrongPicks.length === 0;
      var grade, verdict;
      if (exact) {
        var words = (sig.qWords || 20) + (sig.oWords || 30);
        var expected = Math.max(6000, 2500 + 350 * words);
        var ratio = (sig.ms || expected) / expected;
        grade = ratio < 0.7 ? "easy" : (ratio > 1.8 ? "hard" : "good");
        verdict = "ok";
      } else if (inter.length > 0 && correct.length > 1) {
        grade = "hard"; verdict = "partial";
      } else {
        grade = "again"; verdict = "ko";
      }
      var human = applyGrade(id, grade);
      return { grade: grade, human: human, verdict: verdict };
    },

    grade: applyGrade,   // manual path kept for tests/compatibility

    stats: function (topic) {
      var now = Date.now();
      var due = 0, fresh = 0;
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (!c) fresh += 1;
        else if (c.due <= now) due += 1;
      });
      return { due: due, fresh: fresh, done: state._meta.done,
               total: cards(topic).length };
    },
    boxes: function (topic) {
      var b = [0, 0, 0, 0];
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (c) b[Math.min(c.box, 3)] += 1;
      });
      return b;
    },
    seenCount: function (id) {
      var c = state[id];
      return c ? (c.seen || 0) : 0;
    },
    nextSessionHint: function (topic) {
      var now = Date.now();
      var future = [];
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (c && c.due > now) future.push(c.due);
      });
      if (!future.length) return null;
      future.sort(function (a, b) { return a - b; });
      var batch = future.filter(function (d) { return d - future[0] < 30 * MIN; });
      return { inHuman: fmt(future[0] - now), count: batch.length,
               at: new Date(future[0]) };
    },
    examDate: function () { return settings.examDate; },
    setExamDate: function (iso) {
      if (!isNaN(Date.parse(iso))) { settings.examDate = iso; saveSettings(); }
      return settings.examDate;
    },
    settings: function () { return Object.assign({}, settings); },
    setSettings: function (s) {
      ["hardMin", "goodFirstH", "goodNextD", "easyD"].forEach(function (k) {
        var v = parseFloat(s[k]);
        if (!isNaN(v) && v > 0) settings[k] = v;
      });
      if (s.examDate) SR.setExamDate(s.examDate);
      saveSettings();
      return SR.settings();
    },
    resetSettings: function () {
      settings = Object.assign({}, DEFAULTS);
      saveSettings();
      return SR.settings();
    },
    exportState: function () {
      return JSON.stringify({ v: 3, exported: new Date().toISOString(),
                              state: state, settings: settings });
    },
    importState: function (json) {
      var data = JSON.parse(json);
      if (!data || typeof data.state !== "object") throw new Error("backup non valido");
      state = data.state;
      if (!state._meta) state._meta = { day: today(), done: 0 };
      save(state);
      if (data.settings) SR.setSettings(data.settings);
      return true;
    },
    preview: function (id) {
      var box = (state[id] || { box: 0 }).box;
      return { again: "subito", hard: fmt(intervalFor("hard", box)),
               good: fmt(intervalFor("good", box)), easy: fmt(intervalFor("easy", box)) };
    },
    randomTen: function (topic) {
      var pool = cards(topic).map(function (q) { return q.id; });
      for (var i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
      }
      return pool.slice(0, 10);
    },
    _reset: function () {
      state = { _meta: { day: today(), done: 0 } }; save(state);
    }
  };
  window.SR = SR;
})();

</script>
<script>
(function () {
  "use strict";

  var app = document.getElementById("app");
  var BANK = window.BANK || [];
  var SR = window.SR;
  var byId = {};
  var currentTopic = null;
  var view = "home";
  var session = null;
  var current = null;
  var toastTimer = null;
  var keyListenerReady = false;

  BANK.forEach(function (q) {
    byId[q.id] = q;
  });

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined && text !== null) node.textContent = String(text);
    return node;
  }

  function button(className, text, onClick) {
    var b = el("button", className, text);
    b.type = "button";
    if (onClick) b.addEventListener("click", onClick);
    return b;
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function uniqueTopics() {
    var seen = {};
    var topics = [];
    BANK.forEach(function (q) {
      if (q.topic && !seen[q.topic]) {
        seen[q.topic] = true;
        topics.push(q.topic);
      }
    });
    topics.sort(function (a, b) {
      return a.localeCompare(b, "it");
    });
    return topics;
  }

  function shuffle(items) {
    var out = items.slice();
    for (var i = out.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = out[i];
      out[i] = out[j];
      out[j] = tmp;
    }
    return out;
  }

  function sameSet(a, b) {
    if (a.length !== b.length) return false;
    var m = {};
    a.forEach(function (x) {
      m[x] = true;
    });
    return b.every(function (x) {
      return m[x];
    });
  }

  function topicFilter(value) {
    if (arguments.length) {
      currentTopic = value || null;
      renderHome();
    }
    return currentTopic;
  }

  function render() {
    if (view === "home") renderHome();
    else if (view === "settings") renderSettings();
    else if (view === "empty") renderEmpty();
    else renderQuestion();
  }

  function start() {
    installKeyboard();
    renderHome();
  }

  function renderHeader(root) {
    var header = el("div", "header");
    header.appendChild(button("btn-icon", "🏠", function () {
      session = null;
      renderHome();
    }));

    var s = SR.stats(currentTopic);
    header.appendChild(el("div", "hstats", "📥 " + s.due + " · ✨ " + s.fresh));

    header.appendChild(button("btn-icon", "⚙️", function () {
      renderSettings();
    }));
    root.appendChild(header);

    var progress = el("div", "progressbar");
    var inner = el("div");
    var pct = 0;
    if (session) {
      var total = Math.max(1, session.answered + session.remaining());
      pct = Math.min(100, Math.round((session.answered / total) * 100));
    }
    inner.style.width = pct + "%";
    progress.appendChild(inner);
    root.appendChild(progress);
  }

  function renderHome() {
    view = "home";
    session = null;
    clear(app);

    var home = el("div", "home");
    home.appendChild(el("h1", null, "DM Quiz"));
    home.appendChild(el("div", "sub", "Ripetizione spaziata — l'app decide quando rivedrai ogni carta"));

    var stats = SR.stats(currentTopic);
    var line = el("div", "stats");
    line.appendChild(document.createTextNode("Da ripassare: "));
    line.appendChild(el("b", null, stats.due));
    line.appendChild(document.createTextNode(" · Nuove: "));
    line.appendChild(el("b", null, stats.fresh));
    line.appendChild(document.createTextNode(" · Fatte oggi: "));
    line.appendChild(el("b", null, stats.done));
    home.appendChild(line);

    if (stats.due === 0 && stats.fresh === 0) {
      var hintInfo = SR.nextSessionHint(currentTopic);
      if (hintInfo) {
        home.appendChild(el("div", "stats",
          "⏰ Prossima sessione: tra " + hintInfo.inHuman + " (" + hintInfo.count + " carte)"));
      }
    }

    var chart = el("div", "boxchart");
    var boxes = SR.boxes(currentTopic);
    var labels = ["nuove-0", "box 1", "box 2", "box 3+"];
    var classes = ["bar", "bar b1", "bar b2", "bar b3"];
    var max = Math.max.apply(null, boxes.concat([1]));
    boxes.forEach(function (count, i) {
      var wrap = el("div", "barwrap");
      var bar = el("div", classes[i] || "bar");
      var h = count > 0 ? Math.max(4, Math.round((count / max) * 100)) : 4;
      bar.style.height = h + "%";
      bar.title = labels[i] + ": " + count;
      wrap.appendChild(bar);
      wrap.appendChild(el("i", null, labels[i]));
      chart.appendChild(wrap);
    });
    home.appendChild(chart);

    var select = document.createElement("select");
    var all = document.createElement("option");
    all.value = "";
    all.textContent = "Tutti";
    select.appendChild(all);
    uniqueTopics().forEach(function (topic) {
      var opt = document.createElement("option");
      opt.value = topic;
      opt.textContent = topic;
      select.appendChild(opt);
    });
    select.value = currentTopic || "";
    select.addEventListener("change", function () {
      currentTopic = select.value || null;
      renderHome();
    });
    home.appendChild(select);

    home.appendChild(button("btn-primary", "▶ Studia", function () {
      startSession("srs");
    }));
    home.appendChild(button("btn", "Ripassa 10 a caso", function () {
      startSession("random10");
    }));
    home.appendChild(button("btn-secondary", "⚙️ Impostazioni", function () {
      renderSettings();
    }));
    home.appendChild(el("div", "footer", "DM Quiz v3 — auto-grading"));

    app.appendChild(home);
  }

  function startSession(mode) {
    var kind = mode || "srs";
    var startStats = SR.stats(currentTopic);
    var queue = kind === "random10" ? SR.randomTen(currentTopic).slice() : [];
    session = {
      mode: kind,
      queue: queue,
      answered: 0,
      initial: kind === "random10" ? queue.length : startStats.due + startStats.fresh,
      remaining: function () {
        if (this.mode === "random10") return this.queue.length;
        var s = SR.stats(currentTopic);
        return s.due + s.fresh;
      }
    };
    nextQuestion();
  }

  function nextQuestion() {
    var id = null;
    if (session.mode === "random10") id = session.queue.shift() || null;
    else id = SR.next(currentTopic);

    if (!id || !byId[id]) {
      renderEmpty();
      return;
    }

    var q = byId[id];
    current = {
      id: id,
      q: q,
      options: shuffle(q.options || []),
      selected: {},
      submitted: false,
      correct: false,
      result: null,
      startedAt: Date.now()
    };
    renderQuestion();
  }

  function renderQuestion() {
    view = "question";
    clear(app);

    var root = el("div", "quiz");
    renderHeader(root);

    var q = current.q;
    var card = el("div", "qcard");
    card.appendChild(el("div", "topic", q.topic || ""));
    card.appendChild(el("div", "qtext", q.text || ""));

    if ((q.correct || []).length > 1) {
      card.appendChild(el("div", "multinote", "Seleziona TUTTE le risposte corrette"));
    }

    if (q.hint && SR.seenCount && SR.seenCount(current.id) < 2 && !current.submitted) {
      var hb = el("div", "hintbox");
      hb.appendChild(el("b", null, "💡 Ancora "));
      hb.appendChild(el("small", null, "(sparisce dalla 3ª volta) "));
      hb.appendChild(document.createTextNode(q.hint));
      card.appendChild(hb);
    }

    var opts = el("div", "options");
    current.options.forEach(function (opt, index) {
      var ob = button("option", null, function () {
        chooseOption(index);
      });
      ob.setAttribute("data-index", String(index));
      ob.setAttribute("data-key", opt.key);

      if (current.selected[opt.key]) ob.classList.add("selected");
      if (current.submitted) {
        if ((q.correct || []).indexOf(opt.key) !== -1) ob.classList.add("correct");
        if (current.selected[opt.key] && (q.correct || []).indexOf(opt.key) === -1) ob.classList.add("wrong");
      }

      ob.appendChild(el("span", "letter", String.fromCharCode(65 + index)));
      ob.appendChild(el("span", null, opt.text || ""));
      opts.appendChild(ob);
    });
    card.appendChild(opts);

    if (!current.submitted && (q.correct || []).length > 1) {
      card.appendChild(button("btn-primary", "Conferma", submitAnswer));
    }

    if (current.submitted) {
      var res = current.result || { verdict: "ko", grade: "again", human: "subito" };
      var vText = res.verdict === "ok" ? "✅ Esatto!" :
                  res.verdict === "partial" ? "🟡 Quasi: risposta parziale" : "❌ Riguardala";
      var verdict = el("div", "verdict " + (res.verdict === "ok" ? "ok" : "ko"), vText);
      if (res.verdict === "partial") verdict.style.color = "#f59e0b";
      card.appendChild(verdict);

      if (q.note) card.appendChild(el("div", "note", q.note));
      card.appendChild(el("div", "note", res.grade === "again"
        ? "↩ Torna subito in coda"
        : "↻ La rivedrai tra " + res.human));

      card.appendChild(button("btn-primary", "Avanti →", advance));

      var hint = el("div", "kbd-hint");
      hint.appendChild(document.createTextNode("Tasti: "));
      hint.appendChild(el("kbd", null, "1-9"));
      hint.appendChild(document.createTextNode(" opzioni · "));
      hint.appendChild(el("kbd", null, "Invio"));
      hint.appendChild(document.createTextNode(" conferma / avanti"));
      card.appendChild(hint);
    }

    root.appendChild(card);
    app.appendChild(root);
  }

  function chooseOption(index) {
    if (!current || current.submitted) return;
    var opt = current.options[index];
    if (!opt) return;

    if ((current.q.correct || []).length === 1) {
      current.selected = {};
      current.selected[opt.key] = true;
      submitAnswer();
      return;
    }

    if (current.selected[opt.key]) delete current.selected[opt.key];
    else current.selected[opt.key] = true;
    renderQuestion();
  }

  function wordCount(t) { return String(t || "").trim().split(/\s+/).length; }

  function submitAnswer() {
    if (!current || current.submitted) return;
    var selected = Object.keys(current.selected);
    var q = current.q;
    var oWords = current.options.reduce(function (n, o) {
      return n + wordCount(o.text);
    }, 0);
    current.result = SR.answer(current.id, {
      correctSet: (q.correct || []).slice(),
      selectedSet: selected,
      ms: Date.now() - current.startedAt,
      qWords: wordCount(q.text),
      oWords: oWords
    });
    current.correct = current.result.verdict === "ok";
    current.submitted = true;
    renderQuestion();
  }

  function advance() {
    if (!current || !current.submitted) return;
    var res = current.result || { grade: "again" };
    session.answered += 1;

    if (res.grade === "again" && session.mode === "random10") {
      session.queue.push(current.id);
    }

    nextQuestion();
  }

  function renderEmpty() {
    view = "empty";
    clear(app);

    var root = el("div", "quiz");
    renderHeader(root);

    var card = el("div", "qcard");
    card.appendChild(el("h2", null, "🎉 Niente da ripassare ora"));

    var s = SR.stats(currentTopic);
    var info = el("div", "stats");
    info.appendChild(document.createTextNode("Da ripassare: "));
    info.appendChild(el("b", null, s.due));
    info.appendChild(document.createTextNode(" · Nuove: "));
    info.appendChild(el("b", null, s.fresh));
    info.appendChild(document.createTextNode(" · Totale: "));
    info.appendChild(el("b", null, s.total));
    card.appendChild(info);

    card.appendChild(button("btn", "Ripassa 10 a caso", function () {
      startSession("random10");
    }));
    card.appendChild(button("btn", "🏠 Home", function () {
      renderHome();
    }));

    root.appendChild(card);
    app.appendChild(root);
  }

  function renderSettings() {
    view = "settings";
    clear(app);

    var root = el("div", "settings");
    renderHeader(root);
    root.appendChild(el("h2", null, "Impostazioni ripetizione"));

    var values = SR.settings();

    var exRow = el("div", "field");
    var exLabel = el("label");
    exLabel.appendChild(document.createTextNode("Data e ora dell'esame"));
    exLabel.appendChild(el("small", null, "Gli intervalli si comprimono avvicinandosi all'esame"));
    exRow.appendChild(exLabel);
    var exInput = document.createElement("input");
    exInput.type = "datetime-local";
    exInput.value = SR.examDate();
    exInput.addEventListener("change", function () {
      SR.setExamDate(exInput.value);
      toast("Data esame salvata");
    });
    exRow.appendChild(exInput);
    root.appendChild(exRow);

    root.appendChild(el("div", "note", "Intervalli avanzati (di norma non serve toccarli: decide l'app)"));

    [
      ["hardMin", "Difficile (minuti)", "Tempo minimo prima di rivedere una risposta difficile", 1],
      ["goodFirstH", "Bene — primo passaggio (ore)", "Intervallo dopo il primo passaggio corretto", 1],
      ["goodNextD", "Bene — passaggi successivi (giorni)", "Intervallo dopo i passaggi successivi", 1],
      ["easyD", "Facile (giorni)", "Intervallo per una risposta facile", 1]
    ].forEach(function (field) {
      var row = el("div", "field");
      var label = el("label");
      label.appendChild(document.createTextNode(field[1]));
      label.appendChild(el("small", null, field[2]));
      row.appendChild(label);

      var input = document.createElement("input");
      input.type = "number";
      input.min = String(field[3]);
      input.value = values[field[0]];
      input.addEventListener("change", function () {
        var next = SR.settings();
        next[field[0]] = Math.max(field[3], parseInt(input.value, 10) || field[3]);
        SR.setSettings(next);
        renderSettings();
      });
      row.appendChild(input);
      root.appendChild(row);
    });

    root.appendChild(button("btn", "Ripristina default", function () {
      SR.resetSettings();
      toast("Impostazioni ripristinate");
      renderSettings();
    }));

    root.appendChild(button("btn", "📤 Esporta progressi", exportProgress));

    var importInput = document.createElement("input");
    importInput.type = "file";
    importInput.accept = "application/json,.json";
    importInput.style.display = "none";
    importInput.addEventListener("change", function () {
      var file = importInput.files && importInput.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          SR.importState(String(reader.result || ""));
          toast("Importato ✅");
          renderSettings();
        } catch (e) {
          toast("File non valido");
        }
      };
      reader.readAsText(file);
    });
    root.appendChild(importInput);

    root.appendChild(button("btn", "📥 Importa progressi", function () {
      importInput.value = "";
      importInput.click();
    }));

    root.appendChild(button("btn danger", "🗑 Azzera progressi", function () {
      if (window.confirm("Azzera tutti i progressi?")) {
        SR._reset();
        toast("Progressi azzerati");
        renderSettings();
      }
    }));

    app.appendChild(root);
  }

  function exportProgress() {
    var blob = new Blob([SR.exportState()], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "dmquiz-backup.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () {
      URL.revokeObjectURL(url);
    }, 0);
  }

  function toast(msg) {
    var t = document.querySelector(".toast");
    if (!t) {
      t = el("div", "toast");
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      t.classList.remove("show");
    }, 1800);
  }

  function installKeyboard() {
    if (keyListenerReady) return;
    keyListenerReady = true;

    document.addEventListener("keydown", function (e) {
      var tag = e.target && e.target.tagName;
      if (view === "settings") return;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (!current || view !== "question") return;

      if (!current.submitted) {
        if (/^[1-9]$/.test(e.key)) {
          var idx = parseInt(e.key, 10) - 1;
          if (idx < current.options.length) {
            e.preventDefault();
            chooseOption(idx);
          }
        } else if (e.key === "Enter" && (current.q.correct || []).length > 1) {
          e.preventDefault();
          submitAnswer();
        }
      } else {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          advance();
        }
      }
    });
  }

  window.UI = {
    start: start,
    topicFilter: topicFilter
  };

  start();
})();
</script>
<script>
document.addEventListener("DOMContentLoaded", function () { window.UI.start(); });
</script>
</body>
</html>
