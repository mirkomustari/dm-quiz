{"key": "B", "text": "K-means is very sensitive to the initial assignment of the centers", "it": "K-means è molto sensibile all'assegnazione iniziale dei centri", "why": "no: vero: inizializzazione centri influenza molto il risultato"}, {"key": "C", "text": "K-means is quite efficient even for large datasets", "it": "K-means è abbastanza efficiente anche per dataset di grandi dimensioni", "why": "no: vero: K-means è computazionalmente efficiente"}, {"key": "D", "text": "Sometimes K-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters", "it": "A volte K-means si ferma su una configurazione che non dà la distorsione minima per il numero di cluster scelto", "why": "no: vero: può fermarsi senza minimo globale"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «K-mean · always · stops · configuration»", "it_q": "Quale delle seguenti affermazioni è FALSA?", "it_a": "K-mean si ferma sempre in una configurazione che fornisce la distorsione minima per il valore scelto del numero di cluster", "cue": "🔮 Cerca «always», «k-mean»: compare SOLO nella giusta."}, {"id": "a016", "topic": "Classificazione & ML", "text": "Given the following definitions: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Which of the formulas below computes the Recall of a binary classifier?", "options": [{"key": "A", "text": "TP / (TP + FN)", "it": "TP / (TP + FN)", "why": "sì: recall = TP/(TP+FN), positivi reali recuperati"}, {"key": "B", "text": "TN / (TN + FP)", "it": "TN / (TN + FP)", "why": "no: specificità, negativi veri su negativi reali"}, {"key": "C", "text": "TP / (TP + FP)", "it": "TP / (TP + FP)", "why": "no: precision, positivi corretti tra predetti positivi"}, {"key": "D", "text": "(TP + TN) / (TP + FP + TN + FN)", "it": "(TP + TN) / (TP + FP + TN + FN)", "why": "no: accuracy usa corretti su tutti i casi"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le seguenti definizioni: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Quale delle seguenti formule calcola la Recall di un classificatore binario?", "it_a": "TP / (TP + FN)", "cue": "🔮 L'unica che INIZIA con «TP / (TP + FN…»."}, {"id": "a017", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Cleansing step?", "options": [{"key": "A", "text": "None of the others", "it": "Nessuno degli altri", "why": "no: esiste attività di cleansing tra le opzioni"}, {"key": "B", "text": "Usage of dictionaries to solve inconsistencies", "it": "Uso di dizionari per risolvere inconsistenze", "why": "sì: dizionari risolvono inconsistenze nella fase cleansing"}, {"key": "C", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali", "why": "no: snapshot appartiene alla fase extraction"}, {"key": "D", "text": "Association of a timestamp to the operational data", "it": "Associazione di un timestamp ai dati operazionali", "why": "no: timestamp operativo appartiene alla extraction"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Cleansing?", "it_a": "Utilizzo di dizionari per risolvere le inconsistenze", "cue": "🔮 Cerca «inconsistencies», «dictionaries»: compare SOLO nella giusta."}, {"id": "a018", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Transformation step?", "options": [{"key": "A", "text": "None of the others", "it": "Nessuno degli altri", "why": "no: denormalizzazione è una trasformazione presente"}, {"key": "B", "text": "Denormalisation", "it": "Denormalisation", "why": "sì: denormalisation ristruttura dati nella transformation"}, {"key": "C", "text": "Usage of dictionaries to solve inconsistencies", "it": "Uso di dizionari per risolvere inconsistenze", "why": "no: dizionari sono cleansing, non transformation"}, {"key": "D", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali", "why": "no: snapshot appartiene alla extraction"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Transformation?", "it_a": "Denormalizzazione", "cue": "🔮 Cerca «denormalisation»: compare SOLO nella giusta."}, {"id": "a019", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Extraction step?", "options": [{"key": "A", "text": "Usage of dictionaries to solve inconsistencies", "it": "Uso di dizionari per risolvere inconsistenze", "why": "no: dizionari risolvono inconsistenze nel cleansing"}, {"key": "B", "text": "Elimination of duplicates", "it": "Eliminazione dei duplicati", "why": "no: eliminazione duplicati è cleansing"}, {"key": "C", "text": "None of the others", "it": "Nessuno degli altri", "why": "no: timestamp è attività di extraction disponibile"}, {"key": "D", "text": "Association of a timestamp to the operational data", "it": "Associazione di un timestamp ai dati operazionali", "why": "sì: timestamp associa dati estratti alla fase extraction"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Extraction?", "it_a": "Associazione di un timestamp ai dati operazionali", "cue": "🔮 Cerca «association», «operational»: compare SOLO nella giusta."}, {"id": "a020", "topic": "BI & DWH", "text": "Talking about the general idea of database, which of the following is a purpose of \"Schema on write\" strategy?", "options": [{"key": "A", "text": "Optimization for specific types of queries", "it": "Ottimizzazione per tipi specifici di query", "why": "sì: schema-on-write ottimizza query specifiche predefinite"}, {"key": "B", "text": "Flexibility and efficiency for any kind of query", "it": "Flessibilità ed efficienza per qualsiasi tipo di query", "why": "no: flessibilità generale è schema-on-read"}, {"key": "C", "text": "Avoid preprocessing of data before writing", "it": "Evita il preprocessing dei dati prima della scrittura", "why": "no: schema-on-write richiede preprocessing prima della scrittura"}, {"key": "D", "text": "None of the others", "it": "Nessuno degli altri", "why": "no: ottimizzazione query è scopo valido"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto).", "it_q": "Parlando del concetto generale di database, quale delle seguenti è uno scopo della strategia \"Schema on write\"?", "it_a": "Ottimizzazione per specifici tipi di query", "cue": "🔮 Cerca «optimization», «specific»: compare SOLO nella giusta."}, {"id": "a021", "topic": "BI & DWH", "text": "Talking about the general idea of database, which of the following is a purpose of \"Schema on write\" strategy?", "options": [{"key": "A", "text": "Flexibility and efficiency for any kind of query", "it": "Flessibilità ed efficienza per qualsiasi tipo di query", "why": "no: flessibilità ampia caratterizza schema-on-read"}, {"key": "B", "text": "Clean design of the data structure", "it": "Progettazione pulita della struttura dei dati", "why": "sì: schema-on-write impone struttura pulita prima del caricamento"}, {"key": "C", "text": "Avoid preprocessing of data before writing", "it": "Evitare la pre-elaborazione dei dati prima della scrittura", "why": "no: non evita preprocessing; lo anticipa"}, {"key": "D", "text": "None of the others", "it": "Nessuna delle altre", "why": "no: clean design è scopo valido"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto).", "it_q": "Parlando del concetto generale di database, quale delle seguenti è uno scopo della strategia \"Schema on write\"?", "it_a": "Progettazione pulita della struttura dei dati", "cue": "🔮 Cerca «structure», «design»: compare SOLO nella giusta."}, {"id": "a022", "topic": "BI & DWH", "text": "Which of the following sentences does NOT describe an advantage of a Data Warehouse with respect to a standard DBMS?", "options": [{"key": "A", "text": "Allows analysis along the time dimension", "it": "Permette l'analisi lungo la dimensione temporale", "why": "no: vantaggio DWH: analisi storica temporale"}, {"key": "B", "text": "Manages efficiently data updates", "it": "Gestisce efficientemente gli aggiornamenti dei dati", "why": "sì: non vantaggio: DWH non ottimizza aggiornamenti frequenti"}, {"key": "C", "text": "Allows efficient execution of multi-dimensional queries", "it": "Permette l'esecuzione efficiente di query multi-dimensionali", "why": "no: vantaggio DWH: query multidimensionali efficienti"}, {"key": "D", "text": "Has tools for helping to solve inconsistencies", "it": "Dispone di strumenti per risolvere le inconsistenze", "why": "no: vantaggio DWH: risoluzione inconsistenze"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake).", "it_q": "Quale delle seguenti frasi NON descrive un vantaggio di un Data Warehouse rispetto a un DBMS standard?", "it_a": "Gestisce efficientemente gli aggiornamenti dei dati", "cue": "🔮 Cerca «efficiently», «updates»: compare SOLO nella giusta."}, {"id": "a023", "topic": "BI & DWH", "text": "Which one of the following sentences does NOT describe a characteristic of a Data Warehouse?", "options": [{"key": "A", "text": "Non volatile", "it": "Non volatile", "why": "no: caratteristica vera: Data Warehouse non volatile"}, {"key": "B", "text": "Includes the time dimension", "it": "Include la dimensione temporale", "why": "no: caratteristica vera: include dimensione tempo"}, {"key": "C", "text": "Constantly updated as soon as the base data are updated", "it": "Aggiornato costantemente non appena i dati di base vengono aggiornati", "why": "sì: non caratteristica: DWH non aggiornato in tempo reale"}, {"key": "D", "text": "Solves the inconsistencies", "it": "Risolve le inconsistenze", "why": "no: caratteristica vera: integra e risolve inconsistenze"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake).", "it_q": "Quale delle seguenti frasi NON descrive una caratteristica di un Data Warehouse?", "it_a": "Aggiornato costantemente non appena i dati di base vengono aggiornati", "cue": "🔮 Cerca «constantly», «updated»: compare SOLO nella giusta."}, {"id": "a024", "topic": "BI & DWH", "text": "Which one of the following sentences does NOT describe a characteristic of a Data Warehouse?", "options": [{"key": "A", "text": "Non volatile", "it": "Non volatile", "why": "no: caratteristica vera: non volatilità"}, {"key": "B", "text": "Includes the time dimension", "it": "Include la dimensione temporale", "why": "no: caratteristica vera: storicizzazione temporale"}, {"key": "C", "text": "Solves the inconsistencies", "it": "Risolve le inconsistenze", "why": "no: caratteristica vera: dati riconciliati e consistenti"}, {"key": "D", "text": "Includes all the base data in their native format", "it": "Include tutti i dati di base nel loro formato nativo", "why": "sì: non caratteristica: formato nativo grezzo è data lake"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake).", "it_q": "Quale delle seguenti frasi NON descrive una caratteristica di un Data Warehouse?", "it_a": "Include tutti i dati di base nel loro formato nativo", "cue": "🔮 Cerca «format», «native»: compare SOLO nella giusta."}, {"id": "a025", "topic": "BI & DWH", "text": "Which of the following are NOT typical data warehouse queries?", "options": [{"key": "A", "text": "What is the total revenue of yesterday in shop \"BO03\"?", "it": "Qual è il ricavo totale di ieri nel negozio \"BO03\"?", "why": "sì: non tipica DWH: query operativa giornaliera puntuale"}, {"key": "B", "text": "Which products maximize the profit?", "it": "Quali prodotti massimizzano il profitto?", "why": "no: tipica DWH: analisi profittabilità prodotti"}, {"key": "C", "text": "What is the relationship between profits gained by products \"WWW\" and \"ZZZ\"?", "it": "Qual è la relazione tra i profitti dei prodotti \"WWW\" e \"ZZZ\"?", "why": "no: tipica DWH: correlazioni tra profitti prodotto"}, {"key": "D", "text": "What is the total revenue per product category and state?", "it": "Qual è il ricavo totale per categoria di prodotto e stato?", "why": "no: tipica DWH: aggregazione per categoria e stato"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake).", "it_q": "Quali delle seguenti NON sono query tipiche di un Data Warehouse?", "it_a": "Qual è il ricavo totale di ieri nel negozio \"BO03\"?", "cue": "🔮 Cerca «yesterday», «bo03»: compare SOLO nella giusta."}, {"id": "a026", "topic": "Preprocessing & dati", "text": "Which is different from others:", "options": [{"key": "A", "text": "Expectation Maximisation", "it": "Expectation Maximisation", "why": "no: Expectation Maximisation è clustering non supervisionato"}, {"key": "B", "text": "Apriori", "it": "Apriori", "why": "no: Apriori scopre pattern non supervisionati"}, {"key": "C", "text": "K-means", "it": "K-means", "why": "no: K-means è clustering non supervisionato"}, {"key": "D", "text": "Decision Tree", "it": "Decision Tree", "why": "sì: Decision Tree è classificazione supervisionata"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🔍 La linea è sempre supervisionato vs non supervisionato: trova l'intruso rispetto a quella.", "it_q": "Quale è diverso dagli altri:", "it_a": "Albero decisionale", "cue": "🔮 Cerca «decision», «tree»: compare SOLO nella giusta."}, {"id": "a027", "topic": "Preprocessing & dati", "text": "Which of the following statements is true?", "options": [{"key": "A", "text": "The noise always generates outliers", "it": "Il rumore genera sempre outlier", "why": "no: rumore non genera sempre outlier"}, {"key": "B", "text": "The data which are similar to the majority are never noise", "it": "I dati simili alla maggioranza non sono mai rumore", "why": "no: anche dati maggioritari possono essere rumorosi"}, {"key": "C", "text": "The noise can generate outliers", "it": "Il rumore può generare outlier", "why": "sì: rumore può produrre valori anomali outlier"}, {"key": "D", "text": "The noise never generates outliers", "it": "Il rumore non genera mai outlier", "why": "no: rumore può generare outlier"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «noise · generate · outliers»", "it_q": "Quale delle seguenti affermazioni è vera?", "it_a": "Il rumore può generare outlier", "cue": "🔮 Cerca «generate»: compare SOLO nella giusta."}, {"id": "a028", "topic": "Preprocessing & dati", "text": "In data preparation which is the effect of normalisation?", "options": [{"key": "A", "text": "Map all the numeric attributes to the same range, without altering the distribution, in order to avoid that attributes with large ranges have more influence", "it": "Mappa tutti gli attributi numerici nello stesso intervallo, senza alterare la distribuzione, per evitare che attributi con intervalli ampi abbiano maggiore influenza", "why": "sì: normalizzazione porta numerici stesso range, distribuzione invariata"}, {"key": "B", "text": "Map all the numeric attributes subtracting the respective mean and dividing by variance", "it": "Mappa tutti gli attributi numerici sottraendo la rispettiva media e dividendo per la varianza", "why": "no: descrive standardizzazione z-score, non normalizzazione MinMax"}, {"key": "C", "text": "Map all the numeric attributes to the same range and to have a Gaussian (or normal) distribution, in order to avoid that attributes with large ranges have more influence", "it": "Mappa tutti gli attributi numerici nello stesso intervallo e per avere una distribuzione Gaussiana (o normale), per evitare che attributi con intervalli ampi abbiano maggiore influenza", "why": "no: Gaussianizzazione altera distribuzione, non semplice normalizzazione"}, {"key": "D", "text": "Map all the numeric attributes in order to have a Gaussian (or normal) distruibution, in order to avoid that attributes with large ranges have more influence", "it": "Mappa tutti gli attributi numerici per avere una distribuzione Gaussiana (o normale), per evitare che attributi con intervalli ampi abbiano maggiore influenza", "why": "no: trasformazione gaussiana non è normalizzazione di scala"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «numeric · attributes · same · range»", "it_q": "Nella preparazione dei dati, qual è l'effetto della normalizzazione?", "it_a": "Mappa tutti gli attributi numerici nello stesso intervallo, senza alterare la distribuzione, in modo da evitare che attributi con intervalli ampi abbiano maggiore influenza", "cue": "🔮 Cerca «altering», «without»: compare SOLO nella giusta."}, {"id": "a030", "topic": "Preprocessing & dati", "text": "Which is the main reason for the standardization of numeric attributes?", "options": [{"key": "A", "text": "Change the distribution of the numeric attributes, in order to obtain gaussian distributions", "it": "Modifica la distribuzione degli attributi numerici, per ottenere distribuzioni gaussiane", "why": "no: standardizzazione non forza distribuzione gaussiana"}, {"key": "B", "text": "Map all the numeric attributes to a new range such that the mean is zero and the variance is one", "it": "Mappa tutti gli attributi numerici in un nuovo intervallo tale che la media sia zero e la varianza uno", "why": "sì: standardizzazione porta media zero e varianza uno"}, {"key": "C", "text": "Mapp all the nominal attributes to the same range, in order to prevent the values with higher frequency from having prevailing influence", "it": "Mappa tutti gli attributi nominali nello stesso intervallo, per impedire che i valori con frequenza maggiore abbiano influenza predominante", "why": "no: riguarda nominali, non attributi numerici"}, {"key": "D", "text": "Remove non-standard values", "it": "Rimuovi i valori non standard", "why": "no: non rimuove valori non standard"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «numeric · attributes · range · such»", "it_q": "Qual è il motivo principale per la standardizzazione degli attributi numerici?", "it_a": "Mappa tutti gli attributi numerici in un nuovo intervallo in modo che la media sia zero e la varianza sia uno", "cue": "🔮 Cerca «variance», «mean»: compare SOLO nella giusta."}, {"id": "a031", "topic": "Clustering", "text": "After fitting DBSCAN with the default parameter values the results are: 0 clusters, 100% of noise points. Which will be your next trial?", "options": [{"key": "A", "text": "Reduce the minimum number of objects in the neighborhood or increase the radius of the neighborhood", "it": "Riduci il numero minimo di oggetti nel vicinato o aumenta il raggio del vicinato", "why": "sì: tutto noise: aumentare eps o ridurre min_samples"}, {"key": "B", "text": "Reduce the minimum number of objects in the neighborhood and the radius of the neighborhood", "it": "Riduci il numero minimo di oggetti nel vicinato e il raggio del vicinato", "why": "no: ridurre raggio aumenta ancora i punti noise"}, {"key": "C", "text": "Decrease the radius of the neighborhood", "it": "Diminuisci il raggio del vicinato", "why": "no: eps minore rende i vicinati più vuoti"}, {"key": "D", "text": "None of the others", "it": "Nessuna delle altre", "why": "no: esiste una regolazione DBSCAN corretta"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🟢 DBSCAN fine ma lento: outlier ok, concavità ok, densità DIVERSE ko. Tutto noise? ↓min_samples o ↑raggio.", "it_q": "Dopo aver eseguito DBSCAN con i parametri di default i risultati sono: 0 cluster, 100% di punti di rumore. Quale sarà il tuo prossimo tentativo?", "it_a": "Riduci il numero minimo di oggetti nel vicinato o aumenta il raggio del vicinato", "cue": "🔮 Cerca «increase»: compare SOLO nella giusta."}, {"id": "a032", "topic": "Association Rules", "text": "Which of the statements below best describes the strategy of Apriori in finding the frequent itemsets?", "options": [{"key": "A", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are considered only at the end of the execution", "it": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca siano considerate solo alla fine dell'esecuzione", "why": "no: Apriori pota presto, non rimanda parti inutili"}, {"key": "B", "text": "Evaluation of the confidence of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible", "it": "Valutazione della confidence degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca siano potate il prima possibile", "why": "no: Apriori valuta supporto, non confidence degli itemset"}, {"key": "C", "text": "Evaluation of the support of the itemsets in an order such that uninteresting parts of the search space are pruned as soon as possible", "it": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca siano potate il prima possibile", "why": "sì: usa anti-monotonia del supporto per potare presto"}, {"key": "D", "text": "Evaluation of the support of the itemsets in an order such that the interesting parts of the search space are pruned as soon as possible", "it": "Valutazione del support degli itemset in un ordine tale che le parti interessanti dello spazio di ricerca siano potate il prima possibile", "why": "no: non pota parti interessanti dello spazio"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🍇 Anti-monotonia: il figlio (superset) non supera mai il padre. Itemset raro → superset morti, potati subito. Apriori usa il SUPPORT.", "it_q": "Quale delle seguenti affermazioni descrive meglio la strategia di Apriori nel trovare gli itemset frequenti?", "it_a": "Valutazione del support degli itemset in un ordine tale che le parti non interessanti dello spazio di ricerca vengano potate il prima possibile", "cue": "🔮 Nessun trucco enti per inconsistenze"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🏛 DWH = fototeca storica: inconsistenze risolte, NON volatile, dimensione tempo. MAI: aggiornato in tempo reale, dati raw (quello è il lake).", "it_q": "Quale delle seguenti frasi NON descrive un vantaggio di un Data Warehouse rispetto a un DBMS standard?", "it_a": "Permette l'esecuzione efficiente di query basate su chiavi", "cue": "🔮 Cerca «key-based»: compare SOLO nella giusta."}, {"id": "a047", "topic": "BI & DWH", "text": "What is the ranking for the following technologies, based on the increasing level of abstraction?  Technologies:  - OLAP analysis on Data Mart  - Data Mining on operational databases;  - SQL queries on operational databases;  Order: from left (it generates the most specific information) to right (it has a higher level of knowledge).", "options": [{"key": "A", "text": "Data Mining, OLAP analysis, SQL queries", "it": "Data Mining, OLAP analysis, SQL queries", "why": "no: Data Mining è più astratto, non più specifico"}, {"key": "B", "text": "OLAP analysis, Data Mining, SQL queries", "it": "OLAP analysis, Data Mining, SQL queries", "why": "no: OLAP non è più specifico di SQL operativo"}, {"key": "C", "text": "SQL queries, OLAP analysis, Data Mining", "it": "SQL queries, OLAP analysis, Data Mining", "why": "sì: SQL specifico, OLAP aggregato, Data Mining conoscenza"}, {"key": "D", "text": "OLAP analysis, SQL queries, Data Mining", "it": "OLAP analysis, SQL queries, Data Mining", "why": "no: OLAP non precede SQL per specificità"}, {"key": "E", "text": "SQL queries, Data Mining, OLAP analysis", "it": "SQL queries, Data Mining, OLAP analysis", "why": "no: Data Mining è più astratto di OLAP"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Acro     try { return JSON.parse(localStorage.getItem(k)) || fallback; }
    catch (e) { return fallback; }
  }
  function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }
  function saveSettings() { localStorage.setItem(SKEY, JSON.stringify(settings)); }
  function today() { return new Date().toDateString(); }

  var state = loadJSON(KEY, {});
  var settings = Object.assign({}, DEFAULTS, loadJSON(SKEY, {}));
  if (!state._meta) state._meta = { day: today(), done: 0 };
  if (state._meta.day !== today()) state._meta = { day: today(), done: 0 };

  function cards(topic) {
    return window.BANK.filter(function (q) {
      return !topic || topic === "All" || q.topic === topic;
    });
  }

  function fmt(ms) {
    if (ms < MIN) return "subito";
    if (ms < HOUR) return Math.round(ms / MIN) + " min";
    if (ms < DAY) return Math.round(ms / HOUR) + " ore";
    var d = Math.round(ms / DAY);
    return d === 1 ? "1 giorno" : d + " giorni";
  }

  function examTs() {
    var t = Date.parse(settings.examDate);
    return isNaN(t) ? Date.now() + 3 * DAY : t;
  }

  // exam-aware compression: with plenty of time factor=1; near the exam the
  // intervals shrink so cards keep cycling (floor 0.2 = never below 20%).
  function compression() {
    var left = examTs() - Date.now();
    if (left <= 0) return 1;                       // exam passed: normal SR
    return Math.max(0.2, Math.min(1, left / (3 * DAY)));
  }

  function intervalFor(grade, box) {
    var base;
    if (grade === "again") return 0;
    else if (grade === "hard") base = settings.hardMin * MIN;
    else if (grade === "good") base = (box + 1) <= 1 ? settings.goodFirstH * HOUR
                                                     : settings.goodNextD * DAY;
    else base = settings.easyD * DAY;              // easy
    var iv = base * compression();
    // never schedule past 2h before the exam (so it can still come back)
    var cap = examTs() - 2 * HOUR - Date.now();
    if (cap > MIN) iv = Math.min(iv, cap);
    return Math.max(MIN, iv);
  }

  function applyGrade(id, grade) {
    var now = Date.now();
    var c = state[id] || { box: 0, seen: 0, lapses: 0 };
    c.seen += 1; c.last = now;
    if (grade === "again") { c.box = 0; c.lapses += 1; c.due = now; }
    else {
      c.due = now + intervalFor(grade, c.box);
      if (grade === "good") c.box += 1;
      else if (grade === "easy") c.box += 2;
    }
    state[id] = c;
    state._meta.done += 1;
    save(state);
    return fmt(Math.max(0, c.due - now));
  }

  var SR = {
    next: function (topic) {
      var now = Date.now();
      var due = [], fresh = [];
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (!c) fresh.push(q);
        else if (c.due <= now) due.push({ q: q, due: c.due });
      });
      if (due.length) {
        due.sort(function (a, b) { return a.due - b.due; });
        return due[0].q.id;
      }
      if (fresh.length) return fresh[0].id;
      return null;
    },

    /* AUTO-GRADING. signals:
       - wrong (selected != correct, no overlap on single / none right) -> again
       - partial on multi-select (some correct, not all, no wrong picks counts
         as partial too)                                                -> hard
       - correct: response time vs expected reading+deciding time:
           expected = 2.5s + 0.35s per word (question+options), min 6s
           fast  (< 0.7 x expected) -> easy
           slow  (> 1.8 x expected) -> hard  (right but laborious)
           else                     -> good                              */
    answer: function (id, sig) {
      var correct = sig.correctSet, sel = sig.selectedSet;
      var inter = sel.filter(function (k) { return correct.indexOf(k) >= 0; });
      var wrongPicks = sel.filter(function (k) { return correct.indexOf(k) < 0; });
      var exact = inter.length === correct.length && wrongPicks.length === 0;
      var grade, verdict;
      // learning-phase bookkeeping: consecutive-correct streak + last mistake
      var card = state[id] || { box: 0, seen: 0, lapses: 0 };
      if (card.ok === undefined) card.ok = card.streak || 0;  // migration v3.6
      if (exact) { card.streak = (card.streak || 0) + 1; card.ok += 1; }
      else {
        card.streak = 0;
        if (sig.wrongTexts && sig.wrongTexts.length) {
          card.lastWrong = sig.wrongTexts.slice(0, 3).map(function (t) {
            return String(t).slice(0, 90);
          });
        }
      }
      state[id] = card;
      if (exact) {
        var words = (sig.qWords || 20) + (sig.oWords || 30);
        var expected = Math.max(6000, 2500 + 350 * words);
        var ratio = (sig.ms || expected) / expected;
        grade = ratio < 0.7 ? "easy" : (ratio > 1.8 ? "hard" : "good");
        verdict = "ok";
      } else if (inter.length > 0 && correct.length > 1) {
        grade = "hard"; verdict = "partial";
      } else {
        grade = "again"; verdict = "ko";
      }
      var human = applyGrade(id, grade);
      return { grade: grade, human: human, verdict: verdict };
    },

    grade: applyGrade,   // manual path kept for tests/compatibility

    stats: function (topic) {
      var now = Date.now();
      var due = 0, fresh = 0;
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (!c) fresh += 1;
        else if (c.due <= now) due += 1;
      });
      return { due: due, fresh: fresh, done: state._meta.done,
               total: cards(topic).length };
    },
    boxes: function (topic) {
      var b = [0, 0, 0, 0];
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (c) b[Math.min(c.box, 3)] += 1;
      });
      return b;
    },
    learning: function (id) {
      var c = state[id];
      var threshold = Math.max(1, Math.round(settings.cueAfter || 5));
      if (!c) return true;
      var ok = c.ok !== undefined ? c.ok : (c.streak || 0);
      return ok < threshold;   // aids shown until N total correct answers
    },
    lastWrong: function (id) {
      var c = state[id];
      return (c && c.lastWrong) || null;
    },
    seenCount: function (id) {
      var c = state[id];
      return c ? (c.seen || 0) : 0;
    },
    nextSessionHint: function (topic) {
      var now = Date.now();
      var future = [];
      cards(topic).forEach(function (q) {
        var c = state[q.id];
        if (c && c.due > now) future.push(c.due);
      });
      if (!future.length) return null;
      future.sort(function (a, b) { return a - b; });
      var batch = future.filter(function (d) { return d - future[0] < 30 * MIN; });
      return { inHuman: fmt(future[0] - now), count: batch.length,
               at: new Date(future[0]) };
    },
    examDate: function () { return settings.examDate; },
    setExamDate: function (iso) {
      if (!isNaN(Date.parse(iso))) { settings.examDate = iso; saveSettings(); }
      return settings.examDate;
    },
    settings: function () { return Object.assign({}, settings); },
    setSettings: function (s) {
      ["hardMin", "goodFirstH", "goodNextD", "easyD", "batchSize", "cueAfter"].forEach(function (k) {
        var v = parseFloat(s[k]);
        if (!isNaN(v) && v > 0) settings[k] = v;
      });
      if (s.examDate) SR.setExamDate(s.examDate);
      saveSettings();
      return SR.settings();
    },
    resetSettings: function () {
      settings = Object.assign({}, DEFAULTS);
      saveSettings();
      return SR.settings();
    },
    exportState: function () {
      return JSON.stringify({ v: 3, exported: new Date().toISOString(),
                              state: state, settings: settings });
    },
    importState: function (json) {
      var data = JSON.parse(json);
      if (!data || typeof data.state !== "object") throw new Error("backup non valido");
      state = data.state;
      if (!state._meta) state._meta = { day: today(), done: 0 };
      save(state);
      if (data.settings) SR.setSettings(data.settings);
      return true;
    },
    preview: function (id) {
      var box = (state[id] || { box: 0 }).box;
      return { again: "subito", hard: fmt(intervalFor("hard", box)),
               good: fmt(intervalFor("good", box)), easy: fmt(intervalFor("easy", box)) };
    },
    batchSize: function () { return Math.max(1, Math.round(settings.batchSize || 10)); },
    extraBatch: function (topic, n) {
      // weakest-first: low box, many lapses, earliest due
      n = n || SR.batchSize();
      var scored = cards(topic).map(function (q) {
        var c = state[q.id] || { box: 0, lapses: 0, due: 0 };
        return { id: q.id, box: c.box || 0, lapses: c.lapses || 0, due: c.due || 0 };
      });
      scored.sort(function (a, b) {
        if (a.box !== b.box) return a.box - b.box;
        if (a.lapses !== b.lapses) return b.lapses - a.lapses;
        return a.due - b.due;
      });
      return scored.slice(0, n).map(function (x) { return x.id; });
    },
    randomTen: function (topic) {
      var pool = cards(topic).map(function (q) { return q.id; });
      for (var i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
      }
      return pool.slice(0, 10);
    },
    _reset: function () {
      state = { _meta: { day: today(), done: 0 } }; save(state);
    }
  };
  window.SR = SR;
})();

</script>
<script>
(function () {
  "use strict";

  var app = document.getElementById("app");
  var BANK = window.BANK || [];
  var SR = window.SR;
  var byId = {};
  var currentTopic = null;
  var view = "home";
  var session = null;
  var current = null;
  var toastTimer = null;
  var keyListenerReady = false;

  BANK.forEach(function (q) {
    byId[q.id] = q;
  });

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined && text !== null) node.textContent = String(text);
    return node;
  }

  function button(className, text, onClick) {
    var b = el("button", className, text);
    b.type = "button";
    if (onClick) b.addEventListener("click", onClick);
    return b;
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function uniqueTopics() {
    var seen = {};
    var topics = [];
    BANK.forEach(function (q) {
      if (q.topic && !seen[q.topic]) {
        seen[q.topic] = true;
        topics.push(q.topic);
      }
    });
    topics.sort(function (a, b) {
      return a.localeCompare(b, "it");
    });
    return topics;
  }

  function shuffle(items) {
    var out = items.slice();
    for (var i = out.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = out[i];
      out[i] = out[j];
      out[j] = tmp;
    }
    return out;
  }

  function sameSet(a, b) {
    if (a.length !== b.length) return false;
    var m = {};
    a.forEach(function (x) {
      m[x] = true;
    });
    return b.every(function (x) {
      return m[x];
    });
  }

  function topicFilter(value) {
    if (arguments.length) {
      currentTopic = value || null;
      renderHome();
    }
    return currentTopic;
  }

  function render() {
    if (view === "home") renderHome();
    else if (view === "settings") renderSettings();
    else if (view === "empty") renderEmpty();
    else renderQuestion();
  }

  function start() {
    installKeyboard();
    renderHome();
  }

  function renderHeader(root) {
    var header = el("div", "header");
    header.appendChild(button("btn-icon", "🏠", function () {
      session = null;
      renderHome();
    }));

    var s = SR.stats(currentTopic);
    header.appendChild(el("div", "hstats", "📥 " + s.due + " · ✨ " + s.fresh));

    header.appendChild(button("btn-icon", "⚙️", function () {
      renderSettings();
    }));
    root.appendChild(header);

    var progress = el("div", "progressbar");
    var inner = el("div");
    var pct = 0;
    if (session) {
      var total = Math.max(1, session.answered + session.remaining());
      pct = Math.min(100, Math.round((session.answered / total) * 100));
    }
    inner.style.width = pct + "%";
    progress.appendChild(inner);
    root.appendChild(progress);
  }

  function renderHome() {
    view = "home";
    session = null;
    clear(app);

    var home = el("div", "home");
    home.appendChild(el("h1", null, "DM Quiz"));
    home.appendChild(el("div", "sub", "Ripetizione spaziata — l'app decide quando rivedrai ogni carta"));

    var stats = SR.stats(currentTopic);
    var line = el("div", "stats");
    line.appendChild(document.createTextNode("Da ripassare: "));
    line.appendChild(el("b", null, stats.due));
    line.appendChild(document.createTextNode(" · Nuove: "));
    line.appendChild(el("b", null, stats.fresh));
    line.appendChild(document.createTextNode(" · Fatte oggi: "));
    line.appendChild(el("b", null, stats.done));
    home.appendChild(line);

    if (stats.due === 0 && stats.fresh === 0) {
      var hintInfo = SR.nextSessionHint(currentTopic);
      if (hintInfo) {
        home.appendChild(el("div", "stats",
          "⏰ Prossima sessione: tra " + hintInfo.inHuman + " (" + hintInfo.count + " carte)"));
      }
    }

    var chart = el("div", "boxchart");
    var boxes = SR.boxes(currentTopic);
    var labels = ["nuove-0", "box 1", "box 2", "box 3+"];
    var classes = ["bar", "bar b1", "bar b2", "bar b3"];
    var max = Math.max.apply(null, boxes.concat([1]));
    boxes.forEach(function (count, i) {
      var wrap = el("div", "barwrap");
      var bar = el("div", classes[i] || "bar");
      var h = count > 0 ? Math.max(4, Math.round((count / max) * 100)) : 4;
      bar.style.height = h + "%";
      bar.title = labels[i] + ": " + count;
      wrap.appendChild(bar);
      wrap.appendChild(el("i", null, labels[i]));
      chart.appendChild(wrap);
    });
    home.appendChild(chart);

    var select = document.createElement("select");
    var all = document.createElement("option");
    all.value = "";
    all.textContent = "Tutti";
    select.appendChild(all);
    uniqueTopics().forEach(function (topic) {
      var opt = document.createElement("option");
      opt.value = topic;
      opt.textContent = topic;
      select.appendChild(opt);
    });
    select.value = currentTopic || "";
    select.addEventListener("change", function () {
      currentTopic = select.value || null;
      renderHome();
    });
    home.appendChild(select);

    home.appendChild(button("btn-primary", "▶ Studia", function () {
      startSession("srs");
    }));
    home.appendChild(button("btn", "➕ Gruppo extra (" + (SR.batchSize ? SR.batchSize() : 10) + " domande, le più deboli)", function () {
      startSession("batch");
    }));
    home.appendChild(button("btn-secondary", "⚙️ Impostazioni", function () {
      renderSettings();
    }));
    home.appendChild(el("div", "footer", "DM Quiz v3.7"));

    app.appendChild(home);
  }

  function startSession(mode) {
    var kind = mode || "srs";
    var startStats = SR.stats(currentTopic);
    var queue = kind === "random10" ? SR.randomTen(currentTopic).slice()
              : kind === "batch" ? SR.extraBatch(currentTopic).slice() : [];
    session = {
      mode: kind,
      queue: queue,
      answered: 0,
      initial: (kind === "random10" || kind === "batch") ? queue.length : startStats.due + startStats.fresh,
      remaining: function () {
        if (this.mode === "random10" || this.mode === "batch") return this.queue.length;
        var s = SR.stats(currentTopic);
        return s.due + s.fresh;
      }
    };
    nextQuestion();
  }

  function nextQuestion() {
    var id = null;
    if (session.mode === "random10" || session.mode === "batch") id = session.queue.shift() || null;
    else id = SR.next(currentTopic);

    if (!id || !byId[id]) {
      renderEmpty();
      return;
    }

    var q = byId[id];
    current = {
      id: id,
      q: q,
      options: shuffle(q.options || []),
      selected: {},
      submitted: false,
      correct: false,
      result: null,
      startedAt: Date.now()
    };
    renderQuestion();
  }

  function renderQuestion() {
    view = "question";
    clear(app);

    var root = el("div", "quiz");
    renderHeader(root);

    var q = current.q;
    var card = el("div", "qcard");
    card.appendChild(el("div", "topic", q.topic || ""));
    card.appendChild(el("div", "qtext", q.text || ""));

    var inLearning = SR.learning ? SR.learning(current.id) : true;
    if (inLearning && q.it_q) {
      card.appendChild(el("div", "qtrans", q.it_q));
    }
    if ((q.correct || []).length > 1 && inLearning) {
      card.appendChild(el("div", "multinote", "Seleziona TUTTE le risposte corrette"));
    }
    if (q.cue && inLearning && !current.submitted) {
      var hb = el("div", "hintbox");
      var cueRow = el("div", "cue-row");
      cueRow.appendChild(document.createTextNode(q.cue));
      hb.appendChild(cueRow);
      var thr = (SR.settings && SR.settings().cueAfter) || 5;
      hb.appendChild(el("small", null, "(sparisce dopo " + thr + " risposte giuste)"));
      card.appendChild(hb);
    }

    var opts = el("div", "options");
    current.options.forEach(function (opt, index) {
      var ob = button("option", null, function () {
        chooseOption(index);
      });
      ob.setAttribute("data-index", String(index));
      ob.setAttribute("data-key", opt.key);

      if (current.selected[opt.key]) ob.classList.add("selected");
      if (current.submitted) {
        if ((q.correct || []).indexOf(opt.key) !== -1) ob.classList.add("correct");
        if (current.selected[opt.key] && (q.correct || []).indexOf(opt.key) === -1) ob.classList.add("wrong");
      }

      ob.appendChild(el("span", "letter", String.fromCharCode(65 + index)));
      var txt = el("span", "opt-texts");
      txt.appendChild(el("span", null, opt.text || ""));
      if (inLearning && opt.it) txt.appendChild(el("span", "opt-tr", opt.it));
      if (current.submitted && opt.why) {
        var isOk = (q.correct || []).indexOf(opt.key) !== -1;
        txt.appendChild(el("span", "opt-why " + (isOk ? "w-ok" : "w-no"),
          (isOk ? "✔ " : "✘ ") + String(opt.why).replace(/^(sì|si|no):\s*/i, "")));
      }
      ob.appendChild(txt);
      opts.appendChild(ob);
    });
    card.appendChild(opts);

    if (!current.submitted) {
      card.appendChild(button("btn-primary", "Conferma", submitAnswer));
    }

    if (current.submitted) {
      var res = current.result || { verdict: "ko", grade: "again", human: "subito" };
      var vText = res.verdict === "ok" ? "✅ Esatto!" :
                  res.verdict === "partial" ? "🟡 Quasi: risposta parziale" : "❌ Riguardala";
      var verdict = el("div", "verdict " + (res.verdict === "ok" ? "ok" : "ko"), vText);
      if (res.verdict === "partial") verdict.style.color = "#f59e0b";
      card.appendChild(verdict);

      if (q.note) card.appendChild(el("div", "note", q.note));
      card.appendChild(el("div", "note", res.grade === "again"
        ? "↩ Torna subito in coda"
        : "↻ La rivedrai tra " + res.human));

      card.appendChild(button("btn-primary", "Avanti →", advance));

      var hint = el("div", "kbd-hint");
      hint.appendChild(document.createTextNode("Tasti: "));
      hint.appendChild(el("kbd", null, "1-9"));
      hint.appendChild(document.createTextNode(" opzioni · "));
      hint.appendChild(el("kbd", null, "Invio"));
      hint.appendChild(document.createTextNode(" conferma / avanti"));
      card.appendChild(hint);
    }

    root.appendChild(card);
    app.appendChild(root);
  }

  function chooseOption(index) {
    if (!current || current.submitted) return;
    var opt = current.options[index];
    if (!opt) return;

    if ((current.q.correct || []).length === 1) {
      current.selected = {};
      current.selected[opt.key] = true;
      renderQuestion();
      return;
    }

    if (current.selected[opt.key]) delete current.selected[opt.key];
    else current.selected[opt.key] = true;
    renderQuestion();
  }

  function wordCount(t) { return String(t || "").trim().split(/\s+/).length; }

  function submitAnswer() {
    if (!current || current.submitted) return;
    var selected = Object.keys(current.selected);
    var q = current.q;
    var oWords = current.options.reduce(function (n, o) {
      return n + wordCount(o.text);
    }, 0);
    var wrongTexts = current.options.filter(function (o) {
      return current.selected[o.key] && (q.correct || []).indexOf(o.key) === -1;
    }).map(function (o) { return o.text; });
    current.result = SR.answer(current.id, {
      correctSet: (q.correct || []).slice(),
      selectedSet: selected,
      ms: Date.now() - current.startedAt,
      qWords: wordCount(q.text),
      oWords: oWords,
      wrongTexts: wrongTexts
    });
    current.correct = current.result.verdict === "ok";
    current.submitted = true;
    renderQuestion();
  }

  function advance() {
    if (!current || !current.submitted) return;
    var res = current.result || { grade: "again" };
    session.answered += 1;

    if (res.grade === "again" && (session.mode === "random10" || session.mode === "batch")) {
      session.queue.push(current.id);
    }

    nextQuestion();
  }

  function renderEmpty() {
    view = "empty";
    clear(app);

    var root = el("div", "quiz");
    renderHeader(root);

    var card = el("div", "qcard");
    card.appendChild(el("h2", null, "🎉 Niente da ripassare ora"));

    var s = SR.stats(currentTopic);
    var info = el("div", "stats");
    info.appendChild(document.createTextNode("Da ripassare: "));
    info.appendChild(el("b", null, s.due));
    info.appendChild(document.createTextNode(" · Nuove: "));
    info.appendChild(el("b", null, s.fresh));
    info.appendChild(document.createTextNode(" · Totale: "));
    info.appendChild(el("b", null, s.total));
    card.appendChild(info);

    var n = SR.batchSize ? SR.batchSize() : 10;
    card.appendChild(button("btn-primary", "▶ Continua (altre " + n + ")", function () {
      startSession("batch");
    }));
    card.appendChild(button("btn", "🏠 Home", function () {
      renderHome();
    }));

    root.appendChild(card);
    app.appendChild(root);
  }

  function renderSettings() {
    view = "settings";
    clear(app);

    var root = el("div", "settings");
    renderHeader(root);
    root.appendChild(el("h2", null, "Impostazioni ripetizione"));

    var values = SR.settings();

    var exRow = el("div", "field");
    var exLabel = el("label");
    exLabel.appendChild(document.createTextNode("Data e ora dell'esame"));
    exLabel.appendChild(el("small", null, "Gli intervalli si comprimono avvicinandosi all'esame"));
    exRow.appendChild(exLabel);
    var exInput = document.createElement("input");
    exInput.type = "datetime-local";
    exInput.value = SR.examDate();
    exInput.addEventListener("change", function () {
      SR.setExamDate(exInput.value);
      toast("Data esame salvata");
    });
    exRow.appendChild(exInput);
    root.appendChild(exRow);

    root.appendChild(el("div", "note", "Intervalli avanzati (di norma non serve toccarli: decide l'app)"));

    [
      ["hardMin", "Difficile (minuti)", "Tempo minimo prima di rivedere una risposta difficile", 1],
      ["goodFirstH", "Bene — primo passaggio (ore)", "Intervallo dopo il primo passaggio corretto", 1],
      ["goodNextD", "Bene — passaggi successivi (giorni)", "Intervallo dopo i passaggi successivi", 1],
      ["easyD", "Facile (giorni)", "Intervallo per una risposta facile", 1],
      ["batchSize", "Domande per gruppo extra", "Quante domande per ogni 'Continua' a coda vuota", 1],
      ["cueAfter", "Giuste per nascondere il suggerimento 🔮", "Dopo quante risposte esatte (totali) spariscono cue, traduzioni e nota multi-risposta", 1]
    ].forEach(function (field) {
      var row = el("div", "field");
      var label = el("label");
      label.appendChild(document.createTextNode(field[1]));
      label.appendChild(el("small", null, field[2]));
      row.appendChild(label);

      var input = document.createElement("input");
      input.type = "number";
      input.min = String(field[3]);
      input.value = values[field[0]];
      input.addEventListener("change", function () {
        var next = SR.settings();
        next[field[0]] = Math.max(field[3], parseInt(input.value, 10) || field[3]);
        SR.setSettings(next);
        renderSettings();
      });
      row.appendChild(input);
      root.appendChild(row);
    });

    root.appendChild(button("btn", "Ripristina default", function () {
      SR.resetSettings();
      toast("Impostazioni ripristinate");
      renderSettings();
    }));

    root.appendChild(button("btn", "📤 Esporta progressi", exportProgress));

    var importInput = document.createElement("input");
    importInput.type = "file";
    importInput.accept = "application/json,.json";
    importInput.style.display = "none";
    importInput.addEventListener("change", function () {
      var file = importInput.files && importInput.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          SR.importState(String(reader.result || ""));
          toast("Importato ✅");
          renderSettings();
        } catch (e) {
          toast("File non valido");
        }
      };
      reader.readAsText(file);
    });
    root.appendChild(importInput);

    root.appendChild(button("btn", "📥 Importa progressi", function () {
      importInput.value = "";
      importInput.click();
    }));

    root.appendChild(button("btn danger", "🗑 Azzera progressi", function () {
      if (window.confirm("Azzera tutti i progressi?")) {
        SR._reset();
        toast("Progressi azzerati");
        renderSettings();
      }
    }));

    app.appendChild(root);
  }

  function exportProgress() {
    var blob = new Blob([SR.exportState()], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "dmquiz-backup.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () {
      URL.revokeObjectURL(url);
    }, 0);
  }

  function toast(msg) {
    var t = document.querySelector(".toast");
    if (!t) {
      t = el("div", "toast");
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      t.classList.remove("show");
    }, 1800);
  }

  function installKeyboard() {
    if (keyListenerReady) return;
    keyListenerReady = true;

    document.addEventListener("keydown", function (e) {
      var tag = e.target && e.target.tagName;
      if (view === "settings") return;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (!current || view !== "question") return;

      if (!current.submitted) {
        if (/^[1-9]$/.test(e.key)) {
          var idx = parseInt(e.key, 10) - 1;
          if (idx < current.options.length) {
            e.preventDefault();
            chooseOption(idx);
          }
        } else if (e.key === "Enter") {
          e.preventDefault();
          submitAnswer();
        }
      } else {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          advance();
        }
      }
    });
  }

  window.UI = {
    start: start,
    topicFilter: topicFilter
  };

  start();
})();
</script>
<script>
document.addEventListener("DOMContentLoaded", function () { window.UI.start(); });
</script>
</body>
</html>
