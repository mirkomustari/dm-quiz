<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111827">
<title>DM Quiz v2 — ripasso con ripetizione spaziata</title>
<style>
/* DM Quiz v2 — design system base (card UI, dark, 3 breakpoints) */
:root {
  --bg: #0f1623;
  --card: #1a2333;
  --card2: #212d42;
  --text: #e8edf6;
  --muted: #93a0b4;
  --accent: #6c7bff;
  --accent2: #8b5cf6;
  --green: #22c55e;
  --green-bg: rgba(34, 197, 94, 0.14);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.14);
  --border: #2c3a52;
  --radius: 14px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
}
#app { max-width: 640px; margin: 0 auto; padding: 0 14px 40px; }

.header {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 12px 2px;
  background: linear-gradient(180deg, var(--bg) 85%, transparent);
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.header .hstats { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
.progressbar { height: 4px; background: var(--card2); border-radius: 2px;
  overflow: hidden; margin: -8px 0 14px; }
.progressbar > div { height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.3s; }

.home { display: flex; flex-direction: column; gap: 16px; padding-top: 8vh;
  text-align: center; }
.home h1 { margin: 0; font-size: 1.9rem; letter-spacing: 0.5px;
  background: linear-gradient(90deg, #e8edf6, #b8c2ff, #e8edf6);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% 100%;
  animation: gradientMove 6s ease-in-out infinite; }
.home .sub { color: var(--muted); margin-top: -8px; }
.stats { color: var(--muted); font-size: 0.95rem; }
.stats b { color: var(--text); }

.boxchart { display: flex; gap: 8px; justify-content: center; align-items: flex-end;
  height: 64px; margin: 4px 0; }
.boxchart .bar { width: 44px; background: var(--card2); border-radius: 6px 6px 0 0;
  position: relative; min-height: 4px; }
.boxchart .bar > i { position: absolute; bottom: -20px; left: 0; right: 0;
  font-style: normal; font-size: 0.7rem; color: var(--muted); }
.boxchart .bar.b1 { background: #3b82f6; }
.boxchart .bar.b2 { background: #8b5cf6; }
.boxchart .bar.b3 { background: var(--green); }

.btn {
  display: block; width: 100%;
  background: var(--card); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 15px 18px; font-size: 1rem; font-weight: 500;
  cursor: pointer; transition: transform 0.12s, background 0.15s, border-color 0.15s;
  user-select: none;
}
.btn:active { transform: scale(0.985); }
.btn-primary {
  display: block; width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; font-weight: 700; font-size: 1.1rem; color: #fff;
  box-shadow: 0 10px 28px rgba(108, 123, 255, 0.32), 0 4px 10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-secondary { background: transparent; color: var(--muted); }
.btn-icon { width: 44px; height: 44px; padding: 0; display: flex;
  align-items: center; justify-content: center; font-size: 1.15rem;
  border-radius: 12px; flex: none; }

.qcard { background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.04);
  animation: fadeIn 0.18s ease forwards; }
.topic { display: inline-block; font-size: 0.72rem; text-transform: uppercase;
  letter-spacing: 1px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  padding: 3px 10px; border-radius: 999px; margin-bottom: 10px; }
.qtext { font-size: 1.12rem; line-height: 1.55; margin: 0; }
.multinote { color: var(--accent); font-size: 0.85rem; margin-top: 8px; }

.option {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: var(--card); color: var(--text);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 13px 14px; margin-bottom: 10px; font-size: 0.98rem; line-height: 1.45;
  cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s;
  animation: fadeIn 0.18s ease forwards;
}
.option:active { transform: scale(0.99); }
.option .letter {
  flex: none; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--card2); color: var(--muted); font-weight: 700; font-size: 0.85rem;
}
.option.selected { border-color: var(--accent); background: rgba(108, 123, 255, 0.10); }
.option.selected .letter { background: var(--accent); color: #fff; }
.option.correct { border-color: var(--green); background: var(--green-bg); }
.option.correct .letter { background: var(--green); color: #fff; }
.option.wrong { border-color: var(--red); background: var(--red-bg); }
.option.wrong .letter { background: var(--red); color: #fff; }

.option:nth-child(1) { animation-delay: 0.02s; }
.option:nth-child(2) { animation-delay: 0.05s; }
.option:nth-child(3) { animation-delay: 0.08s; }
.option:nth-child(4) { animation-delay: 0.11s; }
.option:nth-child(5) { animation-delay: 0.14s; }

.verdict { font-size: 1.25rem; font-weight: 700; margin: 12px 0 4px; }
.verdict.ok { color: var(--green); }
.verdict.ko { color: var(--red); }
.note { color: var(--muted); font-size: 0.9rem; font-style: italic; margin: 6px 0 10px; }

.grade-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-top: 12px; }
.grade-row .btn { padding: 10px 6px; font-size: 0.92rem; }
.grade-row .btn small { display: block; color: var(--muted); font-weight: 400;
  font-size: 0.72rem; margin-top: 2px; }
.grade-row .btn.g-again { border-color: var(--red); }
.grade-row .btn.g-easy { border-color: var(--green); }
.kbd-hint { color: var(--muted); font-size: 0.75rem; text-align: center;
  margin-top: 10px; display: none; }
kbd { background: var(--card2); border: 1px solid var(--border); border-radius: 4px;
  padding: 0 5px; font-size: 0.75rem; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--card2); color: var(--text); border: 1px solid var(--border);
  padding: 10px 18px; border-radius: 999px; font-size: 0.9rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 50; }
.toast.show { opacity: 1; }

.settings { display: flex; flex-direction: column; gap: 14px; }
.settings h2 { margin: 6px 0 0; }
.settings .field { display: flex; align-items: center; justify-content: space-between;
  gap: 12px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; }
.settings .field label { font-size: 0.95rem; }
.settings .field small { display: block; color: var(--muted); }
.settings input[type="number"] { width: 86px; background: var(--card2);
  color: var(--text); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; font-size: 1rem; text-align: center; }
.settings .danger { border-color: rgba(239, 68, 68, 0.5); color: var(--red); }

select { background: var(--card); color: var(--text); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 12px; font-size: 0.95rem; max-width: 100%; }
.footer { color: var(--muted); font-size: 0.75rem; text-align: center; margin-top: 30px; }

.btn:focus-visible, .option:focus-visible, select:focus-visible, .settings input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: none; }
}
@keyframes gradientMove {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* tablet */
@media (min-width: 480px) {
  body { font-size: 17px; }
  .home { padding-top: 12vh; }
}
/* desktop */
@media (min-width: 900px) {
  #app { max-width: 720px; }
  .kbd-hint { display: block; }
  .option:hover { border-color: var(--accent); background: #25344f; }
  .btn:hover { border-color: var(--accent); }
  .btn-primary:hover { filter: brightness(1.08); }
}
/* small phones */
@media (max-width: 380px) {
  .grade-row { grid-template-columns: repeat(2, 1fr); }
}

/* ===== iOS/Safari hardening & breathing room ===== */
.btn, .option, select, .settings input[type="number"] {
  -webkit-appearance: none; appearance: none;
}
.btn, .option { min-height: 48px; }
input, select, textarea { font-size: 16px; }   /* stop iOS focus zoom */

/* spacing fallback that does not rely on flex gap */
.home > * + * { margin-top: 14px; }
.settings > * + * { margin-top: 12px; }
.header { padding-top: max(12px, env(safe-area-inset-top)); }
#app { padding-left: max(14px, env(safe-area-inset-left));
       padding-right: max(14px, env(safe-area-inset-right)); }

/* boxchart: visible tracks, labels with room of their own */
.boxchart { height: 72px; margin: 10px 0 30px; }
.boxchart .bar { width: 52px; background: var(--card2); }
.boxchart .bar > i { bottom: -22px; }

/* a bit more air between blocks */
.qcard { margin-bottom: 18px; }
.option { margin-bottom: 12px; }
.grade-row { margin-top: 16px; gap: 10px; }
.home { gap: 14px; }

/* ===== button classes must be self-sufficient (UI uses them standalone) ===== */
.btn-primary, .btn-secondary {
  display: block; width: 100%; min-height: 48px;
  padding: 14px 18px; border-radius: var(--radius);
  font-size: 1.05rem; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  transition: transform 0.12s, filter 0.15s;
}
.btn-secondary { background: transparent; color: var(--muted);
  border: 1px solid var(--border); }
.btn-primary:active, .btn-secondary:active { transform: scale(0.985); }

.hintbox { background: rgba(245, 158, 11, 0.10); border: 1px solid rgba(245, 158, 11, 0.45);
  border-left: 4px solid #f59e0b; border-radius: 10px; padding: 10px 12px;
  font-size: 0.88rem; line-height: 1.45; color: #fbd38d; margin: 10px 0 12px; }
.hintbox b { color: #f59e0b; }
.hintbox small { color: var(--muted); }

/* ===== v3.4: learning-phase translations ===== */
.qtrans { color: var(--muted); font-style: italic; font-size: 0.92rem;
  margin-top: 6px; line-height: 1.45; }
.option .opt-texts { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.option .opt-tr { color: var(--muted); font-style: italic; font-size: 0.82rem;
  line-height: 1.35; }
</style>
</head>

lasse"}, {"key": "B", "text": "The attributes must have negative correlation", "it": "Gli attributi devono avere correlazione negativa"}, {"key": "C", "text": "The attributes must be statistically independent", "it": "Gli attributi devono essere statisticamente indipendenti"}, {"key": "D", "text": "The attributes must have zero correlation", "it": "Gli attributi devono avere correlazione zero"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "⚠️ L'esca C (\"statisticamente indipendenti\" e basta) è quasi identica: la differenza è \"inside each class\" (indipendenza condizionata alla classe). Mnemonica: \"Bayes…", "it_q": "Quale delle seguenti è un'ipotesi di base per un classificatore bayesiano?", "it_a": "Gli attributi devono essere statisticamente indipendenti all'interno di ogni classe"}, {"id": "m004", "topic": "Preprocessing & dati", "text": "In data preparation which is the effect of normalisation?", "options": [{"key": "A", "text": "Map all the numeric attributes to the same range, without altering the distribution, in order to avoid that attributes with large ranges have more influence", "it": "Mappa tutti gli attributi numerici nello stesso intervallo, senza alterare la distribuzione, per evitare che attributi con intervalli ampi abbiano maggiore influenza"}, {"key": "B", "text": "Map all the numeric attributes subtracting the respective mean and dividing by variance", "it": "Mappa tutti gli attributi numerici sottraendo la rispettiva media e dividendo per la varianza"}, {"key": "C", "text": "Map all the numeric attributes to the same range and to have a Gaussian distribution", "it": "Mappa tutti gli attributi numerici nello stesso intervallo e per avere una distribuzione Gaussiana"}, {"key": "D", "text": "Map all the numeric attributes in order to have a Gaussian distribution", "it": "Mappa tutti gli attributi numerici in modo da avere una distribuzione Gaussiana"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Trappola ricorrente: ogni opzione-esca contiene \"Gaussian distribution\" — la normalizzazione NON rende niente gaussiano. Regola: se l'opzione promette una gaussiana, è…", "it_q": "Nella preparazione dei dati qual è l'effetto della normalizzazione?", "it_a": "Mappa tutti gli attributi numerici nello stesso intervallo, senza alterare la distribuzione, per evitare che gli attributi con intervalli grandi abbiano più influenza"}, {"id": "m005", "topic": "BI & DWH", "text": "Check the features of Data Lakes in comparison with Data Warehouses:", "options": [{"key": "A", "text": "Can run on less expensive HW/SW", "it": "Può essere eseguito su HW/SW meno costosi"}, {"key": "B", "text": "Do not enforce data quality", "it": "Non garantiscono la qualità dei dati"}, {"key": "C", "text": "More complex management", "it": "Gestione più complessa"}, {"key": "D", "text": "Completely defined use cases", "it": "Casi d'uso completamente definiti"}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "il lago è economico e ci butti dentro tutto com'è. Le esche sbagliate dicono il contrario dei luoghi comuni: la gestione NON è più complessa per definizione, e i casi…", "it_q": "Verifica le caratteristiche dei Data Lake rispetto ai Data Warehouse:", "it_a": "Possono funzionare su HW/SW meno costosi ; Non garantiscono la qualità dei dati"}, {"id": "m006", "topic": "Classificazione & ML", "text": "What are the hyperparameters of a Neural Network?", "options": [{"key": "A", "text": "Hidden layers structure, Output layer structure, Activation function, Number of epochs", "it": "Struttura dei layer nascosti, Struttura del layer di output, Funzione di attivazione, Numero di epoche"}, {"key": "B", "text": "Network structure, Learning rate, Backpropagation algorithm, Number of epochs", "it": "Struttura della rete, Learning rate, Algoritmo di backpropagation, Numero di epoche"}, {"key": "C", "text": "Input layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura dei layer di input, Learning rate, Funzione di attivazione, Numero di epoche"}, {"key": "D", "text": "Hidden layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura dei layer nascosti, Learning rate, Funzione di attivazione, Numero di epoche"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "\"HLAN\" (suona come \"WLAN con l'H\"). Esche costruite bene: contengono \"Output/Input layer structure\" (vincolati dal problema, non iperparametri) o \"Backpropagation…", "it_q": "Quali sono gli iperparametri di una Neural Network?", "it_a": "Struttura dei layer nascosti, Learning rate, Funzione di attivazione, Numero di epoche"}, {"id": "m007", "topic": "Preprocessing & dati", "text": "Which operations are in the correct sequence?", "options": [{"key": "A", "text": "Extraction, Cleansing, Transformation, Loading", "it": "Estrazione, Pulizia, Trasformazione, Caricamento"}, {"key": "B", "text": "Extraction, Transformation, Cleansing, Loading", "it": "Estrazione, Trasformazione, Pulizia, Caricamento"}, {"key": "C", "text": "Loading, Cleansing, Extraction, Transformation", "it": "Caricamento, Pulizia, Estrazione, Trasformazione"}, {"key": "D", "text": "Transformation, Extraction, Cleansing, Loading", "it": "Trasformazione, Estrazione, Pulizia, Caricamento"}, {"key": "E", "text": "Loading, Transformation, Cleansing, Extraction", "it": "Caricamento, Trasformazione, Pulizia, Estrazione"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Extraction · Cleansing · Transformation · Loading»", "it_q": "Quali operazioni sono nella sequenza corretta?", "it_a": "Estrazione, Pulizia, Trasformazione, Caricamento"}, {"id": "m008", "topic": "Clustering", "text": "With reference to the total sum of squared errors (SSE) and separation (SSB) of a clustering scheme, which of the statements below is true?", "options": [{"key": "A", "text": "They are two ways to measure the same thing", "it": "Sono due modi per misurare la stessa cosa"}, {"key": "B", "text": "They are strictly correlated, if, changing the clustering scheme, one increases, then the other does the same", "it": "Sono strettamente correlati, se, cambiando lo schema di clustering, uno aumenta, allora aumenta anche l'altro"}, {"key": "C", "text": "It is possible to optimise them (i.e. minimise SSE and maximise SSB) separately", "it": "È possibile ottimizzarli (es. minimizzare SSE e massimizzare SSB) separatamente"}, {"key": "D", "text": "They are strictly correlated, if, changing the clustering scheme, one increases, then the other decreases", "it": "Sono strettamente correlati, se, cambiando lo schema di clustering, uno aumenta, allora l'altro diminuisce"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "SSE+SSB = costante (varianza totale dei dati). Vasi comunicanti: comprimi la coesione, sale la separazione. Per questo NON si ottimizzano separatamente (esca C).", "it_q": "Con riferimento alla somma totale degli errori quadratici (SSE) e alla separazione (SSB) di uno schema di clustering, quale delle seguenti affermazioni è vera?", "it_a": "Sono strettamente correlati, se, cambiando lo schema di clustering, uno aumenta, allora l'altro diminuisce"}, {"id": "m009", "topic": "Regressione", "text": "When is polynomial regression appropriate?", "options": [{"key": "A", "text": "When the relationship between the predicting variable and the target cannot be approximated as linear", "it": "Quando la relazione tra la variabile predittiva e il target non può essere approssimata come lineare"}, {"key": "B", "text": "When the target values are not linearly separable", "it": "Quando i valori del target non sono linearmente separabili"}, {"key": "C", "text": "When there is more than one predicting attribute", "it": "Quando c'è più di un attributo predittivo"}, {"key": "D", "text": "When it is necessary to project the data into a dimensional space", "it": "Quando è necessario proiettare i dati in uno spazio dimensionale"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «relationship · between · predicting · variable»", "it_q": "Quando è appropriata la regressione polinomiale?", "it_a": "Quando la relazione tra la variabile predittiva e il target non può essere approssimata come lineare"}, {"id": "m010", "topic": "Clustering", "text": "Which of the following is not a strength point of Dbscan with respect to K-means?", "options": [{"key": "A", "text": "The robustness with respect to outliers", "it": "La robustezza rispetto agli outlier"}, {"key": "B", "text": "The effectiveness, even in presence of noise", "it": "L'efficacia, anche in presenza di rumore"}, {"key": "C", "text": "The effectiveness even if there are clusters with non-convex shape", "it": "L'efficacia anche se ci sono cluster con forma non convessa"}, {"key": "D", "text": "The efficiency even in large datasets", "it": "L'efficienza anche in dataset di grandi dimensioni"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Ricollega all'ancora: il veloce è K-Means; DBSCAN è il fine ma lento. I punti di forza veri di DBSCAN: outlier, rumore, forme non convesse.", "it_q": "Quale dei seguenti non è un punto di forza di Dbscan rispetto a K-means?", "it_a": "L'efficienza anche su dataset di grandi dimensioni"}, {"id": "m011", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Recall?", "options": [{"key": "A", "text": "TP/(TP+FN)", "it": "TP/(TP+FN)"}, {"key": "B", "text": "TN/(TN+FP)", "it": "TN/(TN+FP)"}, {"key": "C", "text": "TP/(TP+FP)", "it": "TP/(TP+FP)"}, {"key": "D", "text": "(TP+TN)/(TP+FP+TN+FN)", "it": "(TP+TN)/(TP+FP+TN+FN)"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le definizioni: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Quale formula calcola la Recall?", "it_a": "TP/(TP+FN)"}, {"id": "m012", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the meaning of \"Schema on read\"?", "options": [{"key": "A", "text": "Write the raw data in the database, then at reading time shape then according to the reader's needs", "it": "Scrivere i dati grezzi nel database, poi al momento della lettura modellarli secondo le esigenze del lettore"}, {"key": "B", "text": "Create a schema for data after reading them from the database", "it": "Creare uno schema per i dati dopo averli letti dal database"}, {"key": "C", "text": "Read the schema of the data before each data read", "it": "Leggere lo schema dei dati prima di ogni lettura dei dati"}, {"key": "D", "text": "Change the schema of the data before each read", "it": "Cambiare lo schema dei dati prima di ogni lettura"}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto).", "it_q": "Parlando del concetto generale di database, qual è il significato di \"Schema on read\"?", "it_a": "Scrivere i dati grezzi nel database, poi al momento della lettura modellarli secondo le esigenze del lettore ; Creare uno schema per i dati dopo averli letti dal database"}, {"id": "m013", "topic": "Regressione", "text": "What is the coefficient of determination R2?", "options": [{"key": "A", "text": "Provide an index of goodness for a linear regression model", "it": "Fornisce un indice di bontà per un modello di regressione lineare"}, {"key": "B", "text": "Measure the amount of error in a linear regression model", "it": "Misura la quantità di errore in un modello di regressione lineare"}, {"key": "C", "text": "Measure the amount of error in a regression model", "it": "Misura la quantità di errore in un modello di regressione"}, {"key": "D", "text": "An index of goodness for a classification model", "it": "Un indice di bontà per un modello di classificazione"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Provide · index · goodness · linear»", "it_q": "Cos'è il coefficiente di determinazione R2?", "it_a": "Fornisce un indice di bontà per un modello di regressione lineare"}, {"id": "m014", "topic": "Clustering", "text": "Which of the statements below is true about K-Means?", "options": [{"key": "A", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters", "it": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster"}, {"key": "B", "text": "K-means always stop to a configuration which gives the minimum distortion for the chosen value of the number of clusters", "it": "K-means si ferma sempre su una configurazione che dà la distorsione minima per il valore scelto del numero di cluster"}, {"key": "C", "text": "K-means works well also with datasets having a very large number of attributes", "it": "K-means funziona bene anche con dataset che hanno un numero molto grande di attributi"}, {"key": "D", "text": "K-means finds the number of clusters which give the minimum distortion", "it": "K-means trova il numero di cluster che dà la distorsione minima"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🤖 KMeans veloce ma pigro: efficiente, sensibile ai centri iniziali, si siede sul primo minimo locale. 'Always' è sempre falso.", "it_q": "Quale delle seguenti affermazioni è vera riguardo a K-Means?", "it_a": "A volte k-means si ferma su una configurazione che non fornisce la distorsione minima per il valore scelto del numero di cluster"}, {"id": "m015", "topic": "BI & DWH", "text": "Check the main objectives pursued when choosing a Data Lake architecture:", "options": [{"key": "A", "text": "Store the data directly from the sources, as they are", "it": "Memorizzare i dati direttamente dalle fonti, così come sono"}, {"key": "B", "text": "The data must be accurately structured, in order to provide fast answers to complex queries", "it": "I dati devono essere strutturati accuratamente, per fornire risposte rapide a query complesse"}, {"key": "C", "text": "The storage must be scalable and cheap, at the expenses of latency", "it": "Lo storage deve essere scalabile ed economico, a scapito della latenza"}, {"key": "D", "text": "Ensure high quality of data through an accurate cleaning and transformation step", "it": "Garantire un'alta qualità dei dati attraverso un'accurata fase di pulizia e trasformazione"}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "Stessa logica del 5: grezzo + economico. Le esche (\"accurately structured\", \"high quality through cleaning\") descrivono il DWH.", "it_q": "Verifica i principali obiettivi perseguiti quando si sceglie un'architettura Data Lake:", "it_a": "Memorizzare i dati direttamente dalle fonti, così come sono ; Lo storage deve essere scalabile ed economico, a scapito della latenza"}, {"id": "m016", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for High dimensional spaces?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance"}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance"}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Quale funzione di distanza è più adatta per spazi ad alta dimensionalità?", "it_a": "Distanza di Manhattan"}, {"id": "m017", "topic": "Classificazione & ML", "text": "When training a neural network, what is the learning rate?", cessing & dati", "text": "Which distance function is best suited for Vectors of terms representing documents?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance"}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance"}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance"}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Quale funzione di distanza è più adatta per vettori di termini che rappresentano documenti?", "it_a": "Distanza coseno"}, {"id": "m021", "topic": "Association Rules", "text": "Which formula computes the Conviction of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)"}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)"}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)"}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))", "it": "(1 - sup(C)) / (1 - conf(A -> C))"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence.", "it_q": "Quale formula calcola la Conviction di una regola (A -> C)?", "it_a": "(1 - sup(C)) / (1 - conf(A -> C))"}, {"id": "m022", "topic": "Preprocessing & dati", "text": "In a dataset with D attributes, how many subsets of attributes should be considered for feature selection according to an exhaustive search?", "options": [{"key": "A", "text": "O(2^D)", "it": "O(2^D)"}, {"key": "B", "text": "O(D!)", "it": "O(D!)"}, {"key": "C", "text": "O(D)", "it": "O(D)"}, {"key": "D", "text": "O(D^2)", "it": "O(D^2)"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "ogni feature o c'è o non c'è → 2·2·2... D volte = 2^D (stesso conto degli itemset).", "it_q": "In un dataset con D attributi, quanti sottoinsiemi di attributi dovrebbero essere considerati per la feature selection secondo una ricerca esaustiva?", "it_a": "O(2^D)"}, {"id": "m023", "topic": "Classificazione & ML", "text": "What is the cross validation?", "options": [{"key": "A", "text": "A technique to obtain a good estimation of the performance of a classifier when it will be used with data different from the training set", "it": "Una tecnica per ottenere una buona stima delle prestazioni di un classificatore quando sarà usato con dati diversi dal training set"}, {"key": "B", "text": "A technique to obtain a good estimation of the performance of a classifier with the training set", "it": "Una tecnica per ottenere una buona stima delle prestazioni di un classificatore con il training set"}, {"key": "C", "text": "A technique to improve the quality of a classifier", "it": "Una tecnica per migliorare la qualità di un classificatore"}, {"key": "D", "text": "A technique to improve the speed of a classifier", "it": "Una tecnica per migliorare la velocità di un classificatore"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Parole chiave: \"estimation\" + \"different from the training set\". Non migliora il classificatore (esche C/D): lo misura.", "it_q": "Cos'è la cross validation?", "it_a": "Una tecnica per ottenere una buona stima delle prestazioni di un classificatore quando sarà utilizzato con dati diversi dal training set"}, {"id": "m024", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when numeric attributes have very diverse ranges of values?", "options": [{"key": "A", "text": "Rescaling", "it": "Rescaling"}, {"key": "B", "text": "Non linear transformations", "it": "Trasformazioni non lineari"}, {"key": "C", "text": "Aggregation", "it": "Aggregazione"}, {"key": "D", "text": "OneHot Encoding", "it": "OneHot Encoding"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "40. Distribuzione skewed (coda lunga) → ? → ✅ B Non linear transformations (il log!).", "it_q": "Quale attività di preprocessing è appropriata quando gli attributi numerici hanno intervalli di valori molto diversi?", "it_a": "Riscalamento"}, {"id": "m025", "topic": "Regressione", "text": "What is the difference between classification and regression?", "options": [{"key": "A", "text": "Classification has a categorical target, while regression has a numeric target", "it": "La classificazione ha un target categorico, mentre la regressione ha un target numerico"}, {"key": "B", "text": "Classification is a supervised activity, while regression in unsupervised", "it": "La classificazione è un'attività supervisionata, mentre la regressione è non supervisionata"}, {"key": "C", "text": "Classification can make errors, while regression is always exact", "it": "La classificazione può commettere errori, mentre la regressione è sempre esatta"}, {"key": "D", "text": "Classification can have a numeric or categorical target, while regression has always a categorical target", "it": "La classificazione può avere un target numerico o categorico, mentre la regressione ha sempre un target categorico"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Classification · categorical · target · while»", "it_q": "Qual è la differenza tra classificazione e regressione?", "it_a": "La classificazione ha un target categorico, mentre la regressione ha un target numerico"}, {"id": "m026", "topic": "Classificazione & ML", "text": "In a decision tree, the number of objects in a node...", "options": [{"key": "A", "text": "... is smaller than the number of objects in its ancestor", "it": "... è minore del numero di oggetti nel suo antenato"}, {"key": "B", "text": "is not related to the number of objects in its ancestor", "it": "non è correlato al numero di oggetti nel suo antenato"}, {"key": "C", "text": "... is smaller incipale dello smoothing nella classificazione bayesiana?", "it_a": "Classificare un oggetto contenente valori di attributi che mancano in alcune classi del training set"}, {"id": "m030", "topic": "Preprocessing & dati", "text": "Which of the following types of data allows the use of the euclidean distance?", "options": [{"key": "A", "text": "Points in a vector space", "it": "Punti in uno spazio vettoriale"}, {"key": "B", "text": "Ordered data", "it": "Dati ordinati"}, {"key": "C", "text": "Transactional data", "it": "Dati transazionali"}, {"key": "D", "text": "Document representations", "it": "Rappresentazioni di documenti"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Quale dei seguenti tipi di dati permette l'uso della distanza euclidea?", "it_a": "Punti in uno spazio vettoriale"}, {"id": "m031", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the meaning of \"Schema on write\"?", "options": [{"key": "A", "text": "Create a schema for data after writing into the database", "it": "Creare uno schema per i dati dopo la scrittura nel database"}, {"key": "B", "text": "Create a schema for data while writing into the database", "it": "Creare uno schema per i dati durante la scrittura nel database"}, {"key": "C", "text": "Change the schema of the data after each write", "it": "Cambiare lo schema dei dati dopo ogni scrittura"}, {"key": "D", "text": "Create a schema for data before writing into the database", "it": "Creare uno schema per i dati prima della scrittura nel database"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto).", "it_q": "Parlando del concetto generale di database, qual è il significato di \"Schema on write\"?", "it_a": "Creare uno schema per i dati prima di scriverli nel database"}, {"id": "m032", "topic": "Classificazione & ML", "text": "A Decision Tree is...", "options": [{"key": "A", "text": "A tree-structured plan of tests on single attributes to forecast the cluster", "it": "Un piano strutturato ad albero di test su singoli attributi per prevedere il cluster"}, {"key": "B", "text": "A tree-structured plan of tests on single attributes to forecast the target", "it": "Un piano strutturato ad albero di test su singoli attributi per prevedere il target"}, {"key": "C", "text": "A tree-structured plan of tests on single attributes to obtain the maximum purity of a node", "it": "Un piano strutturato ad albero di test su singoli attributi per ottenere la massima purezza di un nodo"}, {"key": "D", "text": "A tree-structured plan of tests on multiple attributes to forecast the target", "it": "Un piano strutturato ad albero di test su più attributi per prevedere il target"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Le esche cambiano una parola: \"cluster\" (no, è supervisionato), \"multiple attributes\" (no, un attributo per nodo), \"maximum purity\" (è il mezzo, non il fine).", "it_q": "Un albero decisionale è...", "it_a": "Un piano strutturato ad albero di test su singoli attributi per prevedere il target"}, {"id": "m033", "topic": "Preprocessing & dati", "text": "In order to reduce the dimensionality of a dataset, which is the advantage of Multi Dimensional Scaling (MDS) with respect to PCA?", "options": [{"key": "A", "text": "MDS requires less computational power", "it": "MDS richiede meno potenza computazionale"}, {"key": "B", "text": "MDS can be used also with categorical data, provided that the matrix of the distance is available, while PCA is limited to vector spaces", "it": "MDS può essere usato anche con dati categorici, a condizione che la matrice delle distanze sia disponibile, mentre PCA è limitata agli spazi vettoriali"}, {"key": "C", "text": "MDS can be used with categorical data after a transformation in a vector space", "it": "MDS può essere usato con dati categorici dopo una trasformazione in uno spazio vettoriale"}, {"key": "D", "text": "MDS can work on any kind of data, while PCA is limited to categorical data", "it": "MDS può funzionare su qualsiasi tipo di dati, mentre PCA è limitata ai dati categorici"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "MDS = \"Mi Dai le Distanze?\" — a MDS bastano le distanze, non servono coordinate.", "it_q": "Per ridurre la dimensionalità di un dataset, qual è il vantaggio di Multi Dimensional Scaling (MDS) rispetto a PCA?", "it_a": "MDS può essere usato anche con dati categorici, a condizione che la matrice delle distanze sia disponibile, mentre PCA è limitata agli spazi vettoriali"}, {"id": "m034", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when a nominal attribute needs to be used as predicting (sklearn)?", "options": [{"key": "A", "text": "Rescaling", "it": "Riscalamento"}, {"key": "B", "text": "Non linear transformations", "it": "Trasformazioni non lineari"}, {"key": "C", "text": "Aggregation", "it": "Aggregazione"}, {"key": "D", "text": "OneHot Encoding", "it": "OneHot Encoding"}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "72-71. Categorico con troppi valori distinti → ? → ✅ C Aggregation (raggruppi i valori).", "it_q": "Quale attività di preprocessing è appropriata quando un attributo nominale deve essere usato come predittivo (sklearn)?", "it_a": "OneHot Encoding"}, {"id": "m035", "topic": "Preprocessing & dati", "text": "Which of the following statements is true?", "options": [{"key": "A", "text": "The data which are similar to the majority are never noise", "it": "I dati simili alla maggioranza non sono mai rumore"}, {"key": "B", "text": "The noise always generate outliers", "it": "Il rumore genera sempre outlier"}, {"key": "C", "text": "Outliers can be due to noise", "it": "Gli outlier possono essere dovuti al rumore"}, {"key": "D", "text": "The noise can generate outliers", "it": "Il rumore può generare outlier"}], "correct": ["C", "D"], "note": "", "source": "banco 2026", "hint": "le opzioni con \"always/never\" sono quasi sempre false; quelle con \"can\" quasi sempre vere. Qui funziona alla perfezione.", "it_q": "Quale delle seguenti affermazioni è vera?", "it_a": "Gli outlier possono essere dovuti al rumore ; Il rumore può generare outlier"}, {"id": "m036", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Drill-Across\"?", "options": [{"key": "A", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico"}, {"key": "B", "text": "Creates a link between concepts in interrelated cubes, in order to compare them", "it": "Crea un collegamento tra concetti in cubi interrelati, al fine di confrontarli"}, {"key": "C", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia"}, {"key": "D", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia il layout, al fine di analizzare un gruppo di dati da un punto di vista diverso"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle definizioni seguenti descrive l'operazione OLAP \"Drill-Across\"?", "it_a": "Crea un collegamento tra concetti in cubi interrelati, al fine di confrontarli"}, {"id": "m037", "topic": "Clustering", "text": "What is the first step in agglomerative clustering?", "options": [{"key": "A", "text": "Cutting the Dendrogram", "it": "Taglio del Dendrogram"}, {"key": "B", "text": "Pairwise Cluster Similarity Calculation", "it": "Calcolo della similarità pairwise tra cluster"}, {"key": "C", "text": "Initialization: Start with each data point as a singleton cluster", "it": "Inizializzazione: iniziare con ogni punto dati come singleton cluster"}, {"key": "D", "text": "Cluster Assignment", "it": "Assegnazione ai cluster"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "62-61. Come si decide il numero di cluster → ✅ B (tagliando il dendrogramma a una certa altezza).", "it_q": "Qual è il primo passo nel clustering agglomerativo?", "it_a": "Inizializzazione: Iniziare con ogni punto dati come cluster singleton"}, {"id": "m038", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Extraction step?", "options": [{"key": "A", "text": "Elimination of duplicates", "it": "Eliminazione dei duplicati"}, {"key": "B", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali"}, {"key": "C", "text": "Association of a timestamp to the operational data", "it": "Associazione di un timestamp ai dati operazionali"}, {"key": "D", "text": "Usage of dictionaries to solve inconsistencies", "it": "Utilizzo di dizionari per risolvere le inconsistenze"}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Estrazione?", "it_a": "Snapshot dei dati operativi ; Associazione di un timestamp ai dati operativi"}, {"id": "m039", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the confidence of the rule B -> E?", "options": [{"key": "A", "text": "100%", "it": "100%"}, {"key": "B", "text": "50%", "it": "50%"}, {"key": "C", "text": "33%", "it": "33%"}, {"key": "D", "text": "20%", "it": "20%"}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Qual è la confidence della regola B -> E?", "it_a": "33%"}, {"id": "m040", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when an attribute has a very skewed distribution (long tail)?", "options": [{"key": "A", "text": "Rescaling", "it": "Riscalamento"}, {"key": "B", "text": "Non linear transformations", "it": "Trasformazioni non lineari"}, {"key": "C", "text": "Aggregation", "it": "Aggregazione"}, {"key": "D", "text": "OneHot Encoding", "it": "OneHot Encoding"}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «linear · transformations»", "it_q": "Quale attività di preprocessing è appropriata quando un attributo ha una distribuzione molto skewed (long tail)?", "it_a": "Trasformazioni non lineari"}, {"id": "m041", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the confidence of the rule A,C -> B?", "options": [{"key": "A", "text": "50%", "it": "50%"}, {"key": "B", "text": "40%", "it": "40%"}, {"key": "C", "text": "20%", "it": "20%"}, {"key": "D", "text": "100%", "it": "100%"}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Qual è la confidence della regola A,C -> B?", "it_a": "50%"}, {"id": "m042", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operati
