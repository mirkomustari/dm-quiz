🏆 Torneo: si parte singoli, si fondono i più vicini (serve distanza tra SET=linkage), tabellone=dendrogramma, k=dove lo tagli.", "it_q": "Come si determina il numero di cluster nell'agglomerative clustering?", "it_a": "Tagliando il dendrogram a una certa altezza", "cue": "🔮 Cerca «dendrogram», «certain»: compare SOLO nella giusta."}, {"id": "m063", "topic": "BI & DWH", "text": "Talking about ETL, which of the following activities is related to the Cleansing step?", "options": [{"key": "A", "text": "Elimination of duplicates", "it": "Eliminazione dei duplicati", "why": "sì: eliminare duplicati è attività di cleansing."}, {"key": "B", "text": "Association of a timestamp to the operational data", "it": "Associazione di un timestamp ai dati operazionali", "why": "no: timestamp dei dati operazionali appartiene a extraction."}, {"key": "C", "text": "Usage of dictionaries to solve inconsistencies", "it": "Uso di dizionari per risolvere le inconsistenze", "why": "sì: dizionari correggono inconsistenze nel cleansing."}, {"key": "D", "text": "Snapshot of the operational data", "it": "Snapshot dei dati operazionali", "why": "no: snapshot operativo è extraction."}], "correct": ["A", "C"], "note": "", "source": "banco 2026", "hint": "🏭 Trasloco ECTL: Extraction=foto+timestamp · Cleansing=doppioni+dizionari · Transformation=denormalizza+derivati. Ordine: Eddy Cleans The Lab.", "it_q": "Parlando di ETL, quale delle seguenti attività è correlata alla fase di Cleansing?", "it_a": "Eliminazione dei duplicati ; Utilizzo di dizionari per risolvere le inconsistenze", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 2"}, {"id": "m064", "topic": "Clustering", "text": "Which of the statements below is true about K-Means?", "options": [{"key": "A", "text": "K-mean always stops to a configuration which gives the minimum distortion for the chosen value of the number of clusters", "it": "K-mean si ferma sempre su una configurazione che dà la distorsione minima per il valore scelto del numero di cluster", "why": "no: K-Means non garantisce minimo globale della distortion."}, {"key": "B", "text": "K-means is very sensitive to the initial assignment of the centers", "it": "K-means è molto sensibile all'assegnazione iniziale dei centri", "why": "sì: centri iniziali influenzano fortemente il risultato."}, {"key": "C", "text": "K-means is quite efficient even for large datasets", "it": "K-means è abbastanza efficiente anche per dataset di grandi dimensioni", "why": "sì: K-Means è computazionalmente efficiente su grandi dataset."}, {"key": "D", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters", "it": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster", "why": "sì: può fermarsi in minimi locali non ottimali."}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026", "hint": "🤖 KMeans veloce ma pigro: efficiente, sensibile ai centri iniziali, si siede sul primo minimo locale. 'Always' è sempre falso.", "it_q": "Quale delle seguenti affermazioni è vera riguardo a K-Means?", "it_a": "K-means è molto sensibile all'assegnazione iniziale dei centri ; K-means è abbastanza efficiente anche per dataset di grandi dimensioni ; A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster", "cue": "🔮 Cerca «k-means»: compare SOLO nella/e giusta/e. · giuste: 3"}, {"id": "m065", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of K-Means?", "options": [{"key": "A", "text": "Presence of values with high frequency", "it": "Presenza di valori con alta frequenza", "why": "no: frequenze alte non sono il problema tipico dei centroidi."}, {"key": "B", "text": "Presence of outliers", "it": "Presenza di outlier", "why": "sì: outlier trascinano le medie e deformano i cluster."}, {"key": "C", "text": "All the variables have the same distribution of values", "it": "Tutte le variabili hanno la stessa distribuzione di valori", "why": "no: distribuzioni uguali non riducono tipicamente efficacia."}, {"key": "D", "text": "All the variables have the same range of values", "it": "Tutte le variabili hanno lo stesso intervallo di valori", "why": "no: stesso range aiuta, non penalizza K-Means."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "i centroidi sono medie, e le medie si fanno trascinare dagli outlier.", "it_q": "Quale delle seguenti caratteristiche dei dati può ridurre l'efficacia di K-Means?", "it_a": "Presenza di outlier", "cue": "🔮 Cerca «outliers»: compare SOLO nella giusta."}, {"id": "m066", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Precision?", "options": [{"key": "A", "text": "TP/(TP+FP)", "it": "TP/(TP+FP)", "why": "sì: Precision = TP diviso predetti positivi TP+FP."}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)", "it": "(TP+TN)/(TP+FP+TN+FN)", "why": "no: questa è Accuracy."}, {"key": "C", "text": "TN/(TN+FP)", "it": "TN/(TN+FP)", "why": "no: questa è specificità, non Precision."}, {"key": "D", "text": "TP/(TP+FN)", "it": "TP/(TP+FN)", "why": "no: questa è Recall."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le definizioni: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Quale formula calcola la Precision?", "it_a": "TP/(TP+FP)", "cue": "🔮 L'unica che INIZIA con «TP/(TP+FP…»."}, {"id": "m067", "topic": "Preprocessing & dati", "text": "Which of the following is not an objective of feature selection?", "options": [{"key": "A", "text": "Select the features with higher range, which have more influence on the computation", "it": "Seleziona le feature con intervallo maggiore, che hanno più influenza sul calcolo", "why": "sì: range alto non implica feature importante."}, {"key": "B", "text": "Reduce time and memory complexity of the mining algorithms", "it": "Riduci la complessità temporale e di memoria degli algoritmi di mining", "why": "no: ridurre complessità è obiettivo della feature selection."}, {"key": "C", "text": "Reduce the effect of noise", "it": "Riduci l'effetto del rumore", "why": "no: ridurre rumore è obiettivo della feature selection."}, {"key": "D", "text": "Avoid the curse of dimensionality", "it": "Evita la maledizione della dimensionalità", "why": "no: evitare curse of dimensionality è obiettivo centrale."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "il range non c'entra nulla con l'importanza (anzi, è il motivo per cui si scala!). Gli obiettivi veri: meno tempo/memoria, meno rumore, meno curse of dimensionality.", "it_q": "Quale dei seguenti non è un obiettivo della feature selection?", "it_a": "Seleziona le feature con range maggiore, che hanno più influenza sul calcolo", "cue": "🔮 Cerca «computation», «influence»: compare SOLO nella giusta."}, {"id": "m068", "topic": "Association Rules", "text": "Which formula computes the Lift of a rule (A -> C)?", "options": [{"key": "A", "text": "sup(A U C) - sup(A)sup(C)", "it": "sup(A U C) - sup(A)sup(C)", "why": "no: questa formula è Leverage."}, {"key": "B", "text": "conf(A -> C) / sup(C)", "it": "conf(A -> C) / sup(C)", "why": "sì: Lift = confidenza divisa supporto del conseguente."}, {"key": "C", "text": "sup(A -> C) / sup(A)", "it": "sup(A -> C) / sup(A)", "why": "no: questa formula è Confidence."}, {"key": "D", "text": "(1 - sup(C)) / (1 - conf(A -> C))", "it": "(1 - sup(C)) / (1 - conf(A -> C))", "why": "no: questa formula è Conviction."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧪 Riconosci la forma: MENO secco=Leverage · doppio (1−…)=Conviction · conf/sup(C)=Lift · sup(regola)/sup(A)=Confidence.", "it_q": "Quale formula calcola il Lift di una regola (A -> C)?", "it_a": "conf(A -> C) / sup(C)", "cue": "🔮 L'unica che INIZIA con «conf…» e FINISCE con «…C) / sup(C)»."}, {"id": "m069", "topic": "Clustering", "text": "What measure is maximised by the Expectation Masimisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood the distributions, defined by the parameters found, given the data available", "it": "La likelihood delle distribuzioni, definite dai parametri trovati, dati i dati disponibili", "why": "sì: EM massimizza likelihood dei parametri dati i dati."}, {"key": "B", "text": "The likelihood of an example", "it": "La likelihood di un esempio", "why": "no: non massimizza likelihood di un singolo esempio."}, {"key": "C", "text": "The support of a class", "it": "Il support di una classe", "why": "no: supporto di classe riguarda classificazione/regole."}, {"key": "D", "text": "The likelihood of an attribute, given the class label", "it": "La likelihood di un attributo, dato il class label", "why": "no: likelihood attributo dato classe è Naive Bayes."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «likelihood · distributions · defined · parameters»", "it_q": "Quale misura viene massimizzata dall'algoritmo Expectation Maximisation per il clustering?", "it_a": "La likelihood delle distribuzioni, definite dai parametri trovati, dato i dati disponibili", "cue": "🔮 Cerca «distributions», «parameters»: compare SOLO nella giusta."}, {"id": "m070", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the operations below performs aggregation?", "options": [{"key": "A", "text": "Combination of two attributes in order to obtain a more general attribute with smaller variability", "it": "Combinazione di due attributi per ottenere un attributo più generale con minore variabilità", "why": "no: combina attributi, non aggrega righe o valori."}, {"key": "B", "text": "Reduction of the number of distinct values of an attribute in order to reduce its variability", "it": "Riduzione del numero di valori distinti di un attributo per ridurne la variabilità", "why": "sì: meno valori distinti significa aggregazione categoriale."}, {"key": "C", "text": "Reduction of the number of rows of the dataset by applying a grouping on one or more attributes and computing the measures as the results of aggregation functions", "it": "Riduzione del numero di righe del dataset tramite raggruppamento su uno o più attributi e calcolo delle misure come risultati di funzioni di aggregazione", "why": "sì: grouping più funzioni aggregate riducono le righe."}, {"key": "D", "text": "Combination of two or more datasets in order to obtain more Information", "it": "Combinazione di due o più dataset per ottenere maggiori informazioni", "why": "no: combinare dataset è integrazione, non aggregazione."}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "In data preprocessing, quale delle operazioni seguenti esegue l'aggregazione?", "it_a": "Riduzione del numero di valori distinti di un attributo per ridurne la variabilità ; Riduzione del numero di righe del dataset applicando un raggruppamento su uno o più attributi e calcolando le misure come risultato di funzioni di aggregazione", "cue": "🔮 Cerca «reduction», «number»: compare SOLO nella/e giusta/e. · giuste: 2"}, {"id": "m071", "topic": "BI & DWH", "text": "What is Data Ingestion?", "options": [{"key": "A", "text": "A process that copies data from sources to a repository, taking care of possible differences in speed between the generation and the storing process", "it": "Un processo che copia i dati dalle sorgenti a un repository, tenendo conto di possibili differenze di velocità tra generazione e memorizzazione", "why": "sì: ingestion copia dati gestendo velocità sorgente-repository."}, {"key": "B", "text": "A process that copies data from sources to a repository, ensuring high data quality", "it": "Un processo che copia i dati dalle sorgenti a un repository, garantendo alta qualità dei dati", "why": "no: qualità alta riguarda cleansing, non ingestion."}, {"key": "C", "text": "A process that copies data from sources to a repository, making the transformation required by the users", "it": "Un processo che copia i dati dalle sorgenti a un repository, effettuando le trasformazioni richieste dagli utenti", "why": "no: trasformazioni utente appartengono a transformation."}, {"key": "D", "text": "A process that copies data from sources to a Data Warehouse guaranteeing the correctness of data with respect to the schema", "it": "Un processo che copia i dati dalle sorgenti a un Data Warehouse garantendo la correttezza dei dati rispetto allo schema", "why": "no: correttezza schema DWH riguarda ETL/cleansing."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "*ingestione = boccone*: il problema è non strozzarsi quando il cibo arriva troppo in fretta (velocità!), non la qualità del cibo (esche: quality, transformation, correctness).", "it_q": "Che cos'è la Data Ingestion?", "it_a": "Un processo che copia i dati dalle sorgenti a un repository, gestendo le possibili differenze di velocità tra generazione e memorizzazione", "cue": "🔮 Cerca «differences», «generation»: compare SOLO nella giusta."}, {"id": "m072", "topic": "Preprocessing & dati", "text": "Which preprocessing activity is appropriate when a categorical attribute has a too large number of distinct values?", "options": [{"key": "A", "text": "Rescaling", "it": "Riscalamento", "why": "no: rescaling serve numerici, non cardinalità categoriale."}, {"key": "B", "text": "Non linear transformations", "it": "Trasformazioni non lineari", "why": "no: trasformazioni non lineari servono distribuzioni numeriche skewed."}, {"key": "C", "text": "Aggregation", "it": "Aggregazione", "why": "sì: aggregazione accorpa categorie e riduce valori distinti."}, {"key": "D", "text": "OneHot Encoding", "it": "OneHot Encoding", "why": "no: OneHot con troppe categorie esplode dimensionalità."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Aggregation»", "it_q": "Quale attività di preprocessing è appropriata quando un attributo categorico ha un numero troppo elevato di valori distinti?", "it_a": "Aggregazione", "cue": "🔮 Cerca «aggregation»: compare SOLO nella giusta."}, {"id": "m073", "topic": "Clustering", "text": "Which of the statements below about Hierarchical Agglomerative Clustering is true?", "options": [{"key": "A", "text": "Requires the definition of Inertia of clusters", "it": "Richiede la definizione dell'inerzia dei cluster", "why": "no: inertia è tipica di K-Means."}, {"key": "B", "text": "Requires the definition of distance between sets of objects", "it": "Richiede la definizione della distanza tra insiemi di oggetti", "why": "sì: serve linkage, distanza tra insiemi di oggetti."}, {"key": "C", "text": "Is very efficient also with large datasets", "it": "È molto efficiente anche con dataset di grandi dimensioni", "why": "no: gerarchico agglomerativo scala male su grandi dataset."}, {"key": "D", "text": "Is based on a well founded statistical model", "it": "Si basa su un modello statistico ben fondato", "why": "no: non è basato su modello statistico fondato."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "se due attributi sono dipendenti (correlati), ne togli uno → la feature selection rimuove la ridondanza che viola l'ipotesi.", "it_q": "Quale delle seguenti affermazioni sull'Hierarchical Agglomerative Clustering è vera?", "it_a": "Richiede la definizione di distanza tra insiemi di oggetti", "cue": "🔮 Cerca «distance», «between»: compare SOLO nella giusta."}, {"id": "m074", "topic": "Classificazione & ML", "text": "Which of the following preprocessing activities is useful to build a Naive Bayes classifier if the independence hypothesis is violated?", "options": [{"key": "A", "text": "Discretisation", "it": "Discretizzazione", "why": "no: discretizzazione non risolve dipendenza tra attributi."}, {"key": "B", "text": "Normalisation", "it": "Normalizzazione", "why": "no: normalizzazione cambia scala, non indipendenza."}, {"key": "C", "text": "Standardisation", "it": "Standardizzazione", "why": "no: standardizzazione cambia media/varianza, non correlazioni."}, {"key": "D", "text": "Feature selection", "it": "Selezione delle feature", "why": "sì: feature selection rimuove attributi ridondanti/dipendenti."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "gli attributi forti l'albero li usa SUBITO (in alto). Chi gioca solo nei bassifondi conta poco. (Esca A \"irrilevante\" è troppo assoluta — poco ≠ niente.)", "it_q": "Quale delle seguenti attività di preprocessing è utile per costruire un Naive Bayes classifier se l'ipotesi di indipendenza è violata?", "it_a": "Feature selection", "cue": "🔮 Cerca «selection», «feature»: compare SOLO nella giusta."}, {"id": "m075", "topic": "Classificazione & ML", "text": "In a decision tree, an attribute which is used only in nodes near the leaves...", "options": [{"key": "A", "text": "... is irrelevant with respect to the target", "it": "... è irrilevante rispetto al target", "why": "no: vicino alle foglie significa poco utile, non irrilevante."}, {"key": "B", "text": "guarantees high increment of purity", "it": "garantisce un alto incremento di purezza", "why": "no: alto incremento di purezza appare vicino alla radice."}, {"key": "C", "text": "... gives little insight with respect to the target", "it": "... fornisce poca informazione rispetto al target", "why": "sì: uso tardivo indica poco insight sul target."}, {"key": "D", "text": "... has a high correlation with respect to the target", "it": "... ha un'alta correlazione rispetto al target", "why": "no: alta correlazione porterebbe split più alti."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «gives · little · insight · respect»", "it_q": "In un decision tree, un attributo che viene usato solo nei nodi vicini alle foglie...", "it_a": "... fornisce poco insight rispetto al target", "cue": "🔮 Cerca «insight», «little»: compare SOLO nella giusta."}, {"id": "m076", "topic": "Preprocessing & dati", "text": "Which of the following is not a property of a metric distance function?", "options": [{"key": "A", "text": "Symmetry", "it": "Simmetria", "why": "no: simmetria è proprietà richiesta di una metrica."}, {"key": "B", "text": "Positive definiteness", "it": "Definita positiva", "why": "no: positività/definitezza positiva è proprietà metrica."}, {"key": "C", "text": "Triangle inequality", "it": "Disuguaglianza triangolare", "why": "no: disuguaglianza triangolare è proprietà metrica."}, {"key": "D", "text": "Boundedness", "it": "Limitatezza", "why": "sì: una metrica non deve essere limitata superiormente."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "le proprietà vere sono Simmetria, Positività, Triangolo (\"SPT come SPeedTest\"). La limitatezza non è richiesta: la distanza può crescere all'infinito.", "it_q": "Quale dei seguenti non è una proprietà di una funzione di distanza metrica?", "it_a": "Boundedness", "cue": "🔮 Cerca «boundedness»: compare SOLO nella giusta."}, {"id": "m077", "topic": "Preprocessing & dati", "text": "Which distance function is best suited for Boolean data?", "options": [{"key": "A", "text": "Euclidean distance", "it": "Distanza euclidea", "why": "no: Euclidea adatta a reali, non booleani."}, {"key": "B", "text": "Cosine distance", "it": "Distanza coseno", "why": "no: Coseno misura angoli, tipico documenti."}, {"key": "C", "text": "Manhattan distance", "it": "Distanza di Manhattan", "why": "no: Manhattan utile alta dimensione, non booleani."}, {"key": "D", "text": "Jaccard coefficient", "it": "Coefficiente di Jaccard", "why": "sì: Jaccard confronta presenze booleane ignorando assenze comuni."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Quale funzione di distanza è più adatta per dati booleani?", "it_a": "Coefficiente di Jaccard", "cue": "🔮 Cerca «coefficient», «jaccard»: compare SOLO nella giusta."}, {"id": "m078", "topic": "Regressione", "text": "How can we measure the quality of a trained regression model?", "options": [{"key": "A", "text": "With a formula elaborating the difference between the forecast values and the true ones", "it": "Con una formula che calcola la differenza tra i valori previsti e quelli reali", "why": "sì: Regressione valuta errori tra predetti e reali."}, {"key": "B", "text": "With a confusion matrix", "it": "Con una matrice di confusione", "why": "no: Confusion matrix serve per classificazione."}, {"key": "C", "text": "Counting the number of values correctly forecast", "it": "Contando il numero di valori previsti correttamente", "why": "no: Conteggio corretti vale per classi discrete."}, {"key": "D", "text": "With precision, recall and accuracy", "it": "Con precisione, recall e accuratezza", "why": "no: Precision, recall, accuracy sono metriche classificative."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Esche: confusion matrix / precision-recall / conteggio dei corretti — tutte cose da classificazione. Regola: \"la regressione si giudica a distanza, la classificazione a conteggio\".", "it_q": "Come si può misurare la qualità di un modello di regressione addestrato?", "it_a": "Con una formula che elabora la differenza tra i valori previsti e quelli reali", "cue": "🔮 Cerca «elaborating», «difference»: compare SOLO nella giusta."}, {"id": "m079", "topic": "Association Rules", "text": "Which of the following statements regarding the discovery of association rules is true?", "options": [{"key": "A", "text": "The confidence of a rule can be computed starting from the supports of the itemsets", "it": "La confidence di una regola può essere calcolata a partire dai support degli itemset", "why": "sì: Confidence deriva dai supporti degli itemset coinvolti."}, {"key": "B", "text": "The support of an itemset is anti-monotonic with respect to the composition of the itemset", "it": "Il support di un itemset è anti-monotono rispetto alla composizione dell'itemset", "why": "sì: Supporto diminuisce aggiungendo item: proprietà anti-monotona."}, {"key": "C", "text": "The support of a rule can be computed given the confidence of the rule", "it": "Il support di una regola può essere calcolato data la confidence della regola", "why": "no: Dal confidence non ricavi direttamente il supporto."}, {"key": "D", "text": "The confidence of an itemset is anti-monotonic with respect to the composition of the itemset", "it": "La confidence di un itemset è anti-monotona rispetto alla composizione dell'itemset", "why": "no: Confidence non è anti-monotona sugli itemset."}], "correct": ["A", "B"], "note": "", "source": "banco 2026", "hint": "False: \"il support si ricava dalla confidence\" (verso sbagliato) e \"la confidence è anti-monotona\" (non lo è!). Memo: \"il SUPPORT è la materia prima\" — da lui derivi tutto, lui non si deriva; e l'anti-monotonia è SUA, non della confidence.", "it_q": "Quale delle seguenti affermazioni riguardanti la scoperta di regole di associazione è vera?", "it_a": "La confidence di una regola può essere calcolata a partire dai support degli itemset ; Il support di un itemset è anti-monotono rispetto alla composizione dell'itemset", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 2"}, {"id": "m080", "topic": "Clustering", "text": "Which of the statements below is true regarding DBSCAN?", "options": [{"key": "A", "text": "Increasing the radius of the neighbourhood can decrease the number of noise points", "it": "Aumentando il raggio del vicinato si può diminuire il numero di punti di rumore", "why": "sì: Eps maggiore può includere punti prima rumorosi."}, {"key": "B", "text": "DBSCAN always stops to a configuration which gives the optimal number of clusters", "it": "DBSCAN si ferma sempre a una configurazione che fornisce il numero ottimale di cluster", "why": "no: DBSCAN non garantisce numero cluster ottimale."}, {"key": "C", "text": "Sometimes DBSCAN stops to a configuration which does not include any cluster", "it": "A volte DBSCAN si ferma a una configurazione che non include alcun cluster", "why": "sì: Parametri severi possono produrre solo rumore."}, {"key": "D", "text": "DBscan can give good performance when clusters have concavities", "it": "DBSCAN può dare buone prestazioni quando i cluster hanno concavità", "why": "sì: Densità consente cluster concavi non sferici."}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026", "hint": "Falsa sempre: \"DBSCAN always stops to the optimal number of clusters\" (di nuovo la regola dell'always).", "it_q": "Quale delle seguenti affermazioni è vera riguardo a DBSCAN?", "it_a": "Aumentare il raggio del vicinato può diminuire il numero di punti di rumore ; A volte DBSCAN si ferma su una configurazione che non include alcun cluster ; DBSCAN può dare buone performance quando i cluster hanno concavità", "cue": "🔮 Scarta chi esagera: 1 sbagliata contiene always/never/exactly. · giuste: 3"}, {"id": "m081", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Drill-Down\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia", "why": "sì: Drill-down scende: meno aggregazione, più dettaglio."}, {"key": "B", "text": "Creates a link between concepts in interrelated cubes, to compare them", "it": "Crea un collegamento tra concetti in cubi correlati, per confrontarli", "why": "no: Questo è drill-across tra cubi correlati."}, {"key": "C", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia la disposizione, per analizzare un gruppo di dati da un punto di vista diverso", "why": "no: Cambio layout è pivot."}, {"key": "D", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy", "it": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia", "why": "no: Questo è roll-up, più aggregazione."}, {"key": "E", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver impostato una delle dimensioni a un valore specifico", "why": "no: Fissare dimensione è slice/dice."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle seguenti definizioni descrive l'operazione OLAP \"Drill-Down\"?", "it_a": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia", "cue": "🔮 Cerca «adds»: compare SOLO nella giusta."}, {"id": "m082", "topic": "Clustering", "text": "What is the purpose of updating the similarity matrix in agglomerative clustering?", "options": [{"key": "A", "text": "To calculate the pairwise similarity or distance between all clusters", "it": "Per calcolare la similarità o distanza a coppie tra tutti i cluster", "why": "no: Matrice iniziale calcola distanze tra cluster."}, {"key": "B", "text": "To reflect the changes after merging clusters", "it": "Per riflettere i cambiamenti dopo l'unione dei cluster", "why": "sì: Aggiorna distanze dopo la fusione dei cluster."}, {"key": "C", "text": "To assign each data point to a cluster based on the final structure obtained from the dendrogram", "it": "Per assegnare ogni punto dati a un cluster in base alla struttura finale ottenuta dal dendrogramma", "why": "no: Assegnazione finale non aggiorna la matrice."}, {"key": "D", "text": "To determine the distance or similarity between clusters", "it": "Per determinare la distanza o similarità tra i cluster", "why": "no: Definire distanza è scopo del linkage."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "73-72. Verità sull'agglomerative → ✅ B (richiede la definizione di distanza tra insiemi di oggetti — i linkage!).", "it_q": "Qual è lo scopo dell'aggiornamento della matrice di similarità nel clustering agglomerativo?", "it_a": "Per riflettere i cambiamenti dopo l'unione dei cluster", "cue": "🔮 Cerca «changes», «merging»: compare SOLO nella giusta."}, {"id": "m083", "topic": "Classificazione & ML", "text": "The Information Gain is used to...", "options": [{"key": "A", "text": "Select the attribute which maximises, for a given training set, the ability to predict the class value", "it": "Seleziona l'attributo che massimizza, per un dato training set, la capacità di predire il valore della classe", "why": "sì: Sceglie attributo più predittivo sul training set."}, {"key": "B", "text": "Select the attribute which maximises, for a given test set, the ability to predict the class value", "it": "Seleziona l'attributo che massimizza, per un dato test set, la capacità di predire il valore della classe", "why": "no: Il test set non guida la scelta."}, {"key": "C", "text": "Select the attribute which maximises, for a given training set, the ability to predict all the other attribute values", "it": "Seleziona l'attributo che massimizza, per un dato training set, la capacità di predire tutti gli altri valori degli attributi", "why": "no: Predice la classe, non altri attributi."}, {"key": "D", "text": "Select the class with maximum probability", "it": "Seleziona la classe con probabilità massima", "why": "no: Non seleziona direttamente la classe massima."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Select · attribute · maximises · given»", "it_q": "L'Information Gain è usato per...", "it_a": "Selezionare l'attributo che massimizza, per un dato training set, la capacità di predire il valore della classe", "cue": "🔮 Scarta chi esagera: 1 sbagliata contiene always/never/exactly."}, {"id": "m084", "topic": "Classificazione & ML", "text": "In which mining activity can the Information Gain be useful?", "options": [{"key": "A", "text": "Discovery of association rules", "it": "Scoperta di regole di associazione", "why": "no: Regole associative usano supporto e confidence."}, {"key": "B", "text": "Classification", "it": "Classificazione", "why": "sì: Information Gain seleziona split nei classificatori."}, {"key": "C", "text": "Clustering", "it": "Clustering", "why": "no: Clustering non usa classi supervisionate."}, {"key": "D", "text": "Discretization", "it": "Discretizzazione", "why": "no: Discretizzazione non è uso principale qui."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "89-88. Alternativa all'Information Gain → ✅ B Gini Index.", "it_q": "In quale attività di mining può essere utile l'Information Gain?", "it_a": "Classificazione", "cue": "🔮 Cerca «classification»: compare SOLO nella giusta."}, {"id": "m085", "topic": "Preprocessing & dati", "text": "Given the two binary vectors below, which is their similarity according to the Jaccard Coefficient? 1000101101 1011101010", "options": [{"key": "A", "text": "0.1", "it": "0.1", "why": "no: 0.1 non rispetta M11 su unione."}, {"key": "B", "text": "0.2", "it": "0.2", "why": "no: 0.2 sottostima la similarità Jaccard."}, {"key": "C", "text": "0.5", "it": "0.5", "why": "no: 0.5 conta male le coppie 0-0."}, {"key": "D", "text": "0.375", "it": "0.375", "why": "sì: M11=3, unione=8, Jaccard=0.375."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Metodo: Jaccard ignora le coppie 0-0: conta M11/(M11+M01+M10) = 3/8 = 0.375.", "it_q": "Date le due seguenti sequenze binarie, qual è la loro similarità secondo il Jaccard Coefficient? 1000101101 1011101010", "it_a": "0.375", "cue": "🔮 L'unica che INIZIA con «0.375…»."}, {"id": "m086", "topic": "Clustering", "text": "What is the single linkage?", "options": [{"key": "A", "text": "A method to compute the distance between two objects, it can be used in hierarchical clustering", "it": "Un metodo per calcolare la distanza tra due oggetti, può essere usato nel clustering gerarchico", "why": "no: Linkage misura distanza tra cluster, non oggetti."}, {"key": "B", "text": "A method to compute the distance between two sets of items, it can be used in hierarchical clustering", "it": "Un metodo per calcolare la distanza tra due insiemi di item, può essere usato nel clustering gerarchico", "why": "sì: Single linkage usa minima distanza tra due insiemi."}, {"key": "C", "text": "A method to compute the distance between two classes, it can be used in decision trees", "it": "Un metodo per calcolare la distanza tra due classi, può essere usato in decision tree", "why": "no: Non riguarda classi o alberi decisionali."}, {"key": "D", "text": "A method to compute the separation of the objects inside a cluster", "it": "Un metodo per calcolare la separazione degli oggetti all'interno di un cluster", "why": "no: Separazione interna cluster non definisce single linkage."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Esca A: \"tra due oggetti\" — no, tra due set. Il linkage esiste proprio perché i cluster sono insiemi.", "it_q": "Cos'è il single linkage?", "it_a": "Un metodo per calcolare la distanza tra due insiemi di item, può essere usato nel clustering gerarchico", "cue": "🔮 Cerca «items», «sets»: compare SOLO nella giusta."}, {"id": "m087", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Expectation Maximisation", "it": "Expectation Maximisation", "why": "no: EM è clustering non supervisionato."}, {"key": "B", "text": "Apriori", "it": "Apriori", "why": "no: Apriori è non supervisionato, pattern mining."}, {"key": "C", "text": "K-means", "it": "K-means", "why": "no: K-means è clustering non supervisionato."}, {"key": "D", "text": "Decision Tree", "it": "Decision Tree", "why": "sì: Decision Tree è classificatore supervisionato."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "96-95. Chi è il diverso? (DBSCAN, SVM, Neural Network, Decision Tree) → ✅ A DBSCAN (unico NON supervisionato tra classificatori).", "it_q": "Quale è diverso dagli altri?", "it_a": "Decision Tree", "cue": "🔮 Cerca «decision», «tree»: compare SOLO nella giusta."}, {"id": "m088", "topic": "Clustering", "text": "Which of the following is a strength of the clustering algorithm DBSCAN?", "options": [{"key": "A", "text": "Requires to set the number of clusters as a parameter", "it": "Richiede di impostare il numero di cluster come parametro", "why": "no: DBSCAN non richiede k come parametro."}, {"key": "B", "text": "Ability to find cluster with concavities", "it": "Capacità di trovare cluster con concavità", "why": "sì: Trova cluster concavi basati su densità."}, {"key": "C", "text": "Ability to separate outliers from regular data", "it": "Capacità di separare gli outlier dai dati regolari", "why": "sì: Marca outlier come punti rumore."}, {"key": "D", "text": "Very fast by computation", "it": "Molto veloce dal punto di vista computazionale", "why": "no: DBSCAN può essere computazionalmente costoso."}], "correct": ["B", "C"], "note": "", "source": "banco 2026", "hint": "🟢 DBSCAN fine ma lento: outlier ok, concavità ok, densità DIVERSE ko. Tutto noise? ↓min_samples o ↑raggio.", "it_q": "Quale delle seguenti è un punto di forza dell'algoritmo di clustering DBSCAN?", "it_a": "Capacità di trovare cluster con concavità ; Capacità di separare gli outlier dai dati regolari", "cue": "🔮 Cerca «ability»: compare SOLO nella/e giusta/e. · giuste: 2"}, {"id": "m089", "topic": "Classificazione & ML", "text": "Which of the following measure can be used as an alternative to the Information Gain?", "options": [{"key": "A", "text": "Sihlouette Index", "it": "Indice di Silhouette", "why": "no: Silhouette valuta clustering, non split classificativi."}, {"key": "B", "text": "Gini Index", "it": "Indice di Gini", "why": "sì: Gini è alternativa a Information Gain."}, {"key": "C", "text": "Rand Index", "it": "Indice di Rand", "why": "no: Rand Index confronta partizioni di clustering."}, {"key": "D", "text": "Jaccard Index", "it": "Indice di Jaccard", "why": "no: Jaccard misura similarità, non impurità."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «Gini · Index»", "it_q": "Quale delle seguenti misure può essere usata come alternativa all'Information Gain?", "it_a": "Indice di Gini", "cue": "🔮 Cerca «gini»: compare SOLO nella giusta."}, {"id": "m090", "topic": "Classificazione & ML", "text": "Given the definitions: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Which formula computes the Accuracy?", "options": [{"key": "A", "text": "TN/(TN+FP)", "it": "TN/(TN+FP)", "why": "no: Formula della specificità, non accuracy."}, {"key": "B", "text": "(TP+TN)/(TP+FP+TN+FN)", "it": "(TP+TN)/(TP+FP+TN+FN)", "why": "sì: Accuracy usa corretti su tutti i casi."}, {"key": "C", "text": "TP/(TP+FN)", "it": "TP/(TP+FN)", "why": "no: Questa è recall."}, {"key": "D", "text": "TP/(TP+FP)", "it": "TP/(TP+FP)", "why": "no: Questa è precision."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le definizioni: TP=True Positives; TN=True Negatives; FP=False Positives; FN=False Negatives. Quale formula calcola l'Accuracy?", "it_a": "(TP+TN)/(TP+FP+TN+FN)", "cue": "🔮 L'unica che INIZIA con «(TP+TN…» e FINISCE con «…TN+FN)»."}, {"id": "m091", "topic": "Clustering", "text": "Which of the following characteristic of data can reduce the effectiveness of DBSCAN?", "options": [{"key": "A", "text": "Clusters have concavities", "it": "I cluster hanno concavità", "why": "no: Concavità sono punto forte di DBSCAN."}, {"key": "B", "text": "All the variables are the same range of values", "it": "Tutte le variabili hanno lo stesso range di valori", "why": "no: Stessa scala aiuta le distanze."}, {"key": "C", "text": "Presence of outliers", "it": "Presenza di outlier", "why": "no: Outlier sono gestiti come rumore."}, {"key": "D", "text": "Presence of clusters with different densities", "it": "Presenza di cluster con densità diverse", "why": "sì: Un solo eps fatica con densità diverse."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "eps è UNO solo per tutti — se un cluster è denso e uno rado, nessun eps va bene per entrambi. (Le concavità sono il suo punto di forza, esca A.)", "it_q": "Quale delle seguenti caratteristiche dei dati può ridurre l'efficacia di DBSCAN?", "it_a": "Presenza di cluster con densità diverse", "cue": "🔮 Cerca «different», «densities»: compare SOLO nella giusta."}, {"id": "m092", "topic": "Association Rules", "text": "Consider the transactional dataset: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Which is the support of the rule A,C -> B?", "options": [{"key": "A", "text": "100%", "it": "100%", "why": "no: Supporto non è tutte le transazioni."}, {"key": "B", "text": "20%", "it": "20%", "why": "sì: Solo {A,B,C} contiene A,C,B: 1/5."}, {"key": "C", "text": "40%", "it": "40%", "why": "no: 40% conta transazioni con A,C."}, {"key": "D", "text": "50%", "it": "50%", "why": "no: 50% è confidence, non supporto."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale: 1 {A,B,C} 2 {A,B,D} 3 {B,D,E} 4 {C,D} 5 {A,C,D,E} Qual è il support della regola A,C -> B?", "it_a": "20%", "cue": "🔮 L'unica che FINISCE con «…20%»."}, {"id": "m093", "topic": "BI & DWH", "text": "Associate the various Data Warehouse Architectures to the respective advantages: 1. Single Layer 2. Two Layers 3. Three Layers a. The workloads for analysis and daily operations are separated b. An intermediate level of consolidated data is available c. The occupation of space is minimised", "options": [{"key": "A", "text": "1-a, 2-b, 3-c", "it": "1-a, 2-b, 3-c", "why": "no: Associa piani e vantaggi in modo errato."}, {"key": "B", "text": "1-c, 2-a, 3-b", "it": "1-c, 2-a, 3-b", "why": "sì: 1 risparmia, 2 separa, 3 consolida."}, {"key": "C", "text": "1-b, 2-c, 3-a", "it": "1-b, 2-c, 3-a", "why": "no: Scambia livello intermedio e separazione workload."}, {"key": "D", "text": "1-c, 2-b, 3-a", "it": "1-c, 2-b, 3-a", "why": "no: Due layer non dà livello consolidato intermedio."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Mnemonica a scala: 1 piano = poco spazio (1→c: occupazione minimizzata); 2 piani = lavori separati (2→a: analisi e operazioni quotidiane separate); 3 piani = c'è il mezzanino (3→b: livello intermedio di dati consolidati). Conta i piani: 1 risparmia, 2 separa, 3 ha il piano in mezzo.", "it_q": "Associa le varie architetture di Data Warehouse ai rispettivi vantaggi: 1. Single Layer 2. Two Layers 3. Three Layers a. I carichi di lavoro per analisi e operazioni quotidiane sono separati b. È disponibile un livello intermedio di dati consolidati c. L'occupazione di spazio è minimizzata", "it_a": "1-c, 2-a, 3-b", "cue": "🔮 L'unica che INIZIA con «1-c, 2-a…» e FINISCE con «…3-b»."}, {"id": "m094", "topic": "Classificazione & ML", "text": "In a Neural Network, what is the backpropagation?", "options": [{"key": "A", "text": "The technique used to adjust the node weights according to the difference between the desired output and the output generated", "it": "La tecnica usata per regolare i pesi dei nodi in base alla differenza tra l'output desiderato e quello generato", "why": "no: I pesi sono sulle connessioni, non nodi."}, {"key": "B", "text": "The technique used to adjust the weights limiting the probability of overfitting", "it": "La tecnica usata per regolare i pesi limitando la probabilità di overfitting", "why": "no: Non è tecnica specifica anti-overfitting."}, {"key": "C", "text": "The technique used to adjust the output according to the difference between the desired weights and the actual weights", "it": "La tecnica usata per regolare l'output in base alla differenza tra i pesi desiderati e quelli reali", "why": "no: Non aggiusta output rispetto ai pesi."}, {"key": "D", "text": "The technique used to adjust the connection weights according to the difference between the desired output and the output generated by the network", "it": "La tecnica usata per regolare i pesi delle connessioni in base alla differenza tra l'output desiderato e quello generato dalla rete", "why": "sì: Propaga errore per aggiornare pesi di connessione."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Esca A quasi identica: dice \"node weights\" invece di \"connection weights\" — i pesi stanno sulle connessioni, non sui nodi. \"I fili hanno il peso, non i pallini.\"", "it_q": "In una Neural Network, cos'è la backpropagation?", "it_a": "La tecnica usata per regolare i pesi delle connessioni in base alla differenza tra l'output desiderato e l'output generato dalla rete", "cue": "🔮 Cerca «connection», «network»: compare SOLO nella giusta."}, {"id": "m095", "topic": "Preprocessing & dati", "text": "In feature selection, what is the Principal Component Analysis (PCA)?", "options": [{"key": "A", "text": "A mathematical technique used to transform non numeric attributes into numeric attributes", "it": "Una tecnica matematica usata per trasformare attributi non numerici in attributi numerici", "why": "no: Non codifica attributi non numerici."}, {"key": "B", "text": "A mathematical technique used to transform a set of numeric attributes into a smaller set of numeric attributes which capture most of the variability in data", "it": "Una tecnica matematica usata per trasformare un insieme di attributi numerici in un insieme più piccolo di attributi numerici che catturano la maggior parte della variabilità nei dati", "why": "sì: Trasforma numerici in componenti minori preservando variabilità."}, {"key": "C", "text": "A heuristic technique used to find a subset of the attributes which produces the same classifier", "it": "Una tecnica euristica usata per trovare un sottoinsieme degli attributi che produce lo stesso classificatore", "why": "no: Non seleziona sottoinsiemi di attributi originali."}, {"key": "D", "text": "A mathematical technique used to find the principal attributes which determine the classification process", "it": "Una tecnica matematica usata per trovare gli attributi principali che determinano il processo di classificazione", "why": "no: Crea componenti, non trova attributi principali."}], "correct": ["B"], "note": "", "source": "banco 2026", "hint": "Parole chiave da cercare nell'opzione giusta: \"smaller set\" + \"variability\". Esca: \"find the principal attributes\" — la PCA crea attributi nuovi (combinazioni), non seleziona quelli esistenti.", "it_q": "Nella feature selection, cos'è la Principal Component Analysis (PCA)?", "it_a": "Una tecnica matematica usata per trasformare un insieme di attributi numerici in un insieme più piccolo di attributi numerici che catturano la maggior parte della variabilità nei dati", "cue": "🔮 Cerca «variability», «capture»: compare SOLO nella giusta."}, {"id": "m096", "topic": "Preprocessing & dati", "text": "Which is different from the others?", "options": [{"key": "A", "text": "Dbscan", "it": "DBSCAN", "why": "sì: DBSCAN è non supervisionato; gli altri classificatori."}, {"key": "B", "text": "SVM", "it": "SVM", "why": "no: SVM è classificatore supervisionato."}, {"key": "C", "text": "Neural Network", "it": "Rete neurale", "why": "no: Neural Network può fare classificazione supervisionata."}, {"key": "D", "text": "Decision Tree", "it": "Decision Tree", "why": "no: Decision Tree è supervisionato."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🔍 La linea è sempre supervisionato vs non supervisionato: trova l'intruso rispetto a quella.", "it_q": "Quale è diverso dagli altri?", "it_a": "DBSCAN", "cue": "🔮 Cerca «dbscan»: compare SOLO nella giusta."}, {"id": "m097", "topic": "BI & DWH", "text": "Talking about the general idea of database, what is the purpose of the \"Schema on read\" strategy?", "options": [{"key": "A", "text": "Avoid preprocessing of data before writing", "it": "Evita il preprocessing dei dati prima della scrittura", "why": "sì: Schema applicato dopo, niente preprocessing in scrittura."}, {"key": "B", "text": "Optimisation for various types of queries", "it": "Ottimizzazione per vari tipi di query", "why": "no: Ottimizzazione query è schema-on-write/DWH."}, {"key": "C", "text": "Possibility to extract data in various shapes", "it": "Possibilità di estrarre i dati in varie forme", "why": "sì: Lettura flessibile produce forme dati diverse."}, {"key": "D", "text": "Flexibility for any kind of query", "it": "Flessibilità per qualsiasi tipo di query", "why": "sì: Dati raw supportano query eterogenee."}], "correct": ["A", "C", "D"], "note": "", "source": "banco 2026", "hint": "📖 Quando nasce lo schema? WRITE=prima di scrivere (DWH: query specifiche, design pulito) · READ=alla lettura (lake: raw, flessibile per tutto).", "it_q": "Parlando dell'idea generale di database, qual è lo scopo della strategia \"Schema on read\"?", "it_a": "Evitare il preprocessing dei dati prima della scrittura ; Possibilità di estrarre i dati in varie forme ; Flessibilità per qualsiasi tipo di query", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 3"}, {"id": "m098", "topic": "Clustering", "text": "What measure is maximised by the Expectation Maximisation algorithm for clustering?", "options": [{"key": "A", "text": "The likelihood of a class label, given the attributes of the example", "it": "La probabilità di un'etichetta di classe, dati gli attributi dell'esempio", "why": "sì: EM massimizza likelihood probabilistica delle classi latenti."}, {"key": "B", "text": "The likelihood of an attribute, given the class lab", "it": "La verosimiglianza di un attributo, data la label della classe", "why": "no: Non massimizza attributo dato classe."}, {"key": "C", "text": "The likelihood of an example", "it": "La probabilità di un esempio", "why": "no: Likelihood riguarda modello/cluster, non esempio isolato."}, {"key": "D", "text": "The support of a class", "it": "Il support di una classe", "why": "no: Supporto appartiene alle regole associative."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🎲 EM: probabilità, non distanze (l'unico non distance-based). Se c'è l'opzione 'distributions…parameters' è quella; sennò 'class label given attributes'.", "it_q": "Quale misura viene massimizzata dall'algoritmo Expectation Maximisation per il clustering?", "it_a": "La likelihood di un'etichetta di classe, dati gli attributi dell'esempio", "cue": "🔮 Cerca «attributes», «label»: compare SOLO nella giusta."}, {"id": "m099", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following is not an objective of the aggregation of attributes?", "options": [{"key": "A", "text": "Reduce the variability of data", "it": "Ridurre la variabilità dei dati", "why": "no: Ridurre variabilità è obiettivo dell'aggregazione."}, {"key": "B", "text": "Obtain a less detailed scale", "it": "Ottenere una scala meno dettagliata", "why": "no: Scala meno dettagliata è obiettivo."}, {"key": "C", "text": "Reduce the number of attributes or objects", "it": "Ridurre il numero di attributi o oggetti", "why": "no: Riduzione attributi o oggetti è obiettivo."}, {"key": "D", "text": "Obtain a more detailed description of data", "it": "Ottenere una descrizione più dettagliata dei dati", "why": "sì: Aggregazione riduce dettaglio, non lo aumenta."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "Nel data preprocessing, quale dei seguenti non è un obiettivo dell'aggregazione degli attributi?", "it_a": "Ottenere una descrizione più dettagliata dei dati", "cue": "🔮 Cerca «description», «more»: compare SOLO nella giusta."}, {"id": "m100", "topic": "BI & DWH", "text": "Which of the activities below is part of \"Business Understanding\" in the CRISP methodology?", "options": [{"key": "A", "text": "Which data are available?", "it": "Quali dati sono disponibili?", "why": "no: Disponibilità dati appartiene a Data Understanding."}, {"key": "B", "text": "Which machine learning functions are necessary for my problem?", "it": "Quali funzioni di machine learning sono necessarie per il mio problema?", "why": "no: Funzioni ML non sono focus business iniziale."}, {"key": "C", "text": "Which data must be collected with a specific campaign?", "it": "Quali dati devono essere raccolti con una specifica campagna?", "why": "no: Raccolta dati specifica è Data Understanding."}, {"key": "D", "text": "Which are the resources available (manpower, hardware, software, ...)", "it": "Quali sono le risorse disponibili (personale, hardware, software, ...)", "why": "sì: Business Understanding valuta risorse e vincoli."}], "correct": ["D"], "note": "", "source": "banco 2026", "hint": "Le esche su \"quali dati\" appartengono a Data Understanding. Memo: \"Business = budget\" (risorse, vincoli, obiettivi aziendali).", "it_q": "Quale delle seguenti attività fa parte di \"Business Understanding\" nella metodologia CRISP?", "it_a": "Quali sono le risorse disponibili (manpower, hardware, software, ...)", "cue": "🔮 Cerca «resources», «hardware»: compare SOLO nella giusta."}, {"id": "m101", "topic": "Preprocessing & dati", "text": "Which of the following situations could suggest the use of MinMax scaling?", "options": [{"key": "A", "text": "There are numeric attributes with very diverse value ranges", "it": "Ci sono attributi numerici con range di valori molto diversi", "why": "sì: MinMax uniforma range numerici molto diversi."}, {"key": "B", "text": "There are attributes with very skewed data distributions", "it": "Ci sono attributi con distribuzioni dei dati molto asimmetriche", "why": "no: Skew richiede trasformazioni, non semplice MinMax."}, {"key": "C", "text": "There are attributes with a very large number of missing values", "it": "Ci sono attributi con un numero molto elevato di valori mancanti", "why": "no: Missing values richiedono imputazione."}, {"key": "D", "text": "There is a numeric attribute with values spread in a very large range", "it": "C'è un attributo numerico con valori distribuiti in un range molto ampio", "why": "no: Range grande isolato non implica scaling necessario."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "Specchio della domanda 1. Le esche sono i punti di forza del DBMS: query key-based e aggiornamenti efficienti.", "it_q": "Quale delle seguenti situazioni potrebbe suggerire l'uso di MinMax scaling?", "it_a": "Ci sono attributi numerici con range di valori molto diversi", "cue": "🔮 Cerca «diverse», «ranges»: compare SOLO nella giusta."}, {"id": "m102", "topic": "BI & DWH", "text": "Which of the following sentences describes an advantage of a Data Warehouse with respect to a standard DBMS?", "options": [{"key": "A", "text": "Allows efficient execution of key-based queries", "it": "Permette l'esecuzione efficiente di query basate su chiave", "why": "no: Query key-based sono forza dei DBMS operazionali."}, {"key": "B", "text": "Manages efficiently data updates", "it": "Gestisce efficientemente gli aggiornamenti dei dati", "why": "no: Aggiornamenti efficienti sono tipici DBMS."}, {"key": "C", "text": "Has tools for helping to solve inconsistencies", "it": "Ha strumenti per aiutare a risolvere le inconsistenze", "why": "sì: Data Warehouse integra dati e risolve inconsistenze."}, {"key": "D", "text": "Allows analysis along the time dimension", "it": "Permette l'analisi lungo la dimensione temporale", "why": "sì: Warehouse supporta analisi storica temporale."}, {"key": "E", "text": "Allows efficient execution of multi-dimensional queries", "it": "Permette l'esecuzione efficiente di query multidimensionali", "why": "sì: OLAP ottimizza query multidimensionali."}], "correct": ["C", "D", "E"], "note": "", "source": "banco 2026", "hint": "Esca B (\"tutti della stessa classe\"): non serve purezza perfetta per essere foglia — si decide a maggioranza.", "it_q": "Quale delle seguenti frasi descrive un vantaggio di un Data Warehouse rispetto a un DBMS standard?", "it_a": "Ha strumenti per aiutare a risolvere le inconsistenze ; Permette l'analisi lungo la dimensione temporale ; Permette l'esecuzione efficiente di query multi-dimensionali", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 3"}, {"id": "m103", "topic": "Classificazione & ML", "text": "In a Decision Tree for classification, what is a leaf node?", "options": [{"key": "A", "text": "A node which assigns a class value to the objects passing the tests on the path from the root to the node itself", "it": "Nodo che assegna un valore di classe agli oggetti che superano i test sul percorso dalla radice al nodo", "why": "sì: Foglia assegna classe dopo test dal root."}, {"key": "B", "text": "A node where all the objects belong to the same class", "it": "Nodo in cui tutti gli oggetti appartengono alla stessa classe", "why": "no: Non serve purezza completa nella foglia."}, {"key": "C", "text": "A node which allows classification without errors", "it": "Nodo che permette la classificazione senza errori", "why": "no: Foglie possono ancora classificare con errori."}, {"key": "D", "text": "A node which assigns a class value only by majority of examples", "it": "Nodo che assegna un valore di classe solo per maggioranza degli esempi", "why": "no: Non sempre solo maggioranza, definizione troppo stretta."}], "correct": ["A"], "note": "", "source": "banco 2026", "hint": "🧲 Ancora: «node · assigns · class · value»", "it_q": "In un Decision Tree per la classificazione, cos'è un leaf node?", "it_a": "Un nodo che assegna un valore di classe agli oggetti che passano i test sul percorso dalla radice al nodo stesso", "cue": "🔮 Cerca «passing», «itself»: compare SOLO nella giusta."}, {"id": "m104", "topic": "Preprocessing & dati", "text": "Which is the purpose of discretisation?", "options": [{"key": "A", "text": "Increase the number of distinct values in an attribute", "it": "Aumenta il numero di valori distinti in un attributo", "why": "no: Discretizzare riduce, non aumenta valori distinti."}, {"key": "B", "text": "Reduce the number of distinct values in an attribute, in order to increase the efficiency", "it": "Riduce il numero di valori distinti in un attributo per aumentare l'efficienza", "why": "no: Efficienza non è lo scopo didattico principale."}, {"key": "C", "text": "Reduce the number of distinct values in an attribute, in order to put in evidence possible patterns and regularities", "it": "Riduce il numero di valori distinti in un attributo per evidenziare pattern e regolarità", "why": "sì: Riduce valori per evidenziare pattern e regolarità."}, {"key": "D", "text": "Reduce the range of values of a numeric attribute", "it": "Riduce l'intervallo di valori di un attributo numerico", "why": "no: Non riduce necessariamente il range numerico."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "⚠️ Trappola fine: l'esca B dice \"per aumentare l'efficienza\" — plausibile ma non è lo scopo didattico; il fine è vedere i pattern. \"Discretizzi per VEDERE, non per correre.\"", "it_q": "Qual è lo scopo della discretizzazione?", "it_a": "Ridurre il numero di valori distinti in un attributo, per mettere in evidenza possibili pattern e regolarità", "cue": "🔮 Cerca «regularities», «possible»: compare SOLO nella giusta."}, {"id": "m105", "topic": "BI & DWH", "text": "Which of the definition below describes the OLAP operation \"Roll-Up\"?", "options": [{"key": "A", "text": "Reduces data aggregation and adds a detail level to a hierarchy", "it": "Riduce l'aggregazione dei dati e aggiunge un livello di dettaglio a una gerarchia", "why": "no: Questo descrive drill-down."}, {"key": "B", "text": "Changes the layout, in order to analyse a group of data from a different viewpoint", "it": "Cambia il layout per analizzare un gruppo di dati da un punto di vista diverso", "why": "no: Cambio layout è pivot."}, {"key": "C", "text": "Reduces the number of cube dimensions after setting one of the dimensions to a specific value", "it": "Riduce il numero di dimensioni del cubo dopo aver fissato una dimensione a un valore specifico", "why": "no: Fissare dimensione è slice/dice."}, {"key": "D", "text": "Creates a link between concepts in interrelated cubes, to compare them", "it": "Crea un link tra concetti in cubi correlati per confrontarli", "why": "no: Collegare cubi è drill-across."}, {"key": "E", "text": "Causes an increase in data aggregation and removes a detail level in a hierarchy", "it": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia", "why": "sì: Roll-up sale: più aggregazione, meno dettaglio."}], "correct": ["E"], "note": "", "source": "banco 2026", "hint": "🎡 Ascensore OLAP: Roll-Up sali=aggreghi · Drill-Down trapano=dettaglio · Slice&Dice fissa una dimensione · Pivot piroetta=layout · Drill-Across ponte tra cubi.", "it_q": "Quale delle seguenti definizioni descrive l'operazione OLAP \"Roll-Up\"?", "it_a": "Causa un aumento dell'aggregazione dei dati e rimuove un livello di dettaglio in una gerarchia", "cue": "🔮 Cerca «increase», «removes»: compare SOLO nella giusta."}, {"id": "m106", "topic": "Classificazione & ML", "text": "What is the Gini index?", "options": [{"key": "A", "text": "A measure of the entropy of a dataset", "it": "Una misura dell'entropia di un dataset", "why": "no: Entropia è misura distinta dal Gini."}, {"key": "B", "text": "An accuracy measure of a dataset alternative to the Information Gain", "it": "Una misura di accuratezza di un dataset alternativa all'Information Gain", "why": "no: Gini misura impurità, non accuracy."}, {"key": "C", "text": "An impurity measure of a dataset alternative to the Information Gain and to the Misclassification Index", "it": "Una misura di impurità di un dataset alternativa all'Information Gain e al Misclassification Index", "why": "sì: Misura impurità alternativa a gain e misclassification."}, {"key": "D", "text": "An impurity measure of a dataset alternative to overfitting and underfitting", "it": "Una misura di impurità di un dataset alternativa a overfitting e underfitting", "why": "no: Overfitting e underfitting non sono misure impurità."}], "correct": ["C"], "note": "", "source": "banco 2026", "hint": "Tris collegato: Gini-Entropy-Misclassification sono i 3 fratelli dell'impurità in classificazione (la Silhouette è dell'altra famiglia, clustering — è per questo che nella domanda 53 \"chi è il diverso?\" la risposta è la Silhouette).", "it_q": "Cos'è il Gini index?", "it_a": "Una misura di impurità di un dataset alternativa all'Information Gain e all'Indice di Misclassificazione", "cue": "🔮 Cerca «misclassification», «index»: compare SOLO nella giusta."}, {"id": "m107", "topic": "Preprocessing & dati", "text": "In data preprocessing, which of the following are the objectives of the aggregation of attributes?", "options": [{"key": "A", "text": "Obtain a more detailed description of data", "it": "Ottenere una descrizione più dettagliata dei dati", "why": "no: Aggregazione rende dati meno dettagliati."}, {"key": "B", "text": "Obtain a less detailed scale", "it": "Ottenere una scala meno dettagliata", "why": "sì: Riassume dati su scala meno dettagliata."}, {"key": "C", "text": "Reduce the variability of data", "it": "Ridurre la variabilità dei dati", "why": "sì: Aggregare attenua variabilità dei dati."}, {"key": "D", "text": "Reduce the number of attributes or distinct values", "it": "Ridurre il numero di attributi o valori distinti", "why": "sì: Riduce attributi, oggetti o valori distinti."}], "correct": ["B", "C", "D"], "note": "", "source": "banco 2026", "hint": "🧮 Aggregare = ridurre riassumendo: MENO righe, MENO valori distinti, MENO dettaglio. 'More detailed' è SEMPRE l'intruso.", "it_q": "Nel data preprocessing, quali dei seguenti sono gli obiettivi dell'aggregazione degli attributi?", "it_a": "Ottenere una scala meno dettagliata ; Ridurre la variabilità dei dati ; Ridurre il numero di attributi o di valori distinti", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione. · giuste: 3"}, {"id": "a001", "topic": "Classificazione & ML", "text": "Given the following definitions: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Which of the formulas below computes the precision of a binary classifier?", "options": [{"key": "A", "text": "TP / (TP + FP)", "it": "TP / (TP + FP)", "why": "sì: Precisione = positivi veri su predetti positivi."}, {"key": "B", "text": "(TP + TN) / (TP + FP + TN + FN)", "it": "(TP + TN) / (TP + FP + TN + FN)", "why": "no: Questa formula calcola accuracy."}, {"key": "C", "text": "TN / (TN + FP)", "it": "TN / (TN + FP)", "why": "no: Questa è specificità."}, {"key": "D", "text": "TP / (TP + FN)", "it": "TP / (TP + FN)", "why": "no: Questa è recall."}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le seguenti definizioni: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Quale delle seguenti formule calcola la precision di un classificatore binario?", "it_a": "TP / (TP + FP)", "cue": "🔮 L'unica che INIZIA con «TP / (TP + FP…»."}, {"id": "a002", "topic": "Preprocessing & dati", "text": "Which of the statements below is true?", "options": [{"key": "A", "text": "Sometimes k-means stops to a configuration which does not give the minimum distortion for the chosen value of the number of clusters", "it": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il numero di cluster scelto", "why": "sì: K-means può fermarsi in minimo locale."}, {"key": "B", "text": "K-means always stop to a configuration which gives the minimum distortion for the chosen value of the number of clusters", "it": "K-means si ferma sempre su una configurazione che dà la distorsione minima per il numero di cluster scelto", "why": "no: Non garantisce distorsione minima globale."}, {"key": "C", "text": "K-means works well also with datasets having a very large number of attributes", "it": "K-means funziona bene anche con dataset con un numero molto elevato di attributi", "why": "no: Alta dimensionalità degrada le distanze."}, {"key": "D", "text": "K-means finds the number of clusters which give the minimum distortion", "it": "K-means trova il numero di cluster che dà la distorsione minima", "why": "no: K-means richiede k, non lo trova."}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Sometimes · k-means · stops · configuration»", "it_q": "Quale delle seguenti affermazioni è vera?", "it_a": "A volte k-means si ferma su una configurazione che non dà la distorsione minima per il valore scelto del numero di cluster", "cue": "🔮 Cerca «sometimes», «stops»: compare SOLO nella giusta."}, {"id": "a003", "topic": "Preprocessing & dati", "text": "Which of the statements below is false?", "options": [{"key": "A", "text": "Increasing the radius of the neighourhood can decrease the number of noise points", "it": "Aumentare il raggio del neighborhood può ridurre il numero di noise points", "why": "no: Affermazione vera; eps maggiore riduce rumore."}, {"key": "B", "text": "DBSCAN always stops to a configuration which gives the optimal number of clusters", "it": "DBSCAN si ferma sempre su una configurazione che fornisce il numero ottimale di cluster", "why": "sì: Falsa: DBSCAN non garantisce cluster ottimali."}, {"key": "C", "text": "Sometimes DBSCAN stops to a configuration which does not include any cluster", "it": "A volte DBSCAN si ferma su una configurazione che non include alcun cluster", "why": "no: Affermazione vera; può produrre zero cluster."}, {"key": "D", "text": "DBScan can give good performance when clusters have concavities", "it": "DBSCAN può fornire buone prestazioni quando i cluster hanno concavità", "why": "no: Affermazione vera; gestisce concavità."}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «DBSCAN · always · stops · configuration»", "it_q": "Quale delle seguenti affermazioni è falsa?", "it_a": "DBSCAN si ferma sempre su una configurazione che dà il numero ottimale di cluster", "cue": "🔮 Cerca «optimal», «always»: compare SOLO nella giusta."}, {"id": "a004", "topic": "Classificazione & ML", "text": "What are the hyperparameters of a Neural Network? (Possibly non exhaustive)", "options": [{"key": "A", "text": "Hidden layers structure, Output layer structure, Activation function, Number of epochs", "it": "Struttura hidden layers, struttura output layer, activation function, numero di epoche", "why": "no: Output layer structure non è lista attesa."}, {"key": "B", "text": "Network structure, Learning rate, Backpropagation algorithm, Number of epochs", "it": "Struttura della rete, learning rate, algoritmo di backpropagation, numero di epoche", "why": "no: Backpropagation è algoritmo, non iperparametro tipico."}, {"key": "C", "text": "Input layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura input layers, learning rate, activation function, numero di epoche", "why": "no: Input layer dipende dai dati, non scelta libera."}, {"key": "D", "text": "Hidden layers structure, Learning rate, Activation function, Number of epochs", "it": "Struttura hidden layers, learning rate, activation function, numero di epoche", "why": "sì: Hidden, learning rate, activation, epoche sono iperparametri."}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧠 HLAN: Hidden layers, Learning rate, Activation, N. epoche. LR=moltiplicatore della correzione · Backprop=aggiusta i pesi delle CONNESSIONI.", "it_q": "Quali sono gli hyperparameters di una Neural Network? (Possibilmente non esaustivo)", "it_a": "Struttura dei layer nascosti, Learning rate, Activation function, Numero di epoche", "cue": "🔮 Nessun trucco di superficie: qui decide la sostanza — dopo la risposta leggi i ✔/✘ di ogni opzione."}, {"id": "a005", "topic": "Association Rules", "text": "Consider the transactional dataset below. Which is the Confidence of the rule \"B -> E\"?  ID Items  1 A,B,C  2 A,B,D  3 B,D,E  4 C,D  5 A,C,D,E", "options": [{"key": "A", "text": "100%", "it": "100%", "why": "no: Solo una transazione B contiene anche E."}, {"key": "B", "text": "50%", "it": "50%", "why": "no: 50% è confidence di AC->B."}, {"key": "C", "text": "33%", "it": "33%", "why": "sì: B appare 3 volte, B,E una: 1/3."}, {"key": "D", "text": "20%", "it": "20%", "why": "no: 20% è supporto del set completo."}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🔢 Conta le transazioni col set completo / quelle con l'antecedente. Memo: B→E un terzo (33%) · AC→B metà (50%) · supporto un quinto (20%).", "it_q": "Considera il dataset transazionale sottostante. Qual è la Confidence della regola \"B -> E\"?  ID Items  1 A,B,C  2 A,B,D  3 B,D,E  4 C,D  5 A,C,D,E", "it_a": "33%", "cue": "🔮 L'unica che FINISCE con «…33%»."}, {"id": "a006", "topic": "Association Rules", "text": "Name the following rule evaluation formula: sup(AuC) - sup(A)sup(C)", "options": [{"key": "A", "text": "Leverage", "it": "Leverage", "why": "sì: Differenza tra supporto congiunto e indipendenza attesa."}, {"key": "B", "text": "Lift", "it": "Lift", "why": "no: Lift è confidence diviso supporto conseguente."}, {"key": "C", "text": "Confidence", "it": "Confidence", "why": "no: Confidence è supporto unione su antecedente."}, {"key": "D", "text": "Conviction", "it": "Conviction", "why": "no: Conviction usa confidenza e mancato conseguente."}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Leverage»", "it_q": "Nome della seguente formula di valutazione delle regole: sup(AuC) - sup(A)sup(C)", "it_a": "Leverage", "cue": "🔮 Cerca «leverage»: compare SOLO nella giusta."}, {"id": "a007", "topic": "Association Rules", "text": "Name the following rule evaluation formula: conf(A->C) / sup(C)", "options": [{"key": "A", "text": "Leverage", "it": "Leverage", "why": "no: Leverage sottrae prodotto dei supporti."}, {"key": "B", "text": "Lift", "it": "Lift", "why": "sì: Lift normalizza confidence sul supporto del conseguente."}, {"key": "C", "text": "Confidence", "it": "Confidence", "why": "no: Confidence non divide per supporto conseguente."}, {"key": "D", "text": "Conviction", "it": "Conviction", "why": "no: Conviction ha formula diversa con complemento."}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Lift»", "it_q": "Nome della seguente formula di valutazione delle regole: conf(A->C) / sup(C)", "it_a": "Lift", "cue": "🔮 Cerca «lift»: compare SOLO nella giusta."}, {"id": "a008", "topic": "Association Rules", "text": "Name the following rule evaluation formula: sup(A->C) / sup(A)", "options": [{"key": "A", "text": "Leverage", "it": "Leverage", "why": "no: leverage misura deviazione da indipendenza, non sup(A,C)/sup(A)"}, {"key": "B", "text": "Lift", "it": "Lift", "why": "no: lift normalizza confidence per supporto del conseguente"}, {"key": "C", "text": "Confidence", "it": "Confidence", "why": "sì: confidence = sup(A∩C) / sup(A)"}, {"key": "D", "text": "Conviction", "it": "Conviction", "why": "no: conviction usa 1-sup(C) e 1-confidenza"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Confidence»", "it_q": "Indica il nome della seguente formula di valutazione delle regole: sup(A->C) / sup(A)", "it_a": "Confidenza", "cue": "🔮 Cerca «confidence»: compare SOLO nella giusta."}, {"id": "a009", "topic": "Association Rules", "text": "Name the following rule evaluation formula: [1 - sup(C)] / [1 - conf(A->C)]", "options": [{"key": "A", "text": "Leverage", "it": "Leverage", "why": "no: leverage confronta supporto osservato e atteso"}, {"key": "B", "text": "Lift", "it": "Lift", "why": "no: lift = confidence divisa per sup(C)"}, {"key": "C", "text": "Confidence", "it": "Confidence", "why": "no: confidence = sup(A∩C)/sup(A)"}, {"key": "D", "text": "Conviction", "it": "Conviction", "why": "sì: conviction = [1-sup(C)]/[1-conf(A→C)]"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🧲 Ancora: «Conviction»", "it_q": "Indica il nome della seguente formula di valutazione delle regole: [1 - sup(C)] / [1 - conf(A->C)]", "it_a": "Conviction", "cue": "🔮 Cerca «conviction»: compare SOLO nella giusta."}, {"id": "a010", "topic": "Classificazione & ML", "text": "Given the following definitions: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Which of the formulas below computes the accuracy of a binary classifier?", "options": [{"key": "A", "text": "TN / (TN + FP)", "it": "TN / (TN + FP)", "why": "no: specificità, usa solo TN e FP"}, {"key": "B", "text": "(TP + TN) / (TP + FP + TN + FN)", "it": "(TP + TN) / (TP + FP + TN + FN)", "why": "sì: accuracy conta predizioni corrette su tutti i casi"}, {"key": "C", "text": "TP / (TP + FN)", "it": "TP / (TP + FN)", "why": "no: recall, positivi veri su positivi reali"}, {"key": "D", "text": "TP / (TP + FP)", "it": "TP / (TP + FP)", "why": "no: precision, positivi veri su predetti positivi"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "🎯 P con P: Precision=TP/(TP+FP) · R con FN: Recall=TP/(TP+FN) · Accuracy usa tutti e 4.", "it_q": "Date le seguenti definizioni: TP = True Positives; TN = True Negatives; FP = False Positives; FN = False Negatives. Quale delle seguenti formule calcola l'accuratezza di un classificatore binario?", "it_a": "(TP + TN) / (TP + FP + TN + FN)", "cue": "🔮 L'unica che INIZIA con «(TP + TN…» e FINISCE con «…TN + FN)»."}, {"id": "a011", "topic": "Preprocessing & dati", "text": "Choose the best suited distance function for this type of data: Vector space with real values", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance", "why": "sì: vettori reali: distanza euclidea naturale"}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance", "why": "no: cosine adatta a documenti e angoli"}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance", "why": "no: Manhattan preferita in alta dimensionalità"}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient", "why": "no: Jaccard adatto a dati booleani"}], "correct": ["A"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Scegli la funzione di distanza più adatta per questo tipo di dati: Spazio vettoriale con valori reali", "it_a": "Distanza euclidea", "cue": "🔮 Cerca «euclidean»: compare SOLO nella giusta."}, {"id": "a012", "topic": "Preprocessing & dati", "text": "Choose the best suited distance function for this type of data: Vectors of terms representing documents", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance", "why": "no: Euclidea misura magnitudine, debole sui documenti"}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance", "why": "sì: documenti: cosine confronta direzione dei vettori termini"}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance", "why": "no: Manhattan adatta più ad alta dimensionalità generica"}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient", "why": "no: Jaccard per insiemi booleani, non pesi testuali"}], "correct": ["B"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Scegli la funzione di distanza più adatta per questo tipo di dati: Vettori di termini che rappresentano documenti", "it_a": "Distanza coseno", "cue": "🔮 Cerca «cosine»: compare SOLO nella giusta."}, {"id": "a013", "topic": "Preprocessing & dati", "text": "Choose the best suited distance function for this type of data: High dimensional spaces", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance", "why": "no: Euclidea perde discriminazione in molte dimensioni"}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance", "why": "no: cosine tipica per documenti vettoriali"}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance", "why": "sì: alta dimensionalità: Manhattan più robusta della Euclidea"}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient", "why": "no: Jaccard misura similarità tra attributi booleani"}], "correct": ["C"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Scegli la funzione di distanza più adatta per questo tipo di dati: Spazi ad alta dimensionalità", "it_a": "Distanza di Manhattan", "cue": "🔮 Cerca «manhattan»: compare SOLO nella giusta."}, {"id": "a014", "topic": "Preprocessing & dati", "text": "Choose the best suited distance function for this type of data: Boolean data", "options": [{"key": "A", "text": "Euclidean distance", "it": "Euclidean distance", "why": "no: Euclidea richiede valori numerici continui"}, {"key": "B", "text": "Cosine distance", "it": "Cosine distance", "why": "no: cosine misura angolo, non presenza booleana"}, {"key": "C", "text": "Manhattan distance", "it": "Manhattan distance", "why": "no: Manhattan non cattura bene insiemi booleani"}, {"key": "D", "text": "Jaccard coefficient", "it": "Jaccard coefficient", "why": "sì: Jaccard confronta presenze comuni su unione"}], "correct": ["D"], "note": "Variante del banco vecchio (app studenti).", "source": "app", "hint": "📏 Viaggiatori: reali→Euclid (drone) · alta dimensione→Manhattan (isolati) · documenti→Cosine (angolo) · booleani→Jaccard (jacket: o ce l'hai o no).", "it_q": "Scegli la funzione di distanza più adatta per questo tipo di dati: Dati booleani", "it_a": "Coefficiente di Jaccard", "cue": "🔮 Cerca «coefficient», «jaccard»: compare SOLO nella giusta."}, {"id": "a015", "topic": "Preprocessing & dati", "text": "Which of the statements below is FALSE?", "options": [{"key": "A", "text": "K-mean always stops to a configuration which gives the minimum distortion for the chosen value of the number of clusters", "it": "K-means si ferma sempre su una configurazione che dà la distorsione minima per il numero di cluster scelto", "why": "sì: falso: K-means converge spesso a minimo locale"},
